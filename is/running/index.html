<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ajin.im is running</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1612;
    --text: #e8e0d0;
    --text-soft: #8a7f70;
    --text-faint: #6a6055;
    --rule: rgba(138, 127, 112, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 400;
    font-size: 18px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  /* subtle warm grain — continuous with root page */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.66 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.4;
    mix-blend-mode: overlay;
    z-index: 1;
  }

  main {
    position: relative;
    z-index: 2;
    max-width: 560px;
    margin: 0 auto;
    padding: 10vh 8vw 8vh;
  }

  .title {
    font-size: 1.35rem;
    font-weight: 400;
    letter-spacing: -0.005em;
    margin-bottom: 3.5rem;
    color: var(--text);
    animation: fade 0.9s ease-out 0.1s both;
  }

  .title .prefix {
    color: var(--text-faint);
  }

  .title .verb {
    font-style: italic;
  }

  /* numbers block */
  .stats {
    margin-bottom: 3.5rem;
    animation: fade 0.9s ease-out 0.25s both;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 0.9rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--rule);
  }

  .stat:first-child { border-top: 1px solid var(--rule); }

  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.45rem;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.01em;
    flex-shrink: 0;
    min-width: 7.5rem;
  }

  .stat-label {
    font-size: 0.92rem;
    color: var(--text-soft);
    line-height: 1.5;
  }

  .updated {
    margin-top: 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-faint);
    letter-spacing: 0.02em;
  }

  /* trail: earth → runner → moon */
  .trail {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 1.4rem 0 0.6rem;
  }

  .trail .endpoint {
    font-size: 1.35rem;
    line-height: 1;
    flex-shrink: 0;
    filter: saturate(0.85);
  }

  .trail .track {
    position: relative;
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .trail .track-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: var(--progress);
    background: linear-gradient(to right, transparent, rgba(232, 224, 208, 0.4));
    animation: trail-fill 1.8s cubic-bezier(0.4, 0, 0.2, 1) 1s both;
  }

  .trail .runner {
    position: absolute;
    top: 50%;
    left: var(--progress);
    font-size: 1.15rem;
    line-height: 1;
    transform: translate(-50%, -50%) scaleX(-1);
    animation: trail-runner 1.8s cubic-bezier(0.4, 0, 0.2, 1) 1s both,
               trail-bob 1.4s ease-in-out 2.9s infinite;
  }

  @keyframes trail-fill {
    from { width: 0; }
    to   { width: var(--progress); }
  }

  @keyframes trail-runner {
    from { left: 0; }
    to   { left: var(--progress); }
  }

  @keyframes trail-bob {
    0%, 100% { transform: translate(-50%, -50%) scaleX(-1); }
    50%      { transform: translate(-50%, -78%) scaleX(-1); }
  }

  @keyframes fade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    main { padding: 7vh 7vw 6vh; }
    .title { font-size: 1.18rem; margin-bottom: 2.5rem; }
    .stat-value { font-size: 1.2rem; min-width: 6rem; }
    .stat-label { font-size: 0.88rem; }
    .trail { gap: 0.55rem; padding: 1.1rem 0 0.5rem; }
    .trail .endpoint { font-size: 1.2rem; }
    .trail .runner { font-size: 1rem; }
  }
</style>
</head>
<body>

<main>

  <div class="title">
    <span class="prefix">ajin.im is</span> <span class="verb">running to the moon</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value">75,350 km</div>
      <div class="stat-label">running, since 2009</div>
    </div>
    <div class="stat">
      <div class="stat-value">1.88×</div>
      <div class="stat-label">around the earth</div>
    </div>
    <div class="stat">
      <div class="stat-value">309,050 km</div>
      <div class="stat-label">to the moon</div>
    </div>

    <div class="trail" style="--progress: 19.6%" role="img" aria-label="19.6% of the way to the moon">
      <span class="endpoint" aria-hidden="true">🌍</span>
      <div class="track">
        <div class="track-fill"></div>
        <span class="runner" aria-hidden="true">🏃</span>
      </div>
      <span class="endpoint" aria-hidden="true">🌕</span>
    </div>

    <div class="updated">updated daily</div>
  </div>

</main>

</body>
</html>
