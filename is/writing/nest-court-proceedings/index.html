<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dove v. Dove — Gallery Assessment</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%231B2A3D' stroke-width='4'/><circle cx='50' cy='50' r='38' fill='none' stroke='%23B8963E' stroke-width='2'/><path d='M30 62C36 52 42 48 50 48C58 48 64 52 70 62C64 72 58 76 50 76C42 76 36 72 30 62Z' fill='none' stroke='%231B2A3D' stroke-width='3'/><ellipse cx='44' cy='58' rx='4' ry='5' fill='none' stroke='%231B2A3D' stroke-width='2'/><ellipse cx='56' cy='58' rx='4' ry='5' fill='none' stroke='%231B2A3D' stroke-width='2'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
background:#d8d4c6;
font-family:'IBM Plex Sans',sans-serif;
color:#2a2620;
-webkit-font-smoothing:antialiased;
}

.shell{
max-width:520px;
margin:1.2rem auto;
background:#f0ebe0;
border-radius:16px;
overflow:hidden;
}

/* HEADER */
.hd{background:#3a3428;padding:1rem 1.3rem;border-radius:16px 16px 0 0}
.hd-back{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a09888;text-decoration:none;display:block;margin-bottom:10px;transition:color .15s}
.hd-back:hover{color:#d0c8b4}
.hd-case{font-family:'Source Serif 4',Georgia,serif;font-size:24px;color:#f0e8d4;font-style:italic;margin-bottom:2px}
.hd-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a8070;letter-spacing:.04em}

/* PROGRESS */
.prog{display:flex;gap:6px;padding:1rem 1.3rem .6rem;align-items:center}
.pip{flex:1;height:4px;background:#ddd8cc;border-radius:3px;transition:background .3s}
.pip.done{background:#8a7e6a}
.pip.now{background:#c47a5a}

/* CARDS */
.card{background:#faf7f0;margin:.5rem 1rem;border-radius:14px;padding:1.4rem 1.3rem}

.card-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#c47a5a;letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem}

.card-text{font-family:'Source Serif 4',Georgia,serif;font-size:17px;line-height:1.75;color:#3a3630}
.card-text p{margin:0}
.card-text p+p{margin-top:1rem}

/* QUOTES */
.qt{margin:1rem 0;padding:1rem 1.1rem;background:#f4efe4;border-radius:10px;border-left:3px solid #c47a5a}
.qt-t{font-family:'Source Serif 4',Georgia,serif;font-size:16px;line-height:1.65;color:#4a4438;font-style:italic}
.qt-a{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#a09880;margin-top:6px}

/* CLERK NOTES */
.cl{margin:1rem 0;padding:.8rem 1rem;background:#eee9de;border-radius:10px}
.cl-t{font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.6;color:#7a7264;font-style:italic}

/* QUESTION */
.q{font-family:'Source Serif 4',Georgia,serif;font-size:19px;color:#2a2620;line-height:1.5;margin:1.5rem 0 1rem}

/* OPTIONS */
.opt{background:#fff;border:1.5px solid #e0dbd0;border-radius:12px;padding:1rem 1.1rem;margin-bottom:8px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.opt:hover{border-color:#c47a5a;background:#fdf9f4}
.opt.sel{background:#3a3428;border-color:#3a3428}
.opt.sel .opt-t{color:#f0e8d4}
.opt.sel .opt-d{color:#a09880}
.opt-t{font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:500;color:#2a2620;margin-bottom:3px;transition:color .15s}
.opt-d{font-family:'Source Serif 4',Georgia,serif;font-size:14px;color:#7a7468;line-height:1.55;transition:color .15s}

/* BUTTON */
.btn-row{padding:.6rem 1rem 1.2rem;display:flex;justify-content:flex-end}
.btn{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#faf7f0;background:#c47a5a;border:none;padding:10px 22px;border-radius:10px;cursor:pointer;transition:all .15s;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
.btn:hover{background:#b06a4a}
.btn.dim{opacity:.3;pointer-events:none}

/* FOOTER */
.ft{background:#3a3428;padding:.7rem 1.3rem;border-radius:0 0 16px 16px}
.ft-row{display:flex;justify-content:space-between;align-items:center}
.ft span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6a6258}
.ft-links{padding-top:.5rem;border-top:1px solid #4a4438;margin-top:.5rem}
.ft-links a{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6a6258;text-decoration:none;margin-right:12px;transition:color .15s}
.ft-links a:hover{color:#a09888}

/* ASSESSMENT SPECIFIC */
.assess-title{font-family:'Source Serif 4',Georgia,serif;font-size:20px;color:#2a2620;font-style:italic;margin-bottom:1rem}
.assess-owl{margin:1.2rem 0;padding:1rem 1.1rem;background:#f4efe4;border-radius:10px;border-left:3px solid #8a7e6a}
.assess-owl-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#908870;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.assess-owl-t{font-family:'Source Serif 4',Georgia,serif;font-size:15px;line-height:1.7;color:#4a4438}

/* RESPONSIVE */
@media(max-width:540px){
  .shell{margin:.5rem;border-radius:12px}
  .hd{border-radius:12px 12px 0 0;padding:1rem 1.1rem}
  .ft{border-radius:0 0 12px 12px}
  .card{margin:.5rem .7rem;padding:1.2rem 1.1rem}
  .hd-case{font-size:22px}
  .q{font-size:18px}
}
</style>
</head>
<body>

<div class="shell">

<div class="hd">
  <a class="hd-back" href="../nest-court/">← Case Docket</a>
  <div class="hd-case">Dove v. Dove</div>
  <div class="hd-meta">AMNC-2026-007B · Nest abandonment · Gallery seat assigned</div>
</div>

<div class="prog" id="pips"></div>

<div id="content"></div>

<div class="btn-row">
  <button class="btn dim" id="goBtn" onclick="advance()">Next matter →</button>
</div>

<div class="ft">
  <div class="ft-row">
    <span>Clerk's Record · AMNC-2026-007B</span>
    <span>Avian Municipal Nest Court</span>
  </div>
  <div class="ft-links">
    <a href="../bird-coo/">The Municipal Coo</a>
    <a href="../secondnest/">SecondNest</a>
  </div>
</div>

</div>

<script>
var choices = [];
var step = 0;
var totalSteps = 5;

var STEPS = [
  {
    cards: [
      {type:'info', label:'Case summary', text:'<p>The Petitioner alleges that the Respondent departed the marital nest on January 27th, said he needed to clear his head, and did not return for eleven days. He made no contact. He was observed on four occasions near the home of a female bird — on a branch approximately four feet from her window.</p><p>The Petitioner maintained the nest and two unhatched eggs alone for the duration. On day eleven she rebuilt the entrance with material she had stored before his departure. When the Respondent returned on day twelve, the nest was closed to him. He sat on the wire outside for an hour.</p>'},
      {type:'quotes', quotes:[
        {t:'"He said he needed to clear his head. He flew east. Our foraging grounds are west."', a:'Denise Dove, Petitioner'},
        {t:'"I was on a public branch. The branch is public. I have said this."', a:'Greg Dove, Respondent'}
      ], clerk:'The Petitioner\'s folder is labeled "Exhibits, Correspondence, and a List of Things I Did Alone." The third category does not appear in the official index.'},
      {type:'decision', q:'The Petitioner requests a No-Perch Order of fifty wingspans. The Respondent calls this punitive. How would you rule?', opts:[
        {t:'Grant the full fifty wingspans', d:'She was alone with two eggs for eleven days. If she says fifty, give her fifty.'},
        {t:'Modify to twenty-five wingspans', d:'Twenty-five protects the nest. Fifty excludes the parking lot, which predates the marriage.'},
        {t:'Deny the order', d:'He was absent, not threatening. These are different problems.'}
      ]}
    ]
  },
  {
    cards: [
      {type:'info', label:'Matter before the gallery', text:'<p>Both parties claim ownership of one zip tie currently installed in the marital nest. The Respondent says he found it in a parking lot and carried it home. The Petitioner argues it became shared property the moment he installed it.</p><p>Both parties agree the zip tie is now holding up the south-facing wall. Removing it would be a problem.</p>'},
      {type:'quotes', quotes:[
        {t:'"The zip tie is mine. I found it. I carried it. I installed it. This has been explained."', a:'Greg Dove, Respondent'},
        {t:'"He found a zip tie. He did not find a marriage. One of these he maintained."', a:'Denise Dove, Petitioner'}
      ], clerk:'The zip tie in question is approximately three inches long and green. The Clerk\'s office does not typically involve itself in matters of this scale but has been given no choice.'},
      {type:'decision', q:'The zip tie is structural. Both parties want it. How would you rule?', opts:[
        {t:'Award to the Petitioner', d:'Installed materials stay with the structure. The structure stays with her.'},
        {t:'Award to the Respondent', d:'He found it. He carried it. Provenance is provenance.'},
        {t:'The zip tie belongs to the nest', d:'It is load-bearing. It belongs to the wall it is holding up.'}
      ]}
    ]
  },
  {
    cards: [
      {type:'info', label:'Witness assessment', text:'<p>Cheryl Sparrow, the sole third-party witness, lives two lots from the marital nest. She was asked by the Petitioner to note the time of the Respondent\'s departure — before the departure occurred.</p><p>She brought binoculars, which she describes as pre-owned for general bird-watching. She submitted a four-page written statement and six supplemental pages that the Clerk filed without being asked.</p>'},
      {type:'quotes', quotes:[
        {t:'"The third time he was on the low branch. The one that dips toward her window. I did not design the tree, Your Honor."', a:'Cheryl Sparrow, Witness'},
        {t:'"The fourth time was different. He was just sitting. Not looking at anything. I nearly felt sorry for him. Then I remembered the eggs."', a:'Cheryl Sparrow, Witness'}
      ], clerk:'One page of the witness\'s notes fell during testimony. It was labeled "Things I Noticed That Nobody Asked About." The Clerk has filed it.'},
      {type:'decision', q:'How do you assess Cheryl Sparrow\'s testimony?', opts:[
        {t:'Fully credible', d:'She was there. She saw what she saw. Thorough is not the same as unreliable.'},
        {t:'Credible but biased', d:'Her facts are probably right, but she was recruited by the Petitioner and has opinions about branches.'},
        {t:'Unreliable', d:'She was asked to surveil a neighbor\'s husband. She brought binoculars. She has color-coded notes.'}
      ]}
    ]
  },
  {
    cards: [
      {type:'info', label:'Closing statements', text:'<p>The Respondent was absent for eleven days. He made no contact. He was observed near another bird\'s residence. The Petitioner maintained the nest and two eggs alone.</p><p>In his closing, the Respondent said the nest was not enough — not the materials, not the location, but the feeling of being in it. He said telling someone who had done everything right that it still was not enough felt like the cruelest thing he could do. So he left instead, which he now understands was crueler.</p>'},
      {type:'quotes', quotes:[
        {t:'"Managing alone should not be the same as being married. If it is, then the marriage ended before he flew east."', a:'Denise Dove, closing statement'},
        {t:'"I did not know how to come back. But I came back."', a:'Greg Dove, closing statement'}
      ], clerk:'The Court is quiet. Judge Owl is looking at her notes. She does not appear to be reading them.'},
      {type:'decision', q:'On the central question of nest abandonment — how would you rule?', opts:[
        {t:'Grant the petition', d:'Eleven days. No communication. Observed elsewhere. Whatever his reasons, his actions meet the definition.'},
        {t:'Grant with conditions', d:'This is abandonment, but allow supervised visitation of the eggs and reduce the No-Perch radius.'},
        {t:'Deny the petition', d:'He returned. He appeared in court. Absence and abandonment are not the same.'}
      ]}
    ]
  }
];

/* OWL'S RULINGS: B(modify), C(nest), B(biased), A(grant) */
var OWL = [1, 2, 1, 0];

/* ASSESSMENT TEXT BUILDER */
function buildAssessment() {
  var c = choices;
  var out = {};

  /* Para 1: Summary */
  var perch = ['granted the No-Perch Order at full radius','granted the No-Perch Order at modified radius','denied the No-Perch Order'][c[0]];
  var zip = ['awarded the zip tie to the Petitioner','awarded the zip tie to the Respondent','designated the zip tie as property of the nest'][c[1]];
  var witness = ['assessed the witness as fully credible','assessed the witness as credible but biased','assessed the witness as unreliable'][c[2]];
  var ruling = ['ruled to grant the petition','ruled to grant the petition with conditions','ruled to deny the petition'][c[3]];
  out.summary = 'The observer ' + perch + ', ' + zip + ', ' + witness + ', and ' + ruling + '.';

  /* Para 2: Pattern observation */
  var strict = 0; var lenient = 0; var moderate = 0;
  c.forEach(function(v) { if (v === 0) strict++; else if (v === 2) lenient++; else moderate++; });

  if (strict >= 3) {
    out.pattern = 'The observer ruled against the Respondent at every available opportunity. The Clerk\'s office does not speculate on the observer\'s personal history but notes that consistency of this kind usually has a source.';
  } else if (lenient >= 3) {
    out.pattern = 'The observer extended the benefit of the doubt at every juncture. The Clerk\'s office finds this admirable in a neighbor and concerning in a judge.';
  } else if (moderate >= 3) {
    out.pattern = 'The observer modified, qualified, or conditioned every available ruling. The Clerk\'s office recognizes this as either judicial wisdom or an inability to commit. The distinction rarely matters in practice.';
  } else if (c[0] === 0 && c[3] === 2) {
    out.pattern = 'The observer restricted the Respondent\'s movement but declined to call it abandonment. The Clerk\'s office finds this combination difficult to explain and has stopped trying.';
  } else if (c[0] === 2 && c[3] === 0) {
    out.pattern = 'The observer denied the No-Perch Order but granted the petition for abandonment, which the Clerk\'s office interprets as a belief that the Respondent should be free to go wherever he likes, as long as he understands he no longer lives there.';
  } else if (c[2] === 2 && c[3] === 0) {
    out.pattern = 'The observer dismissed the witness as unreliable but ruled in the Petitioner\'s favor regardless. The Clerk\'s office notes that this means the observer found the Petitioner\'s case convincing even without corroboration, which is either confidence in the evidence or distrust of neighbors in general.';
  } else if (c[2] === 0) {
    out.pattern = 'The observer assessed Ms. Sparrow as fully credible. The Clerk\'s office has read all ten pages of her material and respects the observer\'s confidence.';
  } else {
    out.pattern = 'The observer\'s rulings do not follow an obvious pattern. The Clerk\'s office has seen this before and finds it more honest than consistency, which in the Clerk\'s experience is usually a sign that someone decided the outcome before hearing the case.';
  }

  /* Zip tie specific add */
  if (c[1] === 1) {
    out.pattern += ' On the matter of the zip tie, the observer awarded it to the bird who found it, which the Clerk\'s office considers factually defensible and structurally reckless.';
  }

  /* Para 3: Temperament */
  if (strict >= 3) {
    out.temperament = 'Temperament: Decisive. Punitive with confidence. Would clear a docket efficiently. The birds who appeared before this observer would leave feeling that they had been heard briefly and judged thoroughly.';
  } else if (lenient >= 3) {
    out.temperament = 'Temperament: Generous. Inclined to see the best in birds who have not earned it. Would struggle with repeat offenders but would be the judge that respondents request by name.';
  } else if (moderate >= 3) {
    out.temperament = 'Temperament: Measured. Inclined toward remedy over punishment. Would likely agonize over sentencing in a way the Clerk\'s office finds time-consuming but not without merit.';
  } else if (strict > lenient) {
    out.temperament = 'Temperament: Sympathetic to the organized. Suspicious of birds who describe departure as clearing their head. Would perform adequately in a district with fewer complicated marriages, which is to say not this one.';
  } else if (lenient > strict) {
    out.temperament = 'Temperament: Believes in second chances, or at minimum in the appearance of believing in them. The Clerk\'s office notes that leniency and optimism are difficult to distinguish from the outside.';
  } else {
    out.temperament = 'Temperament: Uncertain. Changed direction between the No-Perch Order and the final ruling in a way that suggests the closing statements had an effect. The Clerk\'s office notes that judges who are moved by closing statements tend to be moved by many things, which is a quality and a liability.';
  }
  out.temperament += ' Not recommended for appointment at this time, though the Clerk acknowledges the bar in this district is not high.';

  /* Para 4: Agreement */
  var agree = 0;
  for (var i = 0; i < 4; i++) { if (c[i] === OWL[i]) agree++; }
  out.agree = 'The observer agreed with Judge Owl on ' + agree + ' of 4 rulings.';
  if (agree === 4) out.agree += ' The Clerk\'s office notes this alignment without comment, which is itself a comment.';
  else if (agree === 0) out.agree += ' The Clerk\'s office notes this without judgment but with both eyebrows raised.';
  else if (agree === 1) out.agree += ' The Clerk\'s office finds this level of disagreement notable but not unprecedented.';

  return out;
}

/* RENDER */
function renderPips() {
  var h = '';
  for (var i = 0; i < totalSteps; i++) {
    var cls = 'pip';
    if (i < step) cls += ' done';
    else if (i === step) cls += ' now';
    h += '<div class="' + cls + '"></div>';
  }
  document.getElementById('pips').innerHTML = h;
}

function renderStep(s) {
  var data = STEPS[s];
  var h = '';
  data.cards.forEach(function(c) {
    if (c.type === 'info') {
      h += '<div class="card"><div class="card-label">' + c.label + '</div><div class="card-text">' + c.text + '</div></div>';
    } else if (c.type === 'quotes') {
      h += '<div class="card">';
      c.quotes.forEach(function(q) {
        h += '<div class="qt"><div class="qt-t">' + q.t + '</div><div class="qt-a">' + q.a + '</div></div>';
      });
      if (c.clerk) h += '<div class="cl"><div class="cl-t">' + c.clerk + '</div></div>';
      h += '</div>';
    } else if (c.type === 'decision') {
      h += '<div class="card"><div class="q">' + c.q + '</div>';
      c.opts.forEach(function(o, i) {
        h += '<div class="opt" data-idx="' + i + '" onclick="pick(this,' + i + ')"><div class="opt-t">' + o.t + '</div><div class="opt-d">' + o.d + '</div></div>';
      });
      h += '</div>';
    }
  });
  document.getElementById('content').innerHTML = h;
  renderPips();
  var btn = document.getElementById('goBtn');
  btn.classList.add('dim');
  btn.style.display = '';
  btn.textContent = s === STEPS.length - 1 ? 'Submit assessment \u2192' : 'Next matter \u2192';
}

function renderAssessment() {
  var a = buildAssessment();
  var h = '';
  h += '<div class="card"><div class="card-label">Judicial assessment \u2014 Gallery observer</div>';
  h += '<div class="card-text"><p>' + a.summary + '</p><p>' + a.pattern + '</p><p>' + a.agree + '</p></div></div>';
  h += '<div class="card"><div class="cl"><div class="cl-t">' + a.temperament + '</div></div>';
  h += '<div class="cl" style="margin-top:.8rem"><div class="cl-t">This assessment has been filed with the Clerk\u2019s office and cannot be appealed. The gallery exit is to your left. The foraging grounds close at dusk.</div></div></div>';

  /* Owl's ruling reveal */
  h += '<div class="card"><div class="assess-owl"><div class="assess-owl-label">Judge Owl\u2019s actual ruling</div>';
  h += '<div class="assess-owl-t">"The petition is granted. The nest at 14 Sycamore Lane is awarded to the Petitioner, including all materials. The zip tie is designated a structural fixture of the nest and is not awarded to either party individually. It is the nest\u2019s."</div>';
  h += '<div class="assess-owl-t" style="margin-top:.6rem">"A No-Perch Order is granted at a modified radius of thirty wingspans. Custody of the two eggs is awarded to the Petitioner, with supervised visitation through the Clerk\u2019s office. The Respondent is reminded that \u2018supervised\u2019 means someone is watching. It will not be Ms. Sparrow."</div>';
  h += '</div></div>';

  document.getElementById('content').innerHTML = h;
  renderPips();
  document.getElementById('goBtn').style.display = 'none';
}

function pick(el, idx) {
  el.closest('.card').querySelectorAll('.opt').forEach(function(o) { o.classList.remove('sel'); });
  el.classList.add('sel');
  choices[step] = idx;
  document.getElementById('goBtn').classList.remove('dim');
}

function advance() {
  if (typeof choices[step] === 'undefined') return;
  step++;
  if (step >= STEPS.length) {
    renderAssessment();
  } else {
    renderStep(step);
  }
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* INIT */
renderStep(0);
</script>

</body>
</html>
