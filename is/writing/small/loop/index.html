<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>loop</title>
<style>
  :root {
    --bg: #0d0c0a;
    --text: #d8cfb4;
    --prompt: #b89868;
    --muted: #8a7d5a;
    --faint: #4a4236;
    --border: #2a251e;
    --sprite: #a04545;
    --cursor: #c7a770;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 24px;
  }

  #frame {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 18px;
  }

  /* --- Title --- */
  #title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #title .name { color: var(--prompt); }
  #title .sep  { color: var(--faint); margin: 0 4px; }

  /* --- Main (stage + phases layered) --- */
  #main {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* --- Phases --- */
  .phase { display: none; flex-direction: column; flex: 1; }
  .phase.active { display: flex; }

  /* --- Worksheet (terminal conversation, below stage) --- */
  #worksheet-phase {
    flex: 0 0 auto;
    overflow: hidden;
    transition: opacity 0.3s;
  }

  #worksheet-phase.fading-out {
    opacity: 0;
    pointer-events: none;
  }

  #conversation {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 8px 0 0;
  }

  .entry {
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.55;
    flex-shrink: 0;
  }

  .entry-prompt {
    color: var(--muted);
    letter-spacing: 0.2px;
  }

  .entry-answer {
    color: var(--muted);
    letter-spacing: 0.2px;
    padding-left: 16px;
    margin-top: 4px;
  }

  #active-line {
    flex-shrink: 0;
  }

  #active-prompt {
    color: var(--prompt);
    font-size: 14px;
    letter-spacing: 0.2px;
    min-height: 22px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  #active-prompt.typing::after {
    content: '_';
    color: var(--cursor);
    animation: blink 1.1s step-end infinite;
    margin-left: 1px;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }

  #active-input-row {
    display: flex;
    align-items: center;
    padding-left: 16px;
    margin-top: 4px;
  }
  #active-input-row.hidden { display: none; }

  #active-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    caret-color: var(--cursor);
    padding: 2px 0;
    letter-spacing: 0.2px;
  }

  /* --- Begin button --- */
  #begin-row {
    display: none;
    justify-content: center;
    padding: 8px 0 4px;
    flex-shrink: 0;
  }
  #begin-row.visible { display: flex; }

  .begin-btn {
    font-size: 12px;
    color: var(--cursor);
    padding: 10px 24px;
    border: 1px solid var(--prompt);
    cursor: pointer;
    background: transparent;
    letter-spacing: 0.4px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .begin-btn:hover {
    color: var(--text);
    border-color: var(--cursor);
    background: rgba(199, 167, 112, 0.06);
  }

  /* --- Game --- */
  #game-phase {
    justify-content: center;
  }

  #stage-wrap {
    position: relative;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 24px 0;
    display: flex;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  #stage {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 640 / 280;
  }

  #loop-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  #sprite {
    position: absolute;
    width: 16px;
    height: 20px;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  #thought-panel {
    min-height: 72px;
    text-align: center;
    padding: 24px 12px 4px;
    opacity: 0;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }
  #thought-panel.visible { opacity: 1; }

  #thought-text {
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.1px;
    line-height: 1.55;
    max-width: 520px;
    margin: 0 auto;
  }

  #game-hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
    text-align: center;
    min-height: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }
  #game-hint.visible { opacity: 1; }

  #reset {
    font-size: 10px;
    color: var(--faint);
    text-align: center;
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.3px;
    padding: 12px 0 0;
    flex-shrink: 0;
  }
  #reset:hover { color: var(--muted); }

  /* --- Footnote --- */
  #footnote {
    font-size: 10px;
    color: var(--faint);
    text-align: center;
    letter-spacing: 0.3px;
    padding-top: 12px;
    flex-shrink: 0;
  }

  #back-link {
    color: var(--faint);
    text-decoration: none;
    transition: color 0.15s;
  }
  #back-link:hover { color: var(--muted); }
</style>
</head>
<body>
  <div id="frame">
    <div id="title">
      <span class="name">loop</span><span class="sep">:</span><span>for thoughts that keep coming back.</span>
    </div>

    <div id="main">
      <div id="stage-wrap">
        <div id="stage">
          <svg id="loop-svg" width="640" height="280" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="320" cy="140" rx="270" ry="100" fill="none" stroke="#4a4236" stroke-width="1"/>
            <g id="markers"></g>
          </svg>
          <div id="sprite"></div>
        </div>
      </div>

      <section id="worksheet-phase" class="phase active">
        <div id="conversation">
          <div id="history"></div>
          <div id="active-line">
            <div id="active-prompt"></div>
            <div id="active-input-row" class="hidden">
              <input id="active-input" type="text" autocomplete="off" spellcheck="false" />
            </div>
          </div>
        </div>

        <div id="begin-row">
          <button class="begin-btn" id="begin-btn">begin</button>
        </div>
      </section>

      <section id="game-phase" class="phase">
        <div id="thought-panel">
          <div id="thought-text"></div>
        </div>

        <div id="game-hint">press space to pass</div>

        <div id="reset">reset</div>
      </section>
    </div>

    <div id="footnote">
      <a id="back-link" href="/is/writing/small/">back</a>
    </div>
  </div>

<script>
  // ---- Prompts ----
  const PROMPTS = {
    thought:  '> give me the thought:',
    response: '\u00bb and when it does, you say:',
    meta:     '\u2234 another? [enter to add \u00b7 begin to start]',
    done:     "\u2234 that's five. press begin."
  };

  const PROMPT_TYPE_MS = 22;
  const MAX_THOUGHTS = 5;

  // ---- Game config ----
  const BREAK_COUNT = 4;
  const LOOP_DURATION_MS = 18000;
  const STOP_TIMEOUT_MS = 8000;
  const WALK_FRAME_MS = 160;

  const ELLIPSE_CX = 320;
  const ELLIPSE_CY = 140;
  const ELLIPSE_RX = 270;
  const ELLIPSE_RY = 100;

  const SPRITE_COLOR = '#a04545';
  const MARKER_COLOR = '#b89868';
  const TWO_PI = 2 * Math.PI;

  // ---- Sprite ----
  function spriteFrame(a) {
    const legs = a
      ? '<rect x="2" y="7" width="1" height="3" fill="' + SPRITE_COLOR + '"/><rect x="5" y="7" width="1" height="3" fill="' + SPRITE_COLOR + '"/>'
      : '<rect x="1" y="7" width="2" height="3" fill="' + SPRITE_COLOR + '"/><rect x="5" y="7" width="2" height="3" fill="' + SPRITE_COLOR + '"/>';
    return '<svg viewBox="0 0 8 10" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" width="16" height="20">' +
      '<rect x="3" y="0" width="2" height="2" fill="' + SPRITE_COLOR + '"/>' +
      '<rect x="2" y="2" width="4" height="1" fill="' + SPRITE_COLOR + '"/>' +
      '<rect x="2" y="3" width="4" height="2" fill="' + SPRITE_COLOR + '"/>' +
      '<rect x="3" y="5" width="2" height="2" fill="' + SPRITE_COLOR + '"/>' +
      legs +
      '</svg>';
  }

  function ellipsePos(angle) {
    return {
      x: ELLIPSE_CX + ELLIPSE_RX * Math.cos(angle),
      y: ELLIPSE_CY + ELLIPSE_RY * Math.sin(angle)
    };
  }

  function normalizeAngle(a) {
    return ((a % TWO_PI) + TWO_PI) % TWO_PI;
  }

  function crossedAngle(prev, curr, target) {
    if (curr < prev) return target > prev || target <= curr;
    return target > prev && target <= curr;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---- DOM refs ----
  const worksheetPhase = document.getElementById('worksheet-phase');
  const gamePhase      = document.getElementById('game-phase');
  const historyEl      = document.getElementById('history');
  const activePrompt   = document.getElementById('active-prompt');
  const activeInputRow = document.getElementById('active-input-row');
  const activeInput    = document.getElementById('active-input');
  const beginRow       = document.getElementById('begin-row');
  const beginBtn       = document.getElementById('begin-btn');
  const markersGroup   = document.getElementById('markers');
  const sprite         = document.getElementById('sprite');
  const thoughtPanel   = document.getElementById('thought-panel');
  const thoughtText    = document.getElementById('thought-text');
  const gameHint       = document.getElementById('game-hint');
  const resetEl        = document.getElementById('reset');

  // ---- Worksheet state ----
  let currentStep = 'thought';
  let thoughts = [];
  let currentDraft = null;
  let typingTimer = null;
  let isPromptTyping = false;

  function typePrompt(text, onDone) {
    if (typingTimer) clearInterval(typingTimer);
    activePrompt.textContent = '';
    activePrompt.classList.add('typing');
    isPromptTyping = true;
    activeInputRow.classList.add('hidden');
    let i = 0;
    typingTimer = setInterval(() => {
      activePrompt.textContent += text.charAt(i);
      i++;
      if (i >= text.length) {
        clearInterval(typingTimer);
        typingTimer = null;
        isPromptTyping = false;
        if (onDone) onDone();
      }
    }, PROMPT_TYPE_MS);
  }

  function showInputAfterPrompt() {
    activePrompt.classList.remove('typing');
    activeInput.value = '';
    activeInputRow.classList.remove('hidden');
    setTimeout(() => activeInput.focus(), 30);
  }

  function showBeginAfterPrompt() {
    activePrompt.classList.remove('typing');
    activeInputRow.classList.add('hidden');
    beginRow.classList.add('visible');
  }

  function showPrompt(key) {
    const text = PROMPTS[key];
    typePrompt(text, () => {
      if (key === 'thought' || key === 'response') {
        showInputAfterPrompt();
      } else if (key === 'meta' || key === 'done') {
        showBeginAfterPrompt();
      }
    });
  }

  function commitEntry(promptText, answerText) {
    const entry = document.createElement('div');
    entry.className = 'entry';
    entry.innerHTML =
      '<div class="entry-prompt">' + escapeHtml(promptText) + '</div>' +
      '<div class="entry-answer">' + escapeHtml(answerText) + '</div>';
    historyEl.appendChild(entry);
    activePrompt.textContent = '';
  }

  function handleWorksheetEnter() {
    if (isPromptTyping) return;
    const val = activeInput.value.trim();

    if (currentStep === 'thought') {
      if (!val) return;
      commitEntry(PROMPTS.thought, val);
      currentDraft = { thought: val };
      currentStep = 'response';
      showPrompt('response');
    } else if (currentStep === 'response') {
      if (!val) return;
      commitEntry(PROMPTS.response, val);
      currentDraft.response = val;
      thoughts.push(currentDraft);
      currentDraft = null;
      if (thoughts.length >= MAX_THOUGHTS) {
        currentStep = 'done';
        showPrompt('done');
      } else {
        currentStep = 'meta';
        showPrompt('meta');
      }
    } else if (currentStep === 'meta') {
      beginRow.classList.remove('visible');
      currentStep = 'thought';
      showPrompt('thought');
    } else if (currentStep === 'done') {
      startGame();
    }
  }

  activeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleWorksheetEnter();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (!worksheetPhase.classList.contains('active')) return;
    // Enter handler when active input is hidden (meta / done states)
    if ((currentStep === 'meta' || currentStep === 'done') && e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleWorksheetEnter();
    }
  });

  beginBtn.addEventListener('click', () => {
    if (thoughts.length < 1) return;
    startGame();
  });

  // ---- Game state ----
  let markers = [];
  let spriteState = 'idle';
  let spriteAngle = 0;
  const angleSpeed = TWO_PI / LOOP_DURATION_MS;
  let lastTime = null;
  let walkFrameTimer = null;
  let currentMarker = null;
  let stopTimer = null;
  let rafId = null;

  function startGame() {
    if (document.activeElement && document.activeElement.blur) {
      document.activeElement.blur();
    }

    worksheetPhase.classList.add('fading-out');

    setTimeout(() => {
      worksheetPhase.classList.remove('active');
      worksheetPhase.classList.remove('fading-out');
      gamePhase.classList.add('active');
      window.scrollTo(0, 0);

      markers = [];
      markersGroup.innerHTML = '';
      const startAngle = normalizeAngle(-Math.PI / 2);
      const offset = Math.PI / 6;
      const step = TWO_PI / thoughts.length;
      for (let i = 0; i < thoughts.length; i++) {
        const a = normalizeAngle(startAngle + offset + i * step);
        const pos = ellipsePos(a);
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        el.setAttribute('cx', pos.x);
        el.setAttribute('cy', pos.y);
        el.setAttribute('r', '2.5');
        el.setAttribute('fill', MARKER_COLOR);
        el.style.transition = 'opacity 0.5s';
        markersGroup.appendChild(el);
        markers.push({
          angle: a,
          thought: thoughts[i],
          dismissals: 0,
          active: true,
          el: el
        });
      }

      spriteAngle = startAngle;
      spriteState = 'walking';
      lastTime = null;
      updateSpritePosition();
      startWalkFrames();
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(tick);
    }, 300);
  }

  function updateSpritePosition() {
    const pos = ellipsePos(spriteAngle);
    sprite.style.left = (pos.x / 640 * 100) + '%';
    sprite.style.top = (pos.y / 280 * 100) + '%';
  }

  function startWalkFrames() {
    stopWalkFrames();
    let a = true;
    sprite.innerHTML = spriteFrame(a);
    walkFrameTimer = setInterval(() => {
      a = !a;
      sprite.innerHTML = spriteFrame(a);
    }, WALK_FRAME_MS);
  }

  function stopWalkFrames() {
    if (walkFrameTimer) {
      clearInterval(walkFrameTimer);
      walkFrameTimer = null;
    }
    sprite.innerHTML = spriteFrame(true);
  }

  function tick(timestamp) {
    if (spriteState === 'idle') { rafId = null; return; }
    if (lastTime === null) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 100);
    lastTime = timestamp;

    if (spriteState === 'walking') {
      const prev = spriteAngle;
      spriteAngle = normalizeAngle(spriteAngle + dt * angleSpeed);
      let collided = false;
      for (let i = 0; i < markers.length; i++) {
        const m = markers[i];
        if (!m.active) continue;
        if (crossedAngle(prev, spriteAngle, m.angle)) {
          spriteAngle = m.angle;
          updateSpritePosition();
          stopAtMarker(m);
          collided = true;
          break;
        }
      }
      if (!collided) updateSpritePosition();
    }

    rafId = requestAnimationFrame(tick);
  }

  function stopAtMarker(m) {
    spriteState = 'stopped';
    currentMarker = m;
    stopWalkFrames();
    thoughtText.textContent = m.thought.thought;
    thoughtPanel.classList.add('visible');
    gameHint.classList.add('visible');
    if (stopTimer) clearTimeout(stopTimer);
    stopTimer = setTimeout(() => resumeFromMarker(false), STOP_TIMEOUT_MS);
  }

  function resumeFromMarker(counted) {
    if (!currentMarker) return;
    const m = currentMarker;
    if (counted) {
      m.dismissals += 1;
      if (m.dismissals >= BREAK_COUNT) {
        m.active = false;
        if (m.el) m.el.style.opacity = '0';
      }
    }
    if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
    thoughtPanel.classList.remove('visible');
    gameHint.classList.remove('visible');
    currentMarker = null;
    setTimeout(() => {
      if (spriteState === 'stopped') {
        spriteState = 'walking';
        startWalkFrames();
        lastTime = null;
      }
    }, 300);
  }

  document.addEventListener('keydown', (e) => {
    if (spriteState !== 'stopped') return;
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      resumeFromMarker(true);
    }
  });

  resetEl.addEventListener('click', resetToWorksheet);

  function resetToWorksheet() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    stopWalkFrames();
    if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
    spriteState = 'idle';
    markers = [];
    markersGroup.innerHTML = '';
    sprite.innerHTML = spriteFrame(true);
    spriteAngle = normalizeAngle(-Math.PI / 2);
    updateSpritePosition();
    thoughtPanel.classList.remove('visible');
    gameHint.classList.remove('visible');
    currentMarker = null;

    thoughts = [];
    currentDraft = null;
    historyEl.innerHTML = '';
    activeInput.value = '';
    activePrompt.textContent = '';
    activePrompt.classList.remove('typing');
    activeInputRow.classList.add('hidden');
    beginRow.classList.remove('visible');

    gamePhase.classList.remove('active');
    worksheetPhase.classList.add('active');
    window.scrollTo(0, 0);

    currentStep = 'thought';
    showPrompt('thought');
  }

  // ---- Init ----
  spriteAngle = normalizeAngle(-Math.PI / 2);
  updateSpritePosition();
  sprite.innerHTML = spriteFrame(true);
  showPrompt('thought');
</script>
</body>
</html>
