<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality of Life, or Inflation?</title>
<meta name="description" content="Quality of life, or inflation? A small tool for sorting real upgrades from creeping baselines.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg-elev: #11141a;
    --bg-elev-2: #161a22;
    --rule: #1f242e;
    --rule-soft: #161a22;
    --text: #e8eaed;
    --text-soft: #9098a8;
    --text-faint: #5a6372;
    --accent: #ff5d3a;
    --inflation: #ff5d3a;
    --inflation-glow: rgba(255, 93, 58, 0.35);
    --qol: #5cf2a4;
    --qol-glow: rgba(92, 242, 164, 0.35);
    --both: #8a92a3;
    --display: 'Space Grotesk', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255, 93, 58, 0.05), transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(92, 242, 164, 0.03), transparent 70%);
    background-attachment: fixed;
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 24px 100px;
  }

  /* ============================ HEADER ============================ */
  header {
    margin-bottom: 28px;
  }

  .header-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 6px;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 3px 8px;
    border: 1px solid var(--accent);
    border-radius: 2px;
    line-height: 1;
  }

  .header-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
  }

  h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(28px, 4.2vw, 42px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 .accent { color: var(--accent); }

  /* ============================ DASHBOARD ============================ */
  .dashboard {
    background: rgba(10, 12, 16, 0.92);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 30px 28px 22px;
    margin-bottom: 24px;
    position: sticky;
    top: 12px;
    z-index: 10;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* ============================ SCALE ============================ */
  .scale-region { margin-bottom: 26px; }

  .scale-poles {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .scale-poles .left { color: var(--inflation); }
  .scale-poles .right { color: var(--qol); }

  .scale-canvas { position: relative; height: 56px; width: 100%; }

  .scale-svg { width: 100%; height: 100%; overflow: visible; }

  .scale-line { stroke: var(--text-soft); stroke-width: 1; }
  .tick-micro { stroke: var(--text-faint); stroke-width: 1; opacity: 0.45; }
  .tick-minor { stroke: var(--text-faint); stroke-width: 1; opacity: 0.7; }
  .tick-major { stroke: var(--text-soft); stroke-width: 1.2; }
  .scale-center-mark { stroke: var(--text); stroke-width: 2; }
  .pole-cap { stroke-width: 2; fill: none; }
  .pole-cap.left { stroke: var(--inflation); }
  .pole-cap.right { stroke: var(--qol); }
  .zone { opacity: 0.06; }
  .zone.inflation { fill: var(--inflation); }
  .zone.qol { fill: var(--qol); }

  .marker { transition: transform 1000ms cubic-bezier(0.32, 1.4, 0.5, 1); }

  .marker-trail {
    stroke: var(--accent);
    stroke-width: 2;
    fill: none;
    opacity: 0;
    transition: opacity 600ms ease;
  }
  .marker.lean-inflation .marker-trail { stroke: var(--inflation); opacity: 0.4; }
  .marker.lean-qol .marker-trail { stroke: var(--qol); opacity: 0.4; }

  .marker-glow { fill: var(--accent); opacity: 0.18; filter: blur(6px); transition: fill 500ms ease; }
  .marker.lean-inflation .marker-glow { fill: var(--inflation); }
  .marker.lean-qol .marker-glow { fill: var(--qol); }

  .marker-ring { fill: none; stroke: var(--text); stroke-width: 1.5; transition: stroke 500ms ease; }
  .marker.lean-inflation .marker-ring { stroke: var(--inflation); }
  .marker.lean-qol .marker-ring { stroke: var(--qol); }

  .marker-dot { fill: var(--accent); transition: fill 500ms ease; }
  .marker.lean-inflation .marker-dot { fill: var(--inflation); }
  .marker.lean-qol .marker-dot { fill: var(--qol); }

  .marker.inactive .marker-glow,
  .marker.inactive .marker-trail { opacity: 0; }
  .marker.inactive .marker-ring { stroke: var(--text-faint); opacity: 0.5; }
  .marker.inactive .marker-dot { fill: var(--text-faint); }

  /* Item meta */
  .item-meta {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    min-height: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .item-meta .name { color: var(--text); font-weight: 500; }
  .item-meta .key {
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 10px;
    margin-right: 8px;
  }
  .item-meta .reading {
    color: var(--text-soft);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }

  /* ============================ AXIS GRID ============================ */
  .axis-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  @media (max-width: 720px) {
    .axis-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .axis-cell {
    background: var(--bg-elev-2);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 10px 10px 12px;
    transition: border-color 300ms ease, background 300ms ease;
    position: relative;
    overflow: hidden;
  }

  .axis-cell::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--rule);
    transition: background 400ms ease;
  }

  .axis-cell.lean-inflation::before { background: var(--inflation); }
  .axis-cell.lean-qol::before { background: var(--qol); }
  .axis-cell.both::before { background: var(--both); }
  .axis-cell.current { border-color: var(--accent); }

  .axis-num {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-faint);
  }

  .axis-name {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    margin-top: 2px;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .axis-state {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 14px;
  }

  .axis-state.lean-inflation { color: var(--inflation); }
  .axis-state.lean-qol { color: var(--qol); }
  .axis-state.both { color: var(--both); }

  .axis-state-mark {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--rule);
    transition: background 300ms ease, box-shadow 300ms ease;
  }

  .axis-cell.lean-inflation .axis-state-mark { background: var(--inflation); box-shadow: 0 0 8px var(--inflation-glow); }
  .axis-cell.lean-qol .axis-state-mark { background: var(--qol); box-shadow: 0 0 8px var(--qol-glow); }
  .axis-cell.both .axis-state-mark { background: var(--both); }

  /* ============================ ITEM PICKER ============================ */
  .picker { margin-top: 8px; }

  .picker-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .item-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
  }

  .search {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    margin-bottom: 14px;
    transition: border-color 180ms ease, background 180ms ease;
    letter-spacing: 0.02em;
  }

  .search:focus { outline: none; border-color: var(--accent); background: var(--bg-elev-2); }
  .search::placeholder { color: var(--text-faint); }

  .item-list {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    overflow: hidden;
    background: var(--rule-soft);
  }

  @media (max-width: 540px) {
    .item-list { grid-template-columns: 1fr; }
  }

  .item-list li { background: var(--bg-elev); }

  .item-list li button {
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    font-family: var(--display);
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    transition: background 140ms ease, color 140ms ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .item-list li button::before {
    content: '+';
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-faint);
    transition: color 140ms ease, transform 140ms ease;
  }

  .item-list li button:hover { background: var(--bg-elev-2); color: var(--accent); }
  .item-list li button:hover::before { color: var(--accent); transform: rotate(45deg); }
  .item-list li.hidden { display: none; }

  /* ============================ QUESTION SLOT ============================ */
  .question-slot {
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 28px 28px 24px;
    min-height: 320px;
    position: relative;
    overflow: hidden;
  }

  .slot-content { transition: opacity 240ms ease; }
  .slot-content.fading { opacity: 0; }

  .slot-progress {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--rule);
  }

  .slot-progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 500ms ease;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .q-num {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-soft);
    padding: 2px 6px;
    border: 1px solid var(--rule);
    border-radius: 2px;
    line-height: 1;
  }

  .q-axis {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-soft);
  }

  .q-text {
    font-family: var(--display);
    font-size: 19px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .q-options { display: flex; flex-direction: column; gap: 7px; }

  .q-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 3px;
    font-family: var(--display);
    font-size: 14.5px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 140ms ease, background 140ms ease, transform 80ms ease;
    line-height: 1.4;
  }

  .q-option:hover { border-color: var(--text-soft); background: var(--bg-elev-2); }
  .q-option:active { transform: translateY(1px); }
  .q-option.selected {
    border-color: var(--accent);
    background: rgba(255, 93, 58, 0.08);
    color: var(--accent);
  }
  .q-option.disabled { pointer-events: none; opacity: 0.5; }

  /* ============================ SUMMARY ============================ */
  .summary-page {
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  /* Top accent edge */
  .summary-page::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--inflation), var(--both), var(--qol));
  }

  .summary-page.lean-inflation::before { background: var(--inflation); }
  .summary-page.lean-qol::before { background: var(--qol); }

  .summary-head {
    padding: 36px 36px 12px;
  }

  .summary-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .summary-subject {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-soft);
    letter-spacing: 0.04em;
  }

  .summary-subject .key {
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 10px;
    margin-right: 8px;
  }

  .summary-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .summary-position {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(34px, 5vw, 48px);
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin-bottom: 6px;
  }

  .summary-position.lean-inflation { color: var(--inflation); }
  .summary-position.lean-qol { color: var(--qol); }
  .summary-position.both { color: var(--text); }

  .summary-intensity {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text-soft);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* Compact final scale on summary page */
  .summary-scale {
    margin-bottom: 28px;
  }

  .summary-scale-canvas {
    position: relative;
    height: 44px;
    width: 100%;
  }

  /* Body / written reading */
  .summary-body {
    padding: 0 36px 32px;
  }

  .summary-body-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 12px;
  }

  .summary-text {
    font-family: var(--display);
    font-size: 16px;
    line-height: 1.65;
    color: var(--text-soft);
  }

  .summary-text p + p { margin-top: 14px; }

  .summary-text em {
    font-style: normal;
    color: var(--text);
    font-weight: 500;
  }

  /* Disclosure for axis breakdown */
  .axes-disclosure {
    border-top: 1px solid var(--rule);
  }

  .axes-toggle {
    width: 100%;
    background: transparent;
    border: none;
    padding: 18px 36px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    transition: color 140ms ease, background 140ms ease;
  }

  .axes-toggle:hover { color: var(--text); background: var(--bg-elev-2); }

  .axes-toggle .toggle-meta {
    color: var(--text-faint);
    font-weight: 500;
  }

  .axes-toggle .chevron {
    font-family: var(--mono);
    color: var(--text-faint);
    font-size: 14px;
    transition: transform 200ms ease, color 140ms ease;
  }

  .axes-toggle:hover .chevron { color: var(--text); }
  .axes-toggle.open .chevron { transform: rotate(180deg); }

  .axes-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .axes-panel.open {
    max-height: 4000px;
  }

  .axes-panel-inner {
    padding: 4px 36px 32px;
  }

  .axis-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }

  .axis-row:last-child { border-bottom: none; }

  .axis-row-head {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .axis-row-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.12em;
  }

  .axis-row-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text);
  }

  .axis-row-state {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }

  .axis-row-state.lean-inflation { color: var(--inflation); }
  .axis-row-state.lean-qol { color: var(--qol); }
  .axis-row-state.both { color: var(--both); }

  .axis-row-state .arrow { font-size: 12px; }

  .axis-row-text {
    font-family: var(--display);
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text-soft);
    padding-left: 0;
  }

  /* Actions on summary page */
  .actions {
    padding: 24px 36px 32px;
    display: flex;
    gap: 12px;
    border-top: 1px solid var(--rule);
  }

  .action-btn {
    background: transparent;
    border: 1px solid var(--text-soft);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
  }

  .action-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  /* Mobile: tighter padding */
  @media (max-width: 540px) {
    .summary-head, .summary-body, .actions { padding-left: 22px; padding-right: 22px; }
    .axes-toggle { padding-left: 22px; padding-right: 22px; }
    .axes-panel-inner { padding-left: 22px; padding-right: 22px; }
  }

  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    text-align: center;
  }

  footer a {
    color: var(--text-faint);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-faint);
  }

  footer a:hover { color: var(--text); border-bottom-color: var(--text); }

  .hidden-region { display: none; }
</style>
<script src="../../../../analytics.js" defer></script>
</head>
<body>
<div class="wrap">

<header>
  <div class="header-row">
    <span class="badge">Diagnostic</span>
    <span class="header-meta">v0.1 — small tool</span>
  </div>
  <h1>Quality of Life,<br>or <span class="accent">Inflation</span>?</h1>
</header>

<!-- DASHBOARD: visible during selection + questions, hidden on summary -->
<section class="dashboard" id="dashboard">

  <div class="scale-region">
    <div class="scale-poles">
      <span class="left">Lifestyle Inflation</span>
      <span class="right">Quality of Life</span>
    </div>
    <div class="scale-canvas">
      <svg class="scale-svg" viewBox="0 0 800 56" preserveAspectRatio="none">
        <rect class="zone inflation" x="0" y="20" width="400" height="16" />
        <rect class="zone qol" x="400" y="20" width="400" height="16" />
        <line class="pole-cap left" x1="2" y1="16" x2="2" y2="40" />
        <line class="pole-cap right" x1="798" y1="16" x2="798" y2="40" />
        <line class="scale-line" x1="2" y1="28" x2="798" y2="28" />
        <g id="micro-ticks"></g>
        <line class="tick-minor" x1="100" y1="22" x2="100" y2="34" />
        <line class="tick-minor" x1="300" y1="22" x2="300" y2="34" />
        <line class="tick-minor" x1="500" y1="22" x2="500" y2="34" />

<script>
const AXES = [
  {
    id: 'frequency',
    name: 'Frequency',
    question: 'How often will this actually be part of your life?',
    options: [
      { label: 'Daily or near-daily', state: 'qol-strong', text: 'High-frequency use makes the strongest case for durable benefit. Things you touch every day get the most chances to earn their keep.' },
      { label: 'Weekly', state: 'qol', text: 'Regular weekly use is enough to integrate something into life. Not every good thing needs to be daily.' },
      { label: 'Monthly or occasional', state: 'both', text: 'Occasional use is fine for the right thing, but it means the cost has to match. The math gets harder the rarer the use.' },
      { label: 'Rarely, or hard to say', state: 'inflation', text: 'Low projected use is the single best predictor of buyer\'s remorse. If you can\'t picture the use, the use probably isn\'t there.' }
    ]
  },
  {
    id: 'friction',
    name: 'Friction',
    question: 'Does this remove a real, repeated annoyance you have right now?',
    options: [
      { label: 'Yes, a specific recurring problem', state: 'qol-strong', text: 'Removing repeated friction compounds. Each use saves a small amount of effort, and it adds up faster than people expect.' },
      { label: 'Somewhat, but the annoyance is mild', state: 'both', text: 'Mild friction reduction can still be worth it, but rarely justifies a big spend. Worth checking whether the annoyance is real, or imagined in advance.' },
      { label: 'No, or it adds new effort to use', state: 'inflation', text: 'When the new thing creates more steps than it removes, the upgrade is doing the opposite of its job. This happens more than people admit.' }
    ]
  },
  {
    id: 'body',
    name: 'Body',
    question: 'Does this measurably affect your sleep, body, energy, or physical wellbeing?',
    options: [
      { label: 'Yes, directly and daily', state: 'qol-strong', text: 'Body-level effects are high-leverage. Small daily improvements to sleep, posture, or energy compound in ways most spending never does.' },
      { label: 'Indirectly, or only in certain conditions', state: 'both', text: 'Indirect health framings often get retrofitted onto things that aren\'t really about the body. Worth asking whether the health argument came before or after the wanting.' },
      { label: 'No, the appeal isn\'t really physical', state: 'inflation', text: 'When the body argument isn\'t doing real work, it usually means the appeal is somewhere else — aesthetic, emotional, or status-related. Nothing wrong with that, just worth being clear about it.' }
    ]
  },
  {
    id: 'time',
    name: 'Time',
    question: 'Does this save you meaningful time, or reduce time stress?',
    options: [
      { label: 'Yes, clearly — saves time you\'d otherwise spend', state: 'qol-strong', text: 'Time savings are among the most reliable signals of real improvement. Research backs this — buying time tends to make people happier than buying things.' },
      { label: 'Saves some time, but you\'d miss it once you have it', state: 'both', text: 'Time saved at the cost of becoming reliant on something is a trade, not a clean win. Useful, but worth knowing you\'re renting the time, not getting it free.' },
      { label: 'No, or it creates new time costs of its own', state: 'inflation', text: 'When the time math goes negative, the upgrade is pulling the wrong direction. The time spent maintaining the thing is part of its real price.' }
    ]
  },
  {
    id: 'financial',
    name: 'Financial',
    question: 'What is the long-term cost shape?',
    options: [
      { label: 'One-time cost, no ongoing fees or consumables', state: 'qol-strong', text: 'One-time costs cap the financial exposure. You pay once, and the thing is yours to use until it breaks.' },
      { label: 'Modest ongoing costs', state: 'both', text: 'Modest recurring costs are tolerable but should be tracked honestly. They don\'t feel like much month to month, which is exactly the problem.' },
      { label: 'Subscription, frequent consumables, or repair loop', state: 'inflation', text: 'Recurring costs raise your baseline permanently. This is the structural shape of inflation — the spend doesn\'t end when the box is opened.' }
    ]
  },
  {
    id: 'identity',
    name: 'Identity',
    question: 'Would you still want this if no one else knew you had it?',
    options: [
      { label: 'Yes, just as much', state: 'qol-strong', text: 'Want that survives invisibility is want for the thing itself. This is the cleanest signal that the appeal is functional rather than performative.' },
      { label: 'Mostly, but the visibility adds to it', state: 'both', text: 'Some visibility-driven want is normal. The question is whether it\'s a small bonus or a load-bearing part of the appeal.' },
      { label: 'The visibility matters to me', state: 'inflation', text: 'Identity-driven want is the engine of inflation. The thing is partly a costume — which is allowed, but worth knowing about.' }

  },
  {

      { label: 'Something roughly equivalent', state: 'both', text: 'Lateral replacements are usually neutral. Worth checking whether the new thing actually performs better, or just looks newer.' },

      { label: 'Some lasting use, but the appeal fades', state: 'both', text: 'Mixed durability often means the thing gets kept but rarely engaged with. Becomes part of the furniture, in the literal sense.' },
      { label: 'Most of the appeal is at the moment of buying', state: 'inflation', text: 'Purchase-moment dopamine is the dominant signal of inflation. The high is in the buying — which fades on schedule.' }
    ]
  }
];

const ITEMS = [
  { id: 'air-fryer', name: 'Air fryer', baseline: 1 },
  { id: 'air-purifier', name: 'Air purifier', baseline: 2 },
  { id: 'bigger-apartment', name: 'Bigger apartment', baseline: -1 },
  { id: 'designer-version', name: 'Designer version of an ordinary item', baseline: -5 },
  { id: 'ergonomic-chair', name: 'Ergonomic chair', baseline: 5 },
  { id: 'espresso-machine', name: 'Espresso machine', baseline: -2 },
  { id: 'food-delivery-sub', name: 'Food delivery subscription', baseline: -4 },
  { id: 'gym-membership', name: 'Gym membership', baseline: 0 },
  { id: 'meal-kit', name: 'Meal kit subscription', baseline: -2 },
  { id: 'new-phone', name: 'New phone (current one works)', baseline: -4 },
  { id: 'nice-bedding', name: 'Nice bedding', baseline: 4 },
  { id: 'premium-coffee', name: 'Premium coffee setup', baseline: -1 },
  { id: 'quality-knife', name: 'Quality kitchen knife', baseline: 3 },
  { id: 'robot-vacuum', name: 'Robot vacuum', baseline: 2 },
  { id: 'second-monitor', name: 'Second monitor', baseline: 5 },
  { id: 'skincare-routine', name: 'Multi-step skincare routine', baseline: -2 },
  { id: 'smart-home-device', name: 'Smart home device', baseline: 0 },
  { id: 'standing-desk', name: 'Standing desk', baseline: 1 },
  { id: 'streaming-service', name: 'Additional streaming service', baseline: -3 },
  { id: 'weighted-blanket', name: 'Weighted blanket', baseline: 1 }
];

const STATE_WEIGHTS = { 'qol-strong': 2.5, 'qol': 1.5, 'both': 0, 'inflation': -2.5 };
const STATE_TO_LEAN = { 'qol-strong': 'qol', 'qol': 'qol', 'both': 'both', 'inflation': 'inflation' };
const STATE_LABELS = {
  'qol-strong': 'leans Quality of Life',
  'qol': 'leans Quality of Life',
  'both': 'Both',
  'inflation': 'leans Inflation'
};
const STATE_SHORT = { 'qol-strong': 'QoL', 'qol': 'QoL', 'both': 'Both', 'inflation': 'Infl' };

const SCALE_MIN = -20, SCALE_MAX = 20;
const SVG_LEFT = 2, SVG_RIGHT = 798, SVG_CENTER = 400;

let currentItem = null, answers = {}, currentScore = 0, currentQIdx = 0;

const dashboard = document.getElementById('dashboard');
const marker = document.getElementById('marker');
const markerTrail = document.getElementById('marker-trail');
const summaryMarker = document.getElementById('summary-marker');
const summaryMarkerTrail = document.getElementById('summary-marker-trail');
const itemName = document.getElementById('item-name');
const readingState = document.getElementById('reading-state');
const axisGrid = document.getElementById('axis-grid');
const itemList = document.getElementById('item-list');
const itemCount = document.getElementById('item-count');
const picker = document.getElementById('picker');
const questionSlot = document.getElementById('question-slot');
const slotContent = document.getElementById('slot-content');
const progressBar = document.getElementById('progress-bar');
const summaryPage = document.getElementById('summary-page');
const summarySubjectName = document.getElementById('summary-subject-name');
const summaryPosition = document.getElementById('summary-position');
const summaryIntensity = document.getElementById('summary-intensity');
const summaryText = document.getElementById('summary-text');
const axesToggle = document.getElementById('axes-toggle');
const axesToggleMeta = document.getElementById('axes-toggle-meta');
const axesPanel = document.getElementById('axes-panel');
const axesPanelInner = document.getElementById('axes-panel-inner');
const restartBtn = document.getElementById('restart-btn');

function renderMicroTicks() {
  const microGroup = document.getElementById('micro-ticks');
  const skipPositions = new Set([100, 200, 300, 400, 500, 600, 700]);
  for (let x = 20; x <= 780; x += 20) {
    if (skipPositions.has(x)) continue;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('class', 'tick-micro');
    line.setAttribute('x1', x);
    line.setAttribute('y1', 24);
    line.setAttribute('x2', x);
    line.setAttribute('y2', 32);
    microGroup.appendChild(line);
  }
}

function renderAxisGrid() {
  axisGrid.innerHTML = '';
  AXES.forEach((axis, idx) => {
    const cell = document.createElement('div');
    cell.className = 'axis-cell';
    cell.dataset.axisId = axis.id;
    cell.innerHTML = `
      <div class="axis-num">A${String(idx + 1).padStart(2, '0')}</div>
      <div class="axis-name">${axis.name}</div>
      <div class="axis-state">
        <span class="axis-state-mark"></span>
        <span class="axis-state-text">— pending —</span>
      </div>
    `;
    axisGrid.appendChild(cell);
  });
}

function renderItemList() {
  itemList.innerHTML = '';
  ITEMS.forEach(item => {
    const li = document.createElement('li');
    li.dataset.itemId = item.id;
    li.dataset.itemName = item.name.toLowerCase();
    const btn = document.createElement('button');
    btn.textContent = item.name;
    btn.addEventListener('click', () => selectItem(item));
    li.appendChild(btn);
    itemList.appendChild(li);
  });
  updateItemCount();
}

function updateItemCount() {
  itemCount.textContent = `${String(ITEMS.length).padStart(2,'0')} subjects`;
}

function setMarkerFromScore(markerEl, trailEl, score, yPos = 28) {
  const clamped = Math.max(SCALE_MIN, Math.min(SCALE_MAX, score));
  const ratio = (clamped - SCALE_MIN) / (SCALE_MAX - SCALE_MIN);
  const x = SVG_LEFT + ratio * (SVG_RIGHT - SVG_LEFT);
  markerEl.setAttribute('transform', `translate(${x}, ${yPos})`);
  const dx = SVG_CENTER - x;
  trailEl.setAttribute('x2', dx);
  markerEl.classList.remove('lean-inflation', 'lean-qol');
  if (score <= -3) markerEl.classList.add('lean-inflation');
  else if (score >= 3) markerEl.classList.add('lean-qol');
}

function updateProgressBar() {
  const answered = Object.keys(answers).length;
  progressBar.style.width = `${(answered / AXES.length) * 100}%`;
}

function updateAxisCellState(axisId, opt) {
  const cell = axisGrid.querySelector(`[data-axis-id="${axisId}"]`);
  if (!cell || !opt) return;
  const lean = STATE_TO_LEAN[opt.state];
  const leanCls = lean === 'inflation' ? 'lean-inflation' : (lean === 'qol' ? 'lean-qol' : 'both');
  cell.classList.remove('lean-inflation', 'lean-qol', 'both', 'current');
  cell.classList.add(leanCls);
  const stateEl = cell.querySelector('.axis-state');
  stateEl.classList.remove('lean-inflation', 'lean-qol', 'both');
  stateEl.classList.add(leanCls);
  cell.querySelector('.axis-state-text').textContent = STATE_SHORT[opt.state];
}

function markCurrentAxis(axisIdx) {
  axisGrid.querySelectorAll('.axis-cell.current').forEach(c => c.classList.remove('current'));
  if (axisIdx < AXES.length) {
    const axis = AXES[axisIdx];
    const cell = axisGrid.querySelector(`[data-axis-id="${axis.id}"]`);
    if (cell) cell.classList.add('current');
  }
}

function updateReadingState() {
  const answered = Object.keys(answers).length;
  if (answered === 0) readingState.textContent = `0/8 — Baseline`;
  else if (answered < 8) readingState.textContent = `${answered}/8 — Reading`;
  else readingState.textContent = `8/8 — Settled`;
}

function selectItem(item) {
  currentItem = item;
  answers = {};
  currentScore = item.baseline;
  currentQIdx = 0;

  itemName.textContent = item.name;
  marker.classList.remove('inactive');
  setMarkerFromScore(marker, markerTrail, currentScore);
  updateReadingState();
  updateProgressBar();
  renderAxisGrid();

  picker.style.display = 'none';
  questionSlot.classList.remove('hidden-region');
  summaryPage.classList.add('hidden-region');
  summaryPage.classList.remove('lean-inflation', 'lean-qol');

  renderQuestion(0);

  setTimeout(() => {
    questionSlot.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 200);
}

function renderQuestion(idx) {
  const axis = AXES[idx];
  markCurrentAxis(idx);

  const html = `
    <div class="q-meta">
      <span class="q-num">Q${String(idx + 1).padStart(2, '0')} / 08</span>
      <span class="q-axis">${axis.name}</span>
    </div>
    <div class="q-text">${axis.question}</div>
    <div class="q-options">
      ${axis.options.map((opt, optIdx) => `
        <button class="q-option" data-opt-idx="${optIdx}">${opt.label}</button>
      `).join('')}
    </div>
  `;

  swapSlotContent(html, () => {
    slotContent.querySelectorAll('.q-option').forEach(btn => {
      btn.addEventListener('click', () => answerCurrent(parseInt(btn.dataset.optIdx, 10), btn));
    });
  });
}

function answerCurrent(optIdx, btnEl) {
  const axis = AXES[currentQIdx];
  if (answers[axis.id] !== undefined) return;

  const opt = axis.options[optIdx];
  answers[axis.id] = optIdx;

  // Mark selected briefly
  slotContent.querySelectorAll('.q-option').forEach(b => {
    b.classList.add('disabled');
    if (b === btnEl) b.classList.add('selected');
  });

  // Update tracking state
  currentScore += STATE_WEIGHTS[opt.state];
  setMarkerFromScore(marker, markerTrail, currentScore);
  updateAxisCellState(axis.id, opt);
  updateReadingState();
  updateProgressBar();

  // After short delay, advance directly to next question (or summary if last)
  setTimeout(() => {
    const isLast = currentQIdx === AXES.length - 1;
    if (isLast) {
      showSummary();
    } else {
      currentQIdx += 1;
      renderQuestion(currentQIdx);
    }
  }, 380);
}

function swapSlotContent(html, onMounted) {
  slotContent.classList.add('fading');
  setTimeout(() => {
    slotContent.innerHTML = html;
    slotContent.classList.remove('fading');
    if (onMounted) onMounted();
  }, 240);
}

// ============================================================
// SUMMARY PAGE
// ============================================================
function showSummary() {
  const finalScore = currentScore;
  const positionLabel = getPositionLabel(finalScore);
  const intensity = getIntensity(finalScore);
  const lean = finalScore >= 3 ? 'qol' : (finalScore <= -3 ? 'inflation' : 'both');
  const leanClass = lean === 'inflation' ? 'lean-inflation' : (lean === 'qol' ? 'lean-qol' : 'both');

  // Hide dashboard and question slot
  dashboard.classList.add('hidden-region');
  questionSlot.classList.add('hidden-region');

  // Populate summary
  summarySubjectName.textContent = currentItem.name;
  summaryPosition.textContent = positionLabel;
  summaryPosition.className = `summary-position ${leanClass}`;
  summaryIntensity.textContent = intensity;
  summaryText.innerHTML = generateSummaryText(finalScore);

  // Set summary marker
  setMarkerFromScore(summaryMarker, summaryMarkerTrail, finalScore, 22);

  // Render axes panel content
  renderAxesPanel();

  // Toggle meta — count of each lean
  const leanCounts = countLeans();
  axesToggleMeta.textContent = `(${leanCounts.qol} QoL · ${leanCounts.both} Both · ${leanCounts.infl} Inflation)`;

  // Show summary page
  summaryPage.classList.remove('hidden-region');
  summaryPage.classList.add(leanClass);

  // Reset disclosure to closed
  axesPanel.classList.remove('open');
  axesToggle.classList.remove('open');

  setTimeout(() => {
    summaryPage.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function countLeans() {
  let qol = 0, both = 0, infl = 0;
  Object.entries(answers).forEach(([axisId, optIdx]) => {
    const axis = AXES.find(a => a.id === axisId);
    const opt = axis.options[optIdx];
    const lean = STATE_TO_LEAN[opt.state];
    if (lean === 'qol') qol++;
    else if (lean === 'inflation') infl++;
    else both++;
  });
  return { qol, both, infl };
}

function renderAxesPanel() {
  axesPanelInner.innerHTML = '';
  AXES.forEach((axis, idx) => {
    const optIdx = answers[axis.id];
    if (optIdx === undefined) return;
    const opt = axis.options[optIdx];
    const lean = STATE_TO_LEAN[opt.state];
    const leanCls = lean === 'inflation' ? 'lean-inflation' : (lean === 'qol' ? 'lean-qol' : 'both');
    const arrow = lean === 'inflation' ? '◄' : (lean === 'qol' ? '►' : '◆');
    const stateLabel = STATE_LABELS[opt.state];

    const row = document.createElement('div');
    row.className = 'axis-row';
    row.innerHTML = `
      <div class="axis-row-head">
        <span class="axis-row-num">A${String(idx + 1).padStart(2, '0')}</span>
        <span class="axis-row-name">${axis.name}</span>
        <span class="axis-row-state ${leanCls}">
          <span class="arrow">${arrow}</span>
          <span>${stateLabel}</span>
        </span>
      </div>
      <div class="axis-row-text">${opt.text}</div>
    `;
    axesPanelInner.appendChild(row);
  });
}

function getPositionLabel(score) {
  if (score <= -3) return 'Lifestyle Inflation';
  if (score >= 3) return 'Quality of Life Improvement';
  return 'Both, depending on context';
}

function getIntensity(score) {
  const abs = Math.abs(score);
  if (abs <= 2) return '— sitting near the middle —';
  if (abs <= 6) return '— a slight lean —';
  if (abs <= 12) return '— a clear lean —';
  return '— a strong lean —';
}

function generateSummaryText(score) {
  const direction = score >= 0 ? 1 : -1;
  const answeredAxes = Object.entries(answers).map(([axisId, optIdx]) => {
    const axis = AXES.find(a => a.id === axisId);
    const opt = axis.options[optIdx];
    const weight = STATE_WEIGHTS[opt.state];
    return { axis, opt, weight, axisId };
  });

  const supporting = answeredAxes
    .filter(a => Math.sign(a.weight) === direction && a.weight !== 0)
    .sort((a, b) => Math.abs(b.weight) - Math.abs(a.weight))
    .slice(0, 2);

  const counter = answeredAxes
    .filter(a => Math.sign(a.weight) === -direction && a.weight !== 0)
    .sort((a, b) => Math.abs(b.weight) - Math.abs(a.weight))[0];

  const bothAxes = answeredAxes.filter(a => a.weight === 0);

  let html = '';

  if (Math.abs(score) <= 2) {
    html += `<p>This one sits near the middle. The framework can't push it firmly either way — which usually means the answer depends on context the tool doesn't have.</p>`;
    if (bothAxes.length >= 3) {
      html += `<p>Most of the axes came back mixed, which often means this is the kind of thing that's a real improvement for some people in some situations and pure inflation in others. Worth being honest about which version you'd actually be.</p>`;
    } else if (counter) {
      const counterName = counter.axis.name.toLowerCase();
      html += `<p>The pulls roughly cancelled out — <em>${counterName}</em> went one way while other axes went the other. If you want to lean on this verdict either way, look at which of those factors actually matters more in your life.</p>`;
    }
    return html;
  }

  const leanWord = score >= 0 ? 'quality of life' : 'inflation';

  if (supporting.length >= 2) {
    const a = supporting[0].axis.name.toLowerCase();
    const b = supporting[1].axis.name.toLowerCase();
    html += `<p>The strongest signals here are <em>${a}</em> and <em>${b}</em>. Those are the axes doing the most work to push this toward ${leanWord}.</p>`;
  } else if (supporting.length === 1) {
    const a = supporting[0].axis.name.toLowerCase();
    html += `<p><em>${capitalize(a)}</em> is doing most of the lifting on this one. The other axes are quieter, but it's enough on its own to push the reading toward ${leanWord}.</p>`;
  }

  if (counter && Math.abs(counter.weight) >= 2) {
    const counterName = counter.axis.name.toLowerCase();
    const cautionPhrasing = direction > 0
      ? `The one thing pulling the other way is <em>${counterName}</em> — worth a look. A strong reading on the other axes can mask a real problem on a single one.`
      : `<em>${capitalize(counterName)}</em> pushed back, which is worth noting. It doesn't change the overall reading, but it means there's a real argument here that the tool isn't dismissing.`;
    html += `<p>${cautionPhrasing}</p>`;
  }

  if (Math.abs(score) >= 12) {
    if (direction > 0) {
      html += `<p>The framework is being clear about this. Doesn't mean it's the right call for you specifically — but the structural case is solid.</p>`;
    } else {
      html += `<p>The framework is being clear about this. Doesn't mean you can't or shouldn't get it — just that the structural case isn't there. Sometimes that's fine and worth knowing.</p>`;
    }
  }

  return html;
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ============================================================
// AXES DISCLOSURE TOGGLE
// ============================================================
axesToggle.addEventListener('click', () => {
  const isOpen = axesPanel.classList.contains('open');
  if (isOpen) {
    axesPanel.classList.remove('open');
    axesToggle.classList.remove('open');
  } else {
    axesPanel.classList.add('open');
    axesToggle.classList.add('open');
  }
});

// ============================================================
// RESTART
// ============================================================
function restart() {
  currentItem = null;
  answers = {};
  currentScore = 0;
  currentQIdx = 0;

  marker.classList.add('inactive');
  marker.classList.remove('lean-inflation', 'lean-qol');
  setMarkerFromScore(marker, markerTrail, 0);
  itemName.textContent = '— select an item below —';
  readingState.textContent = '';
  progressBar.style.width = '0%';

  renderAxisGrid();

  // Restore dashboard + picker, hide question slot and summary
  dashboard.classList.remove('hidden-region');
  questionSlot.classList.add('hidden-region');
  slotContent.innerHTML = '';

  summaryPage.classList.add('hidden-region');
  summaryPage.classList.remove('lean-inflation', 'lean-qol');
  axesPanel.classList.remove('open');
  axesToggle.classList.remove('open');

  picker.style.display = '';

  setTimeout(() => {
    document.querySelector('header').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

restartBtn.addEventListener('click', restart);

renderMicroTicks();
renderAxisGrid();
renderItemList();
</script>
</body>
