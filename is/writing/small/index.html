<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small things</title>
<meta name="description" content="A shelf of single-page experiences.">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0d0d0d;
  color: #888;
  font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 56px 28px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.page-header {
  margin-bottom: 44px;
}

.back-link {
  display: inline-block;
  font-size: 11px;
  color: #555;
  text-decoration: none;
  letter-spacing: 0.08em;
  margin-bottom: 20px;
  transition: color 0.15s ease;
}

.back-link:hover {
  color: #888;
}

.page-title {
  font-size: 14px;
  color: #cfcfcf;
  font-weight: normal;
  margin-bottom: 8px;
  letter-spacing: 0.01em;
}

.page-intro {
  font-size: 12px;
  color: #555;
  line-height: 1.6;
  max-width: 52ch;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.card {
  display: block;
  background: #141414;
  border: 1px solid #1f1f1f;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.15s ease;
}

.card:hover {
  border-color: #333;
}

.card-image {
  aspect-ratio: 16 / 9;
  background: #1a1a1a;
  overflow: hidden;
}

.card-image img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-body {
  padding: 14px 16px 16px;
}

.card-title {
  font-size: 13px;
  color: #cfcfcf;
  margin-bottom: 6px;
  letter-spacing: 0.01em;
}

.card-desc {
  font-size: 11px;
  color: #666;
  line-height: 1.55;
}

.page-footer {
  margin-top: auto;
  padding-top: 72px;
  font-size: 11px;
  color: #444;
  line-height: 1.6;
}

@media (max-width: 640px) {
  .page {
    padding: 40px 18px;
  }
  .page-header {
    margin-bottom: 32px;
  }
  .grid {
    gap: 14px;
  }
  .page-footer {
    padding-top: 48px;
  }
}
</style>
</head>
<body>
<div class="page">
  <header class="page-header">
    <a class="back-link" href="/is/writing/">&larr; back</a>
    <h1 class="page-title">Small things</h1>
    <p class="page-intro">Single-page experiences. Complete on their own, small enough to live without a room.</p>
  </header>
  <div class="grid">
    <a class="card" href="https://debugu.xyz" target="_blank" rel="noopener">
      <div class="card-image">
        <img src="/is/writing/small/screenshots/debugu.png" alt="debug::u" onerror="this.style.display='none'">
      </div>
      <div class="card-body">
        <div class="card-title">debug::u</div>
        <div class="card-desc">a diagnostic console for what you're feeling.</div>
      </div>
    </a>
    <a class="card" href="/is/writing/small/deadend/">
      <div class="card-image">
        <img src="/is/writing/small/screenshots/deadend.png" alt="deadend" onerror="this.style.display='none'">
      </div>
      <div class="card-body">
        <div class="card-title">deadend</div>
        <div class="card-desc">for getting out of your thought that goes nowhere.</div>
      </div>
    </a>
  </div>
  <footer class="page-footer">more joining as they land.</footer>
</div>
</body>
</html>
