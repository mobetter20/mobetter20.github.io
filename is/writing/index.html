<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ajin.im/is/writing</title>
    <meta
      name="description"
      content="A creative house of rooms: bureaucracy, diagnostics, birds, comedy, and essays."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../creative-house.css" />
    <script src="../../analytics.js" defer></script>
    <script src="../../creative-house.js" defer></script>
    <script src="../../writing-house.js" defer></script>
  </head>
  <body class="house-page writing-house">
    <main class="house-stage">
      <header class="house-lede">
        <p class="path-mark">ajin.im/is/writing</p>
        <p class="house-whisper"><span class="pulse-count" data-room-count-label>Four</span> rooms lit tonight.</p>
      </header>

      <section class="house-frame" aria-label="Creative rooms">
        <div class="house-grid" data-room-count="4">
          <a
            class="room room-bic room-featured"
            href="https://propagandaformyself.xyz"
            target="_blank"
            rel="noreferrer noopener"
            data-room="bic"
          >
            <div class="room-visual bic-visual" aria-hidden="true">
              <div class="bic-paper bic-paper-a ambient-breath"></div>
              <div class="bic-paper bic-paper-b ambient-breath slow"></div>
              <div class="bic-stamp ambient-breath"></div>
              <div class="bic-tab"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Bureau of Interior Conditions</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Domestic life as official record. All matters pending."
                  data-type-kind="copy"
                  style="--ghost-width: 20ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="propagandaformyself.xyz"
                  data-type-kind="meta"
                  style="--ghost-width: 13ch"
                ></span>
              </span>
            </div>
          </a>

          <a
            class="room room-birds"
            href="./avian-district/index.html"
            data-room="birds"
          >
            <div class="room-visual bird-docket-visual" aria-hidden="true">
              <div class="bird-docket-asset ambient-breath slow">
                <img src="../../img/bird-court.png" alt="" />
              </div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Active</p>
              <h2>Bird of Letters</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Official portal, court services, personals, newspapers, and district chat."
                  data-type-kind="copy"
                  style="--ghost-width: 22ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/avian-district"
                  data-type-kind="meta"
                  style="--ghost-width: 23ch"
                ></span>
              </span>
            </div>
          </a>

          <a class="room room-desk" href="/is/writing/desk/" data-room="desk">
            <div class="room-visual essay-visual" aria-hidden="true">
              <div class="essay-room-stack ambient-breath slow">
                <div class="essay-room-sheet essay-room-sheet-back"></div>
                <div class="essay-room-sheet essay-room-sheet-front">
                  <span class="essay-room-note" lang="ko">안녕</span>
                </div>
              </div>
              <div class="essay-glow"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Desk</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Essays and comedy pieces sharing one surface."
                  data-type-kind="copy"
                  style="--ghost-width: 18ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/desk"
                  data-type-kind="meta"
                  style="--ghost-width: 14ch"
                ></span>
              </span>
            </div>
          </a>

          <a class="room room-small room-wide" href="/is/writing/small/" data-room="small">
            <div class="room-visual small-visual" aria-hidden="true">
              <div class="small-shelf">
                <div class="small-shelf-card"></div>
                <div class="small-shelf-card"></div>
                <div class="small-shelf-card"></div>
                <div class="small-shelf-card"></div>
              </div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>small things</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Single-page things. debug::u, deadend, and whatever comes next."
                  data-type-kind="copy"
                  style="--ghost-width: 22ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/small"
                  data-type-kind="meta"
                  style="--ghost-width: 14ch"
                ></span>
              </span>
            </div>
          </a>

        </div>
      </section>

      <footer class="house-footer">
        <p class="house-footer-line">
          <a href="mailto:contact@ajin.im">
            <span
              class="typed-target"
              data-type-text="contact@ajin.im"
              data-type-kind="footer"
              style="--ghost-width: 11ch"
            ></span>
          </a>
          <span>
            <span
              class="typed-target"
              data-type-text="· Seoul"
              data-type-kind="footer"
              style="--ghost-width: 5ch"
            ></span>
          </span>
        </p>
      </footer>
      <div class="writing-cursor" aria-hidden="true"></div>
    </main>
  </body>
</html>
