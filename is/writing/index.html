<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ajin.im/is/writing</title>
    <meta
      name="description"
      content="A creative house of rooms: bureaucracy, diagnostics, birds, comedy, and essays."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../creative-house.css" />
    <script src="../../analytics.js" defer></script>
    <script src="../../creative-house.js" defer></script>
    <script src="../../writing-house.js" defer></script>
  </head>
  <body class="house-page writing-house">
    <main class="house-stage">
      <header class="house-lede">
        <p class="path-mark">ajin.im/is/writing</p>
        <p class="house-whisper"><span class="pulse-count" data-room-count-label>Five</span> rooms lit tonight.</p>
      </header>

      <section class="house-frame" aria-label="Creative rooms">
        <div class="house-grid" data-room-count="5">
          <a
            class="room room-bic room-featured"
            href="https://propagandaformyself.xyz"
            target="_blank"
            rel="noreferrer noopener"
            data-room="bic"
          >
            <div class="room-visual bic-visual" aria-hidden="true">
              <div class="bic-paper bic-paper-a ambient-breath"></div>
              <div class="bic-paper bic-paper-b ambient-breath slow"></div>
              <div class="bic-stamp ambient-breath"></div>
              <div class="bic-tab"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Bureau of Interior Conditions</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Domestic life as official record. All matters pending."
                  data-type-kind="copy"
                  style="--ghost-width: 20ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="propagandaformyself.xyz"
                  data-type-kind="meta"
                  style="--ghost-width: 13ch"
                ></span>
              </span>
            </div>
          </a>

          <a
            class="room room-debug room-wide"
            href="https://debugu.xyz"
            target="_blank"
            rel="noreferrer noopener"
            data-room="debug"
          >
            <div class="room-visual debug-visual" aria-hidden="true">
              <div class="debug-panel">
                <div class="debug-line a"></div>
                <div class="debug-line b"></div>
                <div class="debug-line c"></div>
                <div class="debug-line d"></div>
                <div class="debug-scan"></div>
              </div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>debug::u</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Diagnostic console for your biological computer."
                  data-type-kind="copy"
                  style="--ghost-width: 18ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="debugu.xyz"
                  data-type-kind="meta"
                  style="--ghost-width: 8ch"
                ></span>
              </span>
            </div>
          </a>

          <a
            class="room room-birds"
            href="./bird-of-letters/index.html"
            data-room="birds"
          >
            <div class="room-visual bird-docket-visual" aria-hidden="true">
              <div class="bird-docket-asset ambient-breath slow">
                <img src="../../img/bird-court.png" alt="" />
              </div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Active</p>
              <h2>Bird of Letters</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Court portal, proceedings, newspaper columns, and other public materials."
                  data-type-kind="copy"
                  style="--ghost-width: 23ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/bird-of-letters"
                  data-type-kind="meta"
                  style="--ghost-width: 20ch"
                ></span>
              </span>
            </div>
          </a>

          <a class="room room-wrote" href="./comedy/index.html" data-room="comedy">
            <div class="room-visual wrote-visual" aria-hidden="true">
              <div class="comedy-proposed-set">
                <div class="comedy-proposed-image">
                  <img src="../../img/coffee.png" alt="" />
                </div>
                <div class="spotlight"></div>
              </div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Comedy</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Domestic nonsense, public nonsense, and the occasional bad idea."
                  data-type-kind="copy"
                  style="--ghost-width: 22ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/comedy"
                  data-type-kind="meta"
                  style="--ghost-width: 14ch"
                ></span>
              </span>
            </div>
          </a>

          <a class="room room-essays" href="./essays/index.html" data-room="essays">
            <div class="room-visual essay-visual" aria-hidden="true">
              <div class="essay-room-stack ambient-breath slow">
                <div class="essay-room-sheet essay-room-sheet-back"></div>
                <div class="essay-room-sheet essay-room-sheet-front">
                  <span class="essay-room-note" lang="ko">안녕</span>
                </div>
              </div>
              <div class="essay-glow"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Essays</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Long-form essays and quieter arguments."
                  data-type-kind="copy"
                  style="--ghost-width: 16ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/essays"
                  data-type-kind="meta"
                  style="--ghost-width: 14ch"
                ></span>
              </span>
            </div>
          </a>

        </div>
      </section>

      <footer class="house-footer">
        <p class="house-footer-line">
          <a href="mailto:contact@ajin.im">
            <span
              class="typed-target"
              data-type-text="contact@ajin.im"
              data-type-kind="footer"
              style="--ghost-width: 11ch"
            ></span>
          </a>
          <span>
            <span
              class="typed-target"
              data-type-text="· Seoul"
              data-type-kind="footer"
              style="--ghost-width: 5ch"
            ></span>
          </span>
        </p>
      </footer>
      <div class="writing-cursor" aria-hidden="true"></div>
    </main>
  </body>
</html>
