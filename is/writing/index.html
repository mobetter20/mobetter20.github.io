<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ajin.im/is/writing</title>
    <meta
      name="description"
      content="A creative house of rooms: bureaucracy, diagnostics, birds, comedy, and essays."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../creative-house.css" />
    <script src="../../analytics.js" defer></script>
    <script src="../../creative-house.js" defer></script>
    <script src="../../writing-house.js" defer></script>
  </head>
  <body class="house-page writing-house">
    <main class="house-stage">
      <header class="house-lede">
        <p class="path-mark">ajin.im/is/writing</p>
        <p class="house-whisper"><span class="pulse-five">Five</span> rooms lit tonight.</p>
      </header>

      <section class="house-frame" aria-label="Creative rooms">
        <div class="house-grid">
          <a
            class="room room-bic room-tall"
            href="https://propagandaformyself.xyz"
            target="_blank"
            rel="noreferrer noopener"
            data-room="bic"
          >
            <div class="room-visual bic-visual" aria-hidden="true">
              <div class="bic-paper bic-paper-a ambient-breath"></div>
              <div class="bic-paper bic-paper-b ambient-breath slow"></div>
              <div class="bic-stamp ambient-breath"></div>
              <div class="bic-tab"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room 01 / Live</p>
              <h2>Bureau of Interior Conditions</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Domestic life as official record. All matters pending."
                  data-type-kind="copy"
                  style="--ghost-width: 20ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="propagandaformyself.xyz"
                  data-type-kind="meta"
                  style="--ghost-width: 13ch"
                ></span>
              </span>
            </div>
          </a>

          <a
            class="room room-debug"
            href="https://debugu.xyz"
            target="_blank"
            rel="noreferrer noopener"
            data-room="debug"
          >
            <div class="room-visual debug-visual" aria-hidden="true">
              <div class="debug-panel">
                <div class="debug-line a"></div>
                <div class="debug-line b"></div>
                <div class="debug-line c"></div>
                <div class="debug-line d"></div>
                <div class="debug-scan"></div>
              </div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room 02 / Live</p>
              <h2>debug::u</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Diagnostic console for your biological computer."
                  data-type-kind="copy"
                  style="--ghost-width: 18ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="debugu.xyz"
                  data-type-kind="meta"
                  style="--ghost-width: 8ch"
                ></span>
              </span>
            </div>
          </a>

          <a
            class="room room-birds"
            href="https://www.reddit.com/user/propagandaformyself"
            target="_blank"
            rel="noreferrer noopener"
            data-room="birds"
          >
            <div class="room-visual bird-visual" aria-hidden="true">
              <div class="bird-moon ambient-breath slow"></div>
              <div class="bird-glow"></div>
              <div class="branch"></div>
              <div class="bird-silhouette bird-a"></div>
              <div class="bird-silhouette bird-b"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room 03 / Active</p>
              <h2>Bird of Letters</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Divorced birds, where the joke is how real it feels."
                  data-type-kind="copy"
                  style="--ghost-width: 19ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="reddit.com/u/propagandaformyself"
                  data-type-kind="meta"
                  style="--ghost-width: 17ch"
                ></span>
              </span>
            </div>
          </a>

          <a class="room room-wrote" href="./comedy/index.html" data-room="comedy">
            <div class="room-visual wrote-visual" aria-hidden="true">
              <div class="sheet-stack ambient-breath slow">
                <div class="sheet back"></div>
                <div class="sheet front"></div>
              </div>
              <div class="sheet-tab"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room 04 / Live</p>
              <h2>Comedy</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Domestic nonsense, public nonsense, and the occasional bad idea."
                  data-type-kind="copy"
                  style="--ghost-width: 22ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/comedy"
                  data-type-kind="meta"
                  style="--ghost-width: 14ch"
                ></span>
              </span>
            </div>
          </a>

          <a class="room room-essays room-tall" href="./essays/index.html" data-room="essays">
            <div class="room-visual essay-visual" aria-hidden="true">
              <div class="essay-card ambient-breath"></div>
              <div class="essay-glow"></div>
            </div>
            <div class="room-copy">
              <p class="room-kicker">Room 05 / Live</p>
              <h2>Essays</h2>
              <p>
                <span
                  class="typed-target"
                  data-type-text="Long-form essays and quieter arguments."
                  data-type-kind="copy"
                  style="--ghost-width: 16ch"
                ></span>
              </p>
              <span class="room-meta">
                <span
                  class="typed-target"
                  data-type-text="ajin.im/is/writing/essays"
                  data-type-kind="meta"
                  style="--ghost-width: 14ch"
                ></span>
              </span>
            </div>
          </a>
        </div>
      </section>

      <footer class="house-footer">
        <p class="house-footer-line">
          <a href="mailto:contact@ajin.im">
            <span
              class="typed-target"
              data-type-text="contact@ajin.im"
              data-type-kind="footer"
              style="--ghost-width: 11ch"
            ></span>
          </a>
          <span>
            <span
              class="typed-target"
              data-type-text="· Seoul"
              data-type-kind="footer"
              style="--ghost-width: 5ch"
            ></span>
          </span>
        </p>
      </footer>
      <div class="writing-cursor" aria-hidden="true"></div>
    </main>
  </body>
</html>
