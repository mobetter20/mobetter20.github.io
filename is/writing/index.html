<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/img/a3.png" />
    <link rel="apple-touch-icon" href="/img/a3.png" />
    <title>ajin.im/is/writing</title>
    <meta
      name="description"
      content="A creative house of rooms: bureaucracy, diagnostics, birds, comedy, and essays."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../creative-house.css" />
    <script src="../../analytics.js" defer></script>
    <script src="../../creative-house.js" defer></script>
  </head>
  <body class="house-page writing-house">
    <main class="house-stage">
      <header class="house-lede">
        <p class="house-title"><span class="prefix"><a href="/" target="_self">ajin.im</a> is</span> <span class="verb">writing</span></p>
      </header>

      <section class="house-frame" aria-label="Creative rooms">
        <div class="house-grid" data-room-count="3" style="--desk-grid-rows: 7;">
          <a
            class="room room-featured"
            href="https://propagandaformyself.xyz"
            target="_blank"
            rel="noreferrer noopener"
            data-room="bic"
            style="--room-index: 0; --desk-col-start: 1; --desk-col-span: 7; --desk-row-start: 1; --desk-row-span: 4; --desk-min-height: 23rem;"
          >
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Bureau of Interior Conditions</h2>
              <span class="room-meta">propagandaformyself.xyz</span>
            </div>
          </a>

          <a
            class="room"
            href="/is/writing/bird-coo/"
            data-room="birds"
            style="--room-index: 1; --desk-col-start: 1; --desk-col-span: 12; --desk-row-start: 5; --desk-row-span: 3; --desk-min-height: 15rem;"
          >
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Weekly</p>
              <h2>The Municipal Coo</h2>
              <span class="room-meta">ajin.im/is/writing/bird-coo</span>
            </div>
          </a>

          <a
            class="room room-wide"
            href="/is/writing/small/"
            data-room="small-ware"
            style="--room-index: 2; --desk-col-start: 8; --desk-col-span: 5; --desk-row-start: 1; --desk-row-span: 4; --desk-min-height: 23rem;"
          >
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Small Ware</h2>
              <span class="room-meta">ajin.im/is/writing/small</span>
            </div>
          </a>

        </div>
      </section>

      <footer class="house-footer">
        <p class="house-footer-line">
          <span>for what it's worth, <a href="mailto:contact@ajin.im">contact@ajin.im</a></span>
        </p>
      </footer>
    </main>
  </body>
</html>
