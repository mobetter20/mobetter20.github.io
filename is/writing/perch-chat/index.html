<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Perch — Avian Municipal District</title>
  <meta name="description" content="Community Channels · Observer Access">
  <link rel="canonical" href="https://ajin.im/is/writing/perch-chat/">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D0D0B;
      --bg-panel: #111110;
      --bg-panel-2: #131310;
      --bg-panel-3: #141412;
      --bg-panel-4: #161613;
      --bg-panel-5: #181814;
      --bg-system: #1A1915;
      --text: #C8C4B8;
      --text-muted: #9E9B90;
      --text-soft: #78756B;
      --text-dim: #5C5A52;
      --text-faint: #4A4840;
      --text-ghost: #3D3B34;
      --border: #1E1D19;
      --border-strong: #242320;
      --border-ui: #2E2D28;
      --online: #6B7B5F;
      --clerk: #8B7355;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.4;
      }
      50% {
        opacity: 1;
      }
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-ui);
    }

    .screening-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: "IBM Plex Mono", monospace;
    }

    .screening-panel {
      width: min(90%, 420px);
      max-width: 420px;
      padding: 2.5rem 2rem;
      background: var(--bg-panel-5);
      border: 1px solid var(--border-ui);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .screening-panel.is-entered {
      opacity: 1;
      transform: translateY(0);
    }

    .screening-panel.is-exiting {
      opacity: 0;
      transform: translateY(4px);
    }

    .screening-kicker {
      margin-bottom: 1.5rem;
      color: var(--text-dim);
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .screening-text {
      margin-bottom: 0.5rem;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-line;
    }

    .screening-text.hero {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .screening-text.standard {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0;
    }

    .screening-sub {
      margin-top: 0.75rem;
      color: #8A877C;
      font-size: 0.7rem;
      line-height: 1.6;
      white-space: pre-line;
    }

    .screening-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .screening-option,
    .screening-continue {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border-ui);
      background: transparent;
      cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      text-align: left;
      transition: all 0.15s ease;
      color: var(--text-muted);
    }

    .screening-option:hover,
    .screening-option:focus-visible {
      border-color: var(--text-dim);
      color: var(--text);
      outline: none;
    }

    .screening-continue {
      background: var(--border);
      color: var(--text);
      text-align: center;
    }

    .screening-continue:hover,
    .screening-continue:focus-visible {
      background: var(--border-ui);
      outline: none;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
      height: 100vh;
      min-height: 100dvh;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .mobile-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg-panel-2);
      border-bottom: 1px solid var(--border-ui);
      flex-shrink: 0;
    }

    .mobile-toggle {
      padding: 0.3rem 0.5rem;
      border: 1px solid var(--border-ui);
      background: none;
      color: var(--text-soft);
      cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
    }

    .mobile-title {
      color: var(--text-muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
    }

    .app-main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-overlay {
      display: none;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      width: 220px;
      min-width: 220px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border-ui);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 0.9rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      color: var(--text);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .sidebar-subtitle {
      margin-top: 0.2rem;
      color: var(--text-dim);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.48rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .sidebar-section {
      padding: 0.6rem 0.4rem;
    }

    .sidebar-section.users {
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .sidebar-section.resources {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .sidebar-kicker {
      margin-bottom: 0.4rem;
      padding: 0 0.45rem;
      color: var(--text-ghost);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.45rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .channel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      width: 100%;
      margin-bottom: 0.1rem;
      padding: 0.4rem 0.55rem;
      border: 0;
      border-left: 2px solid transparent;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s ease;
    }

    .channel-item.active {
      background: var(--bg-system);
      border-left-color: var(--text-dim);
    }

    .channel-item.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .channel-main {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
    }

    .channel-prefix {
      color: var(--text-faint);
      font-size: 0.65rem;
      flex-shrink: 0;
    }

    .channel-name {
      color: var(--text-soft);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.68rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-item.active .channel-name {
      color: var(--text);
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.45rem;
    }

    .user-dot {
      width: 5px;
      height: 5px;
      flex-shrink: 0;
      background: var(--text-ghost);
      border-radius: 50%;
    }

    .user-dot.online {
      background: var(--online);
    }

    .user-name {
      font-size: 0.63rem;
    }

    .user-role {
      padding: 0.08rem 0.25rem;
      background: var(--bg-system);
      color: var(--text-dim);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .observer-row {
      margin-top: 0.25rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--bg-system);
    }

    .observer-name {
      color: var(--text-ghost);
      font-size: 0.63rem;
      font-style: italic;
    }

    .observer-dot {
      animation: pulse 3s infinite;
    }

    .resource-link {
      display: block;
      padding: 0.2rem 0.45rem;
      color: inherit;
      text-decoration: none;
    }

    .resource-name {
      color: var(--text-dim);
      font-size: 0.63rem;
    }

    .resource-desc {
      margin-left: 0.4rem;
      color: var(--text-ghost);
      font-size: 0.48rem;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      min-height: 0;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.6rem 1.1rem;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-header-main {
      min-width: 0;
    }

    .chat-title-row {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }

    .chat-title-prefix {
      color: var(--text-faint);
      font-size: 0.7rem;
    }

    .chat-title {
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .chat-desc {
      margin-top: 0.1rem;
      color: var(--text-ghost);
      font-size: 0.55rem;
    }

    .observer-badge {
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
      background: var(--bg-panel-4);
      color: var(--text-ghost);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.45rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      overflow-anchor: none;
      scrollbar-gutter: stable;
      padding: 0.8rem 1.1rem;
    }

    .pinned {
      margin-bottom: 0.8rem;
      padding: 0.45rem 0.65rem;
      border: 1px solid var(--border);
      background: var(--bg-panel-3);
      color: var(--text-faint);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.62rem;
      line-height: 1.6;
    }

    .pinned-label {
      margin-right: 0.4rem;
      color: var(--text-ghost);
      font-size: 0.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .message {
      padding: 0.35rem 0;
    }

    .message.is-new {
      opacity: 0;
      animation: msgIn 0.3s ease forwards;
    }

    .system-message {
      margin: 0.25rem 0;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border-strong);
      background: var(--bg-system);
    }

    .system-meta {
      margin-bottom: 0.25rem;
      color: var(--text-dim);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.45rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .system-text {
      color: var(--clerk);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      line-height: 1.6;
    }

    .message-meta {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .message-author {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.74rem;
      font-weight: 600;
    }

    .message-time {
      color: var(--text-faint);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.52rem;
    }

    .message-text {
      margin-top: 0.1rem;
      color: #B8B4A8;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.8rem;
      line-height: 1.65;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 0;
      color: var(--text-ghost);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.6rem;
    }

    .typing-dots {
      display: flex;
      gap: 0.15rem;
    }

    .typing-dot {
      width: 3px;
      height: 3px;
      background: var(--text-faint);
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }

    .typing-label {
      color: var(--text-ghost);
      font-style: italic;
    }

    .chat-input-shell {
      padding: 0.55rem 1.1rem;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input {
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border-ui);
      background: var(--bg-panel-4);
      color: var(--text-ghost);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      line-height: 1.5;
      letter-spacing: 0.01em;
      cursor: default;
    }

    .chat-input a,
    .chat-input a:visited,
    .chat-input a:hover,
    .chat-input a:active {
      color: var(--text-dim);
      font-weight: 400;
      text-decoration: underline;
      text-decoration-color: var(--text-ghost);
      text-underline-offset: 0.12em;
    }
    @media (max-width: 700px) {
      .mobile-header {
        display: flex;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: block;
        background: rgba(0, 0, 0, 0.5);
      }

      .sidebar-overlay.hidden {
        display: none;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const CHARACTER_COLORS = {
      "T. Nuthatch": "#8B7355",
      "Conrad": "#C27A3A",
      "R. Nuthatch": "#7A8B6F",
      "Cheryl Sparrow": "#9B7EA8",
      "Dennis": "#6B8B9B",
      "E. Starling": "#A89B7E",
      "Denise Dove": "#B08B7A",
      "Arthur P.": "#7B8B8B",
      "Gerald H.": "#8B8B6B",
      "F. Lark": "#7E9B8B",
      "Robin": "#9B7E7E"
    };

    const CHANNELS = [
      {
        id: "municipal",
        name: "municipal-notices",
        desc: "General district updates & coordination",
        pinned: "This channel is designated for municipal notices and community coordination. The Clerk's Office requests that personal disputes be directed to the appropriate filing window. — T. Nuthatch",
        users: [
          { name: "T. Nuthatch", role: "Clerk", status: "online" },
          { name: "Cheryl Sparrow", status: "online" },
          { name: "R. Nuthatch", status: "online" },
          { name: "Conrad", status: "online" },
          { name: "Dennis", status: "idle" },
          { name: "E. Starling", status: "idle" }
        ],
        messages: [
          { time: "4:45 PM", author: "T. Nuthatch", text: "MUNICIPAL NOTICE. A QUANTITY OF BREAD HAS BEEN LEFT ON THE LOW WALL ADJACENT TO THE SOUTH PATH ENTRANCE. THE CLERK'S OFFICE DID NOT AUTHORIZE THIS. RESIDENTS ARE ADVISED TO USE DISCRETION.", system: true, delay: 0 },
          { time: "4:48 PM", author: "Conrad", text: "\"Use discretion\" about bread.", delay: 2000 },
          { time: "4:49 PM", author: "R. Nuthatch", text: "The notice does not say who left it. It should say who left it.", delay: 3500 },
          { time: "4:50 PM", author: "Cheryl Sparrow", text: "Just for context, it was a woman in a green coat. She put it there at approximately 4:20 PM. She tore it into pieces first. Then she stood and watched for about two minutes before leaving.", delay: 3000 },
          { time: "4:51 PM", author: "Cheryl Sparrow", text: "Just for context, the pieces are uneven. Some are large. The large ones are closer to the wall.", delay: 2000 },
          { time: "4:53 PM", author: "Conrad", text: "She stood and watched.", delay: 3000 },
          { time: "4:54 PM", author: "Cheryl Sparrow", text: "Just for context, she had a bag with more bread in it. She only used part of the loaf. The rest went back in the bag.", delay: 2500 },
          { time: "4:56 PM", author: "R. Nuthatch", text: "The low wall is municipal property. Leaving food on municipal property without authorization is a maintenance issue at minimum.", delay: 3500 },
          { time: "4:57 PM", author: "Conrad", text: "She tore it up and watched. That is not feeding. That is entertainment.", delay: 2500 },
          { time: "4:58 PM", author: "Cheryl Sparrow", text: "Just for context, three birds were already eating it by 4:25. I did not recognize any of them. They were not from this district.", delay: 3000 },
          { time: "5:00 PM", author: "R. Nuthatch", text: "Of course they were not.", delay: 3500 },
          { time: "5:03 PM", author: "T. Nuthatch", text: "ADDENDUM. THE BREAD IS NOT A DISTRICT RESOURCE. THE CLERK'S OFFICE TAKES NO POSITION ON CONSUMPTION. THIS NOTICE IS FOR DOCUMENTATION PURPOSES ONLY.", system: true, delay: 5000 },
          { time: "5:05 PM", author: "Conrad", text: "\"Takes no position on consumption\" is the most careful sentence this office has ever produced.", delay: 3000 },
          { time: "5:06 PM", author: "R. Nuthatch", text: "The Clerk is avoiding it because half the district is already down there.", delay: 2500 },
          { time: "5:08 PM", author: "Cheryl Sparrow", text: "Just for context, it is mostly sparrows and two pigeons I have not seen before. One finch arrived at 4:55 and left without eating.", delay: 4000 },
          { time: "5:10 PM", author: "Conrad", text: "The finch had the right idea.", delay: 3000 },
          { time: "5:11 PM", author: "R. Nuthatch", text: "Are you saying you would not eat it.", delay: 2500 },
          { time: "5:11 PM", author: "Conrad", text: "I am saying I do not eat what is placed for me by someone who stands and watches.", delay: 1500 },
          { time: "5:12 PM", author: "Conrad", text: "That is a feeding station. I am not a display.", delay: 1200 },
          { time: "5:14 PM", author: "R. Nuthatch", text: "I agree with Conrad which I do not say often. Bread on a wall is a setup.", delay: 3500 },
          { time: "5:16 PM", author: "Cheryl Sparrow", text: "Just for context, the bread appears to be sourdough. Not sliced. Hand-torn. This is not discount bread.", delay: 4000 },
          { time: "5:18 PM", author: "Conrad", text: "The quality of the bread is not the issue.", delay: 3000 },
          { time: "5:18 PM", author: "Cheryl Sparrow", text: "Just for context, it is relevant because cheap bread gets left more often. This was a choice.", delay: 1500 },
          { time: "5:20 PM", author: "Conrad", text: "That is worse. A deliberate bread choice aimed at a wall where birds sit.", delay: 3000 },
          { time: "5:23 PM", author: "R. Nuthatch", text: "Has anyone filed a complaint.", delay: 4500 },
          { time: "5:24 PM", author: "Cheryl Sparrow", text: "Just for context, the woman has done this before. Same wall. Last Thursday. Wheat bread that time. She brought a friend.", delay: 3000 },
          { time: "5:25 PM", author: "Conrad", text: "She brought a friend.", delay: 2000 },
          { time: "5:25 PM", author: "Cheryl Sparrow", text: "The friend had a phone.", delay: 1200 },
          { time: "5:26 PM", author: "Conrad", text: "Of course the friend had a phone.", delay: 2000 },
          { time: "5:28 PM", author: "R. Nuthatch", text: "Ord. 7.2 covers unauthorized feeding in public areas. It is not enforced because the Clerk considers it low priority. The Clerk is wrong.", delay: 4000 },
          { time: "5:32 PM", author: "T. Nuthatch", text: "THE CLERK'S OFFICE REMINDS RESIDENTS THAT PUBLIC COMMENTARY ON BREAD DOES NOT CONSTITUTE A FILING. TO FILE A FORMAL COMPLAINT, USE THE APPROPRIATE FORM.", system: true, delay: 5000 },
          { time: "5:34 PM", author: "Conrad", text: "That is the seventh \"just for context.\" I have been counting because no one else will.", delay: 3000 },
          { time: "5:35 PM", author: "Cheryl Sparrow", text: "JUST FOR CONTEXT, the bread is approximately 60 percent consumed and the two pigeons are still there.", delay: 2500 },
          { time: "5:38 PM", author: "R. Nuthatch", text: "The pigeons always stay the longest. This is known.", delay: 4500 },
          { time: "5:42 PM", author: "Dennis", text: "it is just bread.", delay: 6000 },
          { time: "5:43 PM", author: "Conrad", text: "Dennis, it is not just bread. It is bread placed by a human who watches. There is a word for that.", delay: 2500 },
          { time: "5:44 PM", author: "Dennis", text: "lunch.", delay: 2000 },
          { time: "5:48 PM", author: "R. Nuthatch", text: "The issue is not the bread. The issue is that someone is deciding where we eat and then observing whether we do.", delay: 6000 },
          { time: "5:49 PM", author: "Conrad", text: "Exactly. You and Cheryl should start a column.", delay: 2500 },
          { time: "5:52 PM", author: "Cheryl Sparrow", text: "The bread is mostly gone now. One pigeon is still there. He is eating the last piece very slowly.", delay: 5000 },
          { time: "5:54 PM", author: "R. Nuthatch", text: "He knows it is the last piece. They always know.", delay: 3500 },
          { time: "5:56 PM", author: "Conrad", text: "I want it on record that I did not eat any of it.", delay: 3500 },
          { time: "5:57 PM", author: "R. Nuthatch", text: "Noted.", delay: 2000 },
          { time: "5:58 PM", author: "Cheryl Sparrow", text: "As context, Conrad was in the south end at 4:35 which is before the bread was placed.", delay: 2500 },
          { time: "5:59 PM", author: "Conrad", text: "Thank you Cheryl. I did not ask for an alibi but I appreciate the thoroughness.", delay: 2500 },
          { time: "6:05 PM", author: "T. Nuthatch", text: "FINAL NOTICE. THE LOW WALL HAS BEEN CLEARED. CRUMBS REMAIN. THE CLERK'S OFFICE WILL NOT BE SWEEPING.", system: true, delay: 8000 },
          { time: "6:07 PM", author: "R. Nuthatch", text: "Crumbs remain. That is also a maintenance issue.", delay: 3500 },
          { time: "6:09 PM", author: "Cheryl Sparrow", text: "As context, the pigeon left at 6:03. He went north toward the park.", delay: 3500 },
          { time: "6:10 PM", author: "Conrad", text: "Toward the bench probably.", delay: 2000 },
          { time: "6:15 PM", author: "Dennis", text: "I am at the bench. No pigeon.", delay: 8000 },
          { time: "6:16 PM", author: "Conrad", text: "Yet.", delay: 2000 },
          { time: "6:22 PM", author: "Cheryl Sparrow", text: "As context, the woman in the green coat walked past the wall again at 6:18. She looked at where the bread was. She did not stop. She seemed satisfied.", delay: 8000 },
          { time: "6:23 PM", author: "Conrad", text: "She seemed satisfied.", delay: 2000 },
          { time: "6:23 PM", author: "Conrad", text: "We ate her bread and she is satisfied.", delay: 1200 },
          { time: "6:25 PM", author: "R. Nuthatch", text: "You said you did not eat it.", delay: 3500 },
          { time: "6:25 PM", author: "Conrad", text: "I am speaking collectively.", delay: 1500 },
          { time: "6:26 PM", author: "R. Nuthatch", text: "You were not part of the collective. You made that very clear.", delay: 2000 },
          { time: "6:38 PM", author: "E. Starling", text: "The bread was fine.", delay: 14000 },
          { time: "6:40 PM", author: "Conrad", text: "You ate it?", delay: 3000 },
          { time: "6:42 PM", author: "E. Starling", text: "I did not say that.", delay: 3500 },
          { time: "6:44 PM", author: "R. Nuthatch", text: "The phrase \"just for context\" has appeared more often than any municipal update in this channel.", delay: 3500 },
          { time: "6:45 PM", author: "Cheryl Sparrow", text: "JUST FOR CONTEXT, I am providing observations. You are providing complaints. The difference is volume.", delay: 2500 },
          { time: "6:46 PM", author: "Conrad", text: "This channel has discussed bread for two hours. The drainage notice from last week got four responses.", delay: 2500 },
          { time: "6:50 PM", author: "T. Nuthatch", text: "CHANNEL LOCKING NOT AVAILABLE. PLEASE RETURN TO MUNICIPAL PURPOSES.", system: true, delay: 6000 },
          { time: "6:51 PM", author: "Conrad", text: "He tried to lock the channel.", delay: 2500 },
          { time: "7:00 PM", author: "Cheryl Sparrow", text: "As context, the wall is empty now. Two crumbs. One sparrow circling. He is deciding.", delay: 12000 },
          { time: "7:08 PM", author: "Dennis", text: "just a sparrow.", delay: 10000 },
          { time: "7:11 PM", author: "Cheryl Sparrow", text: "Just for context, the chat has been quiet for eleven minutes, which is the most orderly this channel has been all evening.", delay: 6000 }
        ]
      },
      {
        id: "sycamore",
        name: "sycamore-lane",
        desc: "Neighborhood coordination — Sycamore Lane residents",
        pinned: "This channel is for Sycamore Lane residents and coordination. Meter-box schedules, lane maintenance, and seasonal notices will be posted here. Please keep observations relevant. — T. Nuthatch",
        users: [
          { name: "T. Nuthatch", role: "Clerk", status: "online" },
          { name: "Cheryl Sparrow", status: "online" },
          { name: "Denise Dove", status: "online" },
          { name: "Arthur P.", status: "idle" },
          { name: "Gerald H.", status: "idle" }
        ],
        messages: [
          { time: "6:12 AM", author: "T. Nuthatch", text: "SYCAMORE LANE NOTICE. EXTERIOR ACCESS CHECKS FOR METER BOXES WILL BEGIN AT 7:00 AM. RESIDENTS ARE ASKED TO CLEAR LOOSE NEST MATERIAL FROM LEDGES AND NOT OBSTRUCT ACCESS WITH POTTED ITEMS.", system: true, delay: 0 },
          { time: "6:13 AM", author: "Cheryl Sparrow", text: "As context, there are already two cones by the hydrant. The north one is leaning.", delay: 2500 },
          { time: "6:14 AM", author: "Denise Dove", text: "Nothing on my ledge is loose.", delay: 2000 },
          { time: "6:17 AM", author: "Cheryl Sparrow", text: "As context, 14 still has the upper meter box on the east side and the nest line is intact.", delay: 4000 },
          { time: "6:18 AM", author: "Denise Dove", text: "I re-centered the eggs twice already.", delay: 2000 },
          { time: "6:20 AM", author: "Arthur P.", text: "Morning.", delay: 4000 },
          { time: "6:21 AM", author: "Cheryl Sparrow", text: "Arthur is at 12 with the paper.", delay: 2000 },
          { time: "6:24 AM", author: "Gerald H.", text: "I would like to object in advance to being turned into a lane-wide observation.", delay: 5000 },
          { time: "6:24 AM", author: "Cheryl Sparrow", text: "Noted.", delay: 1000 },
          { time: "6:31 AM", author: "Cheryl Sparrow", text: "As context, the lavender has opened more than the rosemary today. One juvenile from the east side slowed there at 6:11 and then pretended to inspect the curb.", delay: 10000 },
          { time: "6:32 AM", author: "Gerald H.", text: "You do not need to say \"as context\" every time. We know what you are doing.", delay: 2500 },
          { time: "6:33 AM", author: "Gerald H.", text: "The flower arrangement does not need hourly updates.", delay: 2000 },
          { time: "6:34 AM", author: "Arthur P.", text: "The paper is quieter without Greg in it.", delay: 3000 },
          { time: "6:35 AM", author: "Cheryl Sparrow", text: "A great many things are.", delay: 2000 },
          { time: "6:41 AM", author: "T. Nuthatch", text: "FOLLOW-UP. ACCESS TEAM WILL ALSO REMOVE ANY LOOSE TWIGS OR FIBER CLUMPS FOUND ON SILL EDGES. ITEMS CLAIMED AS DECORATIVE MAY STILL BE REMOVED IF THEY INTERFERE WITH INSPECTION.", system: true, delay: 8000 },
          { time: "6:42 AM", author: "Denise Dove", text: "The materials on 14 are structural. Two twigs. Receipt paper. Lint. One zip tie of disputed provenance.", delay: 2000 },
          { time: "6:44 AM", author: "Cheryl Sparrow", text: "As context, the tape strand on Denise's ledge has been there since March.", delay: 3000 },
          { time: "6:45 AM", author: "Denise Dove", text: "It is holding.", delay: 1500 },
          { time: "6:46 AM", author: "Cheryl Sparrow", text: "Decorative is doing a great deal of work in that notice.", delay: 2000 },
          { time: "6:49 AM", author: "Gerald H.", text: "My windowsill is not public business.", delay: 5000 },
          { time: "6:50 AM", author: "Cheryl Sparrow", text: "Then it should do less in public view.", delay: 2000 },
          { time: "6:54 AM", author: "Arthur P.", text: "Access team at the corner.", delay: 7000 },
          { time: "6:55 AM", author: "Cheryl Sparrow", text: "One worker is down by 14 already.", delay: 2000 },
          { time: "6:57 AM", author: "Gerald H.", text: "Please stop reporting that address in real time.", delay: 3500 },
          { time: "7:02 AM", author: "Cheryl Sparrow", text: "Cat.", delay: 8000 },
          { time: "7:02 AM", author: "Gerald H.", text: "What.", delay: 1000 },
          { time: "7:02 AM", author: "Cheryl Sparrow", text: "Orange. South end of the lane by the recycling area. Moving east.", delay: 1200 },
          { time: "7:03 AM", author: "Denise Dove", text: "How big.", delay: 1500 },
          { time: "7:03 AM", author: "Cheryl Sparrow", text: "Medium. Low to the ground. Ears forward.", delay: 1200 },
          { time: "7:03 AM", author: "Denise Dove", text: "How far from 14.", delay: 1000 },
          { time: "7:04 AM", author: "Cheryl Sparrow", text: "Four houses. Still by the bins.", delay: 1500 },
          { time: "7:04 AM", author: "Arthur P.", text: "I can see it from 12. It is sitting now.", delay: 1500 },
          { time: "7:05 AM", author: "Denise Dove", text: "Sitting or watching.", delay: 1500 },
          { time: "7:05 AM", author: "Arthur P.", text: "Both.", delay: 1200 },
          { time: "7:06 AM", author: "Gerald H.", text: "Is it actually a threat or are we just narrating a cat.", delay: 2000 },
          { time: "7:06 AM", author: "Cheryl Sparrow", text: "It has moved to the wall beside the hydrant. Still facing east. Tail low.", delay: 1500 },
          { time: "7:07 AM", author: "Gerald H.", text: "Cheryl.", delay: 1500 },
          { time: "7:07 AM", author: "Cheryl Sparrow", text: "You are welcome to stop reading.", delay: 1200 },
          { time: "7:08 AM", author: "Denise Dove", text: "Keep going.", delay: 1500 },
          { time: "7:09 AM", author: "Cheryl Sparrow", text: "Crossing the lane now. Slow. It stopped at the base of the elm.", delay: 2000 },
          { time: "7:10 AM", author: "Arthur P.", text: "The elm is three lots from 14.", delay: 1500 },
          { time: "7:10 AM", author: "Denise Dove", text: "I know where the elm is.", delay: 1200 },
          { time: "7:12 AM", author: "T. Nuthatch", text: "INSPECTION REMINDER. RESIDENTS MAY RETURN ITEMS TO LEDGES AFTER ACCESS IS COMPLETE. THANK YOU FOR YOUR COOPERATION.", system: true, delay: 3000 },
          { time: "7:13 AM", author: "Cheryl Sparrow", text: "It looked up.", delay: 2000 },
          { time: "7:13 AM", author: "Denise Dove", text: "At what.", delay: 1200 },
          { time: "7:14 AM", author: "Cheryl Sparrow", text: "The low branch. Where the juveniles sit.", delay: 1500 },
          { time: "7:14 AM", author: "Denise Dove", text: "Are there juveniles on it right now.", delay: 1200 },
          { time: "7:15 AM", author: "Cheryl Sparrow", text: "No. It is empty. The cat looked anyway.", delay: 1500 },
          { time: "7:18 AM", author: "Gerald H.", text: "I would like it noted that five minutes ago I was being told to mind my own business and now everyone wants Cheryl to describe an animal walking.", delay: 5000 },
          { time: "7:19 AM", author: "Cheryl Sparrow", text: "The difference is that the animal walking has claws.", delay: 2000 },
          { time: "7:21 AM", author: "Arthur P.", text: "It is under a car now.", delay: 3500 },
          { time: "7:21 AM", author: "Cheryl Sparrow", text: "The blue one. Near the meter at 18.", delay: 1500 },
          { time: "7:22 AM", author: "Gerald H.", text: "We do not need the color of the car.", delay: 2000 },
          { time: "7:22 AM", author: "Cheryl Sparrow", text: "There are two cars. Specificity matters when you are tracking something with teeth.", delay: 1500 },
          { time: "7:25 AM", author: "Denise Dove", text: "Is it still under the car.", delay: 4500 },
          { time: "7:25 AM", author: "Cheryl Sparrow", text: "Yes. It has been under the car for four minutes.", delay: 1500 },
          { time: "7:26 AM", author: "Denise Dove", text: "That is not reassuring.", delay: 1500 },
          { time: "7:26 AM", author: "Arthur P.", text: "Cats sit under cars. It is what they do.", delay: 1500 },
          { time: "7:27 AM", author: "Denise Dove", text: "Cats also climb meter boxes. It is also what they do.", delay: 2000 },
          { time: "7:31 AM", author: "Gerald H.", text: "Has anyone considered that the inspection team is still on the lane and the cat is more afraid of them than it is of us.", delay: 6000 },
          { time: "7:32 AM", author: "Cheryl Sparrow", text: "The inspection team left at 7:08. I mentioned this but no one was listening because of the cat.", delay: 2000 },
          { time: "7:33 AM", author: "Gerald H.", text: "You did not mention this.", delay: 1500 },
          { time: "7:33 AM", author: "Cheryl Sparrow", text: "I was about to when the cat crossed the lane.", delay: 1500 },
          { time: "7:38 AM", author: "Arthur P.", text: "It is gone. Went through the fence gap at the end of the lane.", delay: 7000 },
          { time: "7:39 AM", author: "Cheryl Sparrow", text: "Confirmed. West through the gap. Into the yard behind 22.", delay: 2000 },
          { time: "7:40 AM", author: "Denise Dove", text: "Good.", delay: 1500 },
          { time: "7:41 AM", author: "Gerald H.", text: "So the inspection is over and the cat is gone and Cheryl has described both in more detail than either required.", delay: 2500 },
          { time: "7:42 AM", author: "Cheryl Sparrow", text: "You are welcome.", delay: 1500 },
          { time: "7:48 AM", author: "Arthur P.", text: "That sounds like enough for one morning.", delay: 9000 },
          { time: "7:49 AM", author: "Cheryl Sparrow", text: "It is only 7:49.", delay: 2000 }
        ]
      },
      {
        id: "southpath",
        name: "south-path-and-park",
        desc: "Park maintenance & south path coordination",
        pinned: "Channel for south path, Municipal Park, and adjacent grounds. Maintenance schedules posted by the Clerk's Office. Please keep discussion relevant to park use. — T. Nuthatch",
        users: [
          { name: "T. Nuthatch", role: "Clerk", status: "online" },
          { name: "F. Lark", status: "online" },
          { name: "Robin", status: "online" },

        messages: [
          { time: "5:30 PM", author: "T. Nuthatch", text: "MAINTENANCE NOTICE. REED TRIMMING WILL OCCUR ALONG THE SOUTH PATH BETWEEN THE CULVERT AND THE THIRD BENCH STARTING TOMORROW AT 6:00 AM. THE PATH MAY BE NARROWED TEMPORARILY. PLEASE KEEP CLEAR OF WORKERS AND EQUIPMENT.", system: true, delay: 0 },
          { time: "5:41 PM", author: "F. Lark", text: "Has anyone else noticed the jogger.", delay: 8000 },
          { time: "5:44 PM", author: "Robin", text: "Every evening.", delay: 5000 },
          { time: "5:46 PM", author: "F. Lark", text: "Same route. Same time. Right through the narrow section by the bench.", delay: 3500 },
          { time: "5:47 PM", author: "Robin", text: "Right through everything by the bench.", delay: 2000 },
          { time: "5:52 PM", author: "T. Nuthatch", text: "ADDENDUM. THIRD BENCH REMAINS OPEN TO THE PUBLIC. MAINTAIN SINGLE-FILE MOVEMENT ON THE NORTH EDGE.", system: true, delay: 7000 },
          { time: "5:53 PM", author: "Robin", text: "Nobody is asking about the bench.", delay: 2500 },
          { time: "5:58 PM", author: "F. Lark", text: "The jogger came through at 5:40 yesterday. A finch on the low branch got startled and dropped a twig.", delay: 7000 },
          { time: "6:00 PM", author: "Robin", text: "The jogger does not move to one side. The jogger does not slow down. The jogger treats the path like it was built for jogging.", delay: 3500 },
          { time: "6:02 PM", author: "F. Lark", text: "It is a shared path.", delay: 3000 },
          { time: "6:03 PM", author: "Robin", text: "The jogger does not appear to know that.", delay: 2000 },
          { time: "6:10 PM", author: "Conrad", text: "The jogger looked at me on Tuesday.", delay: 10000 },
          { time: "6:12 PM", author: "Robin", text: "And?", delay: 3000 },
          { time: "6:12 PM", author: "Conrad", text: "And nothing. He looked. While running. At me. On a branch I have been using quietly for weeks.", delay: 1500 },
          { time: "6:13 PM", author: "Conrad", text: "I am not performing for joggers.", delay: 1500 },
          { time: "6:15 PM", author: "Robin", text: "Nobody said you were.", delay: 3000 },
          { time: "6:15 PM", author: "Conrad", text: "The look said it.", delay: 1500 },
          { time: "6:22 PM", author: "F. Lark", text: "Does anyone know if there is a path etiquette policy. I looked on the district portal and could not find one.", delay: 10000 },
          { time: "6:24 PM", author: "Robin", text: "There is no policy. There is just a jogger who runs like he is the only one outside.", delay: 3500 },
          { time: "6:28 PM", author: "T. Nuthatch", text: "REMINDER. REED TRIMMING BEGINS AT 6:00 AM. DO NOT LEAVE PERSONAL ITEMS IN THE WORK AREA.", system: true, delay: 6000 },
          { time: "6:29 PM", author: "Robin", text: "Still not what we are talking about.", delay: 2500 },
          { time: "6:34 PM", author: "F. Lark", text: "He wears a yellow vest. I do not know why. It is not dark when he runs.", delay: 7000 },
          { time: "6:36 PM", author: "Robin", text: "Visibility is not the issue. He is already impossible to miss.", delay: 3500 },
          { time: "6:42 PM", author: "Conrad", text: "Yesterday he ran past while I was mid-phrase.", delay: 9000 },
          { time: "6:44 PM", author: "Robin", text: "Mid-phrase of what.", delay: 3000 },
          { time: "6:44 PM", author: "Conrad", text: "A thought.", delay: 1500 },
          { time: "6:45 PM", author: "Robin", text: "You were singing.", delay: 2000 },
          { time: "6:45 PM", author: "Conrad", text: "I was not singing. I was processing something vocally.", delay: 1500 },
          { time: "6:46 PM", author: "Robin", text: "After 6:30?", delay: 2000 },
          { time: "6:46 PM", author: "Conrad", text: "Yes. After 6:30. I checked.", delay: 1500 },
          { time: "6:51 PM", author: "F. Lark", text: "Can we get back to the jogger.", delay: 7000 },
          { time: "6:59 PM", author: "Dennis", text: "he goes past the bench at about 5:45 most days.", delay: 10000 },
          { time: "7:00 PM", author: "F. Lark", text: "Does it bother you?", delay: 2500 },
          { time: "7:02 PM", author: "Dennis", text: "not really. he is loud though.", delay: 3500 },
          { time: "7:04 PM", author: "Robin", text: "He breathes like he wants everyone to know he is breathing.", delay: 3500 },
          { time: "7:06 PM", author: "F. Lark", text: "That might just be how he breathes.", delay: 3000 },
          { time: "7:07 PM", author: "Robin", text: "Then he should breathe somewhere else.", delay: 2000 },
          { time: "7:10 PM", author: "T. Nuthatch", text: "DO NOT STAND IN THE REED PILE AREA.", system: true, delay: 5000 },
          { time: "7:12 PM", author: "Conrad", text: "Nobody is standing in the reed pile area.", delay: 3000 },
          { time: "7:12 PM", author: "Conrad", text: "The jogger might run through it tomorrow though.", delay: 1500 },
          { time: "7:18 PM", author: "F. Lark", text: "I am not trying to get anyone banned from the path. I just think there should be an understanding.", delay: 9000 },
          { time: "7:20 PM", author: "Robin", text: "There is an understanding. He does not have it.", delay: 3500 },
          { time: "7:28 PM", author: "Dennis", text: "he waved at me once.", delay: 10000 },
          { time: "7:29 PM", author: "F. Lark", text: "That seems friendly.", delay: 2000 },
          { time: "7:30 PM", author: "Dennis", text: "I did not wave back.", delay: 2000 },
          { time: "7:31 PM", author: "Robin", text: "Good.", delay: 2000 },
          { time: "7:36 PM", author: "F. Lark", text: "Maybe someone should say something to him.", delay: 7000 },
          { time: "7:38 PM", author: "Robin", text: "And say what. Please jog quieter. Please breathe less. Please do not look at Conrad.", delay: 3500 },
          { time: "7:39 PM", author: "Conrad", text: "That last one is reasonable.", delay: 2000 },
          { time: "7:48 PM", author: "E. Starling", text: "He is just running.", delay: 12000 },
          { time: "7:52 PM", author: "Robin", text: "Yes. That is the problem.", delay: 6000 },
          { time: "8:01 PM", author: "Dennis", text: "he will probably be back tomorrow.", delay: 12000 }
        ]
      },
      {
        id: "sycamore-east",
        name: "sycamore-east",
        desc: "East end coordination — Sycamore Lane & adjacent lots",
        pinned: "This channel covers the east section of Sycamore Lane including the turning circle and adjacent parking. Report obstructions or access issues to the Clerk\u2019s Office. \u2014 T. Nuthatch",
        users: [
          { name: "T. Nuthatch", role: "Clerk", status: "online" },
          { name: "Cheryl Sparrow", status: "online" },
          { name: "R. Nuthatch", status: "online" },
          { name: "Conrad", status: "online" },
          { name: "Arthur P.", status: "idle" },
          { name: "Gerald H.", status: "idle" },
          { name: "Denise Dove", status: "idle" }
        ],
        messages: [
          { time: "2:10 PM", author: "T. Nuthatch", text: "SYCAMORE LANE NOTICE. SEASONAL GUTTER INSPECTION SCHEDULED FOR WEDNESDAY. RESIDENTS WITH MATERIAL IN DRAINAGE CHANNELS SHOULD RELOCATE IT BY TUESDAY EVENING. COMPLIANCE IS APPRECIATED BUT NOT EXPECTED.", system: true, delay: 0 },
          { time: "2:18 PM", author: "Cheryl Sparrow", text: "As context, there is a car parked at the east end of the lane that has been running for twenty minutes with nobody getting out.", delay: 2500 },
          { time: "2:19 PM", author: "Gerald H.", text: "Cars park.", delay: 2000 },
          { time: "2:20 PM", author: "Cheryl Sparrow", text: "Cars park and then someone gets out. This person has not gotten out.", delay: 2000 },
          { time: "2:22 PM", author: "Gerald H.", text: "Maybe they are about to.", delay: 3000 },
          { time: "2:23 PM", author: "Cheryl Sparrow", text: "They have been about to for twenty-two minutes.", delay: 2000 },
          { time: "2:25 PM", author: "R. Nuthatch", text: "Is the engine on.", delay: 3500 },
          { time: "2:25 PM", author: "Cheryl Sparrow", text: "Yes. I can hear it from the gutter.", delay: 1500 },
          { time: "2:26 PM", author: "R. Nuthatch", text: "Idling on a residential lane for over fifteen minutes may be a nuisance issue under 4.1(c) if anyone wanted to file.", delay: 2500 },
          { time: "2:27 PM", author: "Gerald H.", text: "Nobody wants to file about a parked car.", delay: 2500 },
          { time: "2:29 PM", author: "Cheryl Sparrow", text: "As context, it is a grey car. The driver is looking at their phone. They have not looked up once.", delay: 3000 },
          { time: "2:30 PM", author: "Conrad", text: "Maybe they are reading something important.", delay: 2500 },
          { time: "2:31 PM", author: "Cheryl Sparrow", text: "For twenty-nine minutes.", delay: 2000 },
          { time: "2:31 PM", author: "Conrad", text: "Some things take twenty-nine minutes.", delay: 1500 },
          { time: "2:33 PM", author: "Gerald H.", text: "Why are you watching a car.", delay: 3500 },
          { time: "2:33 PM", author: "Cheryl Sparrow", text: "The car is on the lane. I can see the lane. That is not surveillance.", delay: 1500 },
          { time: "2:35 PM", author: "R. Nuthatch", text: "Cheryl is correct that the duration is unusual. A stopped vehicle with the engine running and no visible purpose is worth noting.", delay: 3500 },
          { time: "2:37 PM", author: "Gerald H.", text: "The purpose might be sitting in a car. People do that.", delay: 3000 },
          { time: "2:38 PM", author: "Conrad", text: "Do they.", delay: 2000 },
          { time: "2:39 PM", author: "Gerald H.", text: "Yes. They sit in cars. They look at phones. They stay longer than you think they should. It does not require a channel.", delay: 2500 },
          { time: "2:42 PM", author: "Cheryl Sparrow", text: "As context, they just put the phone down. They are staring at the windshield now. Hands on the wheel.", delay: 5000 },
          { time: "2:43 PM", author: "Conrad", text: "Hands on the wheel but not driving.", delay: 2500 },
          { time: "2:44 PM", author: "Cheryl Sparrow", text: "Correct. Engine on. Hands on wheel. Going nowhere.", delay: 2000 },
          { time: "2:46 PM", author: "R. Nuthatch", text: "Is anyone else seeing this.", delay: 3500 },
          { time: "2:47 PM", author: "Arthur P.", text: "I can see the car from 12. It is a grey hatchback. The person appears to be sitting.", delay: 2500 },
          { time: "2:48 PM", author: "Conrad", text: "\"Appears to be sitting.\" What else would they be doing in a car, Arthur.", delay: 2000 },
          { time: "2:49 PM", author: "Arthur P.", text: "That was my point. They are just sitting.", delay: 2500 },
          { time: "2:52 PM", author: "Cheryl Sparrow", text: "They picked the phone back up. Looked at it. Put it down again. Eight seconds.", delay: 4500 },
          { time: "2:53 PM", author: "Gerald H.", text: "You timed it.", delay: 2500 },
          { time: "2:53 PM", author: "Cheryl Sparrow", text: "It was a short look. Eight seconds tells you they were checking if someone replied. Nobody did.", delay: 1500 },
          { time: "2:55 PM", author: "Conrad", text: "That is a very specific reading of eight seconds.", delay: 3500 },
          { time: "2:55 PM", author: "Cheryl Sparrow", text: "If you check a phone and put it down that fast you were looking for one thing and it was not there.", delay: 1500 },
          { time: "2:58 PM", author: "T. Nuthatch", text: "REMINDER. THIS CHANNEL IS FOR EAST-END COORDINATION. VEHICLE SURVEILLANCE IS NOT A MUNICIPAL FUNCTION.", system: true, delay: 4500 },
          { time: "3:00 PM", author: "Conrad", text: "He says from an office with a window facing the lane.", delay: 3500 },
          { time: "3:04 PM", author: "Cheryl Sparrow", text: "The engine turned off.", delay: 6000 },
          { time: "3:04 PM", author: "R. Nuthatch", text: "And?", delay: 1500 },
          { time: "3:05 PM", author: "Cheryl Sparrow", text: "Still sitting. No engine now. Windows are up.", delay: 2000 },
          { time: "3:06 PM", author: "Gerald H.", text: "So now it is just a person in a quiet car. This is less interesting than when the engine was on, which was already not interesting.", delay: 2500 },
          { time: "3:09 PM", author: "Denise Dove", text: "Which end of the lane.", delay: 5000 },
          { time: "3:09 PM", author: "Cheryl Sparrow", text: "East. Past 20. Near the turning circle.", delay: 1500 },
          { time: "3:10 PM", author: "Denise Dove", text: "That is close to the meter boxes.", delay: 2000 },
          { time: "3:11 PM", author: "R. Nuthatch", text: "The meter boxes are municipal property. A vehicle idling near them for this long could be relevant.", delay: 2000 },
          { time: "3:12 PM", author: "Gerald H.", text: "It is not relevant. The car is near a road. That does not make it a municipal issue.", delay: 2500 },
          { time: "3:16 PM", author: "Cheryl Sparrow", text: "They leaned their head back. Against the headrest.", delay: 6000 },
          { time: "3:18 PM", author: "Conrad", text: "They are resting.", delay: 3500 },
          { time: "3:19 PM", author: "Cheryl Sparrow", text: "Or they are deciding.", delay: 2000 },
          { time: "3:20 PM", author: "Conrad", text: "Deciding what.", delay: 2500 },
          { time: "3:21 PM", author: "Cheryl Sparrow", text: "Whether to go in somewhere or not.", delay: 2000 },
          { time: "3:22 PM", author: "Gerald H.", text: "Go in where. There is nothing at the east end except houses and the turning circle.", delay: 2500 },
          { time: "3:23 PM", author: "Cheryl Sparrow", text: "Exactly.", delay: 2000 },
          { time: "3:28 PM", author: "R. Nuthatch", text: "Cheryl is suggesting the person lives nearby and is not going inside.", delay: 7000 },
          { time: "3:29 PM", author: "Cheryl Sparrow", text: "I am not suggesting anything. I am providing what is visible.", delay: 2000 },
          { time: "3:32 PM", author: "Arthur P.", text: "Sometimes you sit in the car because the car is the last place that is just yours.", delay: 5000 },
          { time: "3:34 PM", author: "Gerald H.", text: "Arthur.", delay: 3500 },
          { time: "3:35 PM", author: "Arthur P.", text: "What.", delay: 2000 },
          { time: "3:36 PM", author: "Gerald H.", text: "Nothing. Fair enough.", delay: 2000 },
          { time: "3:40 PM", author: "Cheryl Sparrow", text: "They checked the phone again. Longer this time. Maybe fifteen seconds. Then put it in the glovebox.", delay: 6000 },
          { time: "3:41 PM", author: "Conrad", text: "They put the phone away.", delay: 2500 },
          { time: "3:42 PM", author: "Cheryl Sparrow", text: "In the glovebox. Not in a pocket. The glovebox is a commitment.", delay: 2000 },
          { time: "3:45 PM", author: "R. Nuthatch", text: "This has now been over ninety minutes.", delay: 4500 },
          { time: "3:48 PM", author: "T. Nuthatch", text: "THE CLERK\u2019S OFFICE DOES NOT MONITOR PARKED VEHICLES. RESIDENTS CONCERNED ABOUT OBSTRUCTIONS MAY FILE WITH TRAFFIC COORDINATION. FORM 11-B.", system: true, delay: 5000 },
          { time: "3:49 PM", author: "Conrad", text: "Form 11-B for a person who is sitting still. That seems proportionate.", delay: 2500 },
          { time: "3:54 PM", author: "Cheryl Sparrow", text: "They opened the door.", delay: 7000 },
          { time: "3:54 PM", author: "R. Nuthatch", text: "Finally.", delay: 1500 },
          { time: "3:55 PM", author: "Cheryl Sparrow", text: "Left foot out. Then they stopped. Pulled it back in. Closed the door.", delay: 2000 },
          { time: "3:56 PM", author: "Conrad", text: "They put the foot back.", delay: 2500 },
          { time: "3:56 PM", author: "Cheryl Sparrow", text: "Yes.", delay: 1200 },
          { time: "3:58 PM", author: "Gerald H.", text: "I am going to stop reading this.", delay: 3500 },
          { time: "3:58 PM", author: "Gerald H.", text: "I am not going to stop reading this.", delay: 1500 },
          { time: "4:05 PM", author: "Arthur P.", text: "Let them be.", delay: 9000 },
          { time: "4:08 PM", author: "Cheryl Sparrow", text: "As context, they have been in the car for one hour and fifty-eight minutes. I am not watching. I can see from where I am.", delay: 5000 },
          { time: "4:12 PM", author: "Cheryl Sparrow", text: "Engine started again. They are pulling out.", delay: 6000 },
          { time: "4:12 PM", author: "R. Nuthatch", text: "Direction?", delay: 1500 },
          { time: "4:13 PM", author: "Cheryl Sparrow", text: "West. Toward the main road.", delay: 2000 },
          { time: "4:13 PM", author: "R. Nuthatch", text: "Not toward any of the houses then.", delay: 1500 },
          { time: "4:14 PM", author: "Cheryl Sparrow", text: "No. They came, sat for two hours, and left the way they came.", delay: 2000 },
          { time: "4:18 PM", author: "Gerald H.", text: "So it was nothing.", delay: 6000 },
          { time: "4:22 PM", author: "Arthur P.", text: "I would not call it nothing.", delay: 6000 },
          { time: "4:30 PM", author: "Denise Dove", text: "Did they seem alright.", delay: 10000 },
          { time: "4:33 PM", author: "Cheryl Sparrow", text: "I do not know. I could only see what they did. Not what they were.", delay: 5000 }
        ]
      },
      {
        id: "bench-row",

        desc: "Bench row & south lot coordination",
        pinned: "Channel for the bench row, south lot, and adjacent walkway. Maintenance and scheduling queries only. The third bench is not a municipal service. \u2014 T. Nuthatch",
        users: [
          { name: "T. Nuthatch", role: "Clerk", status: "online" },
          { name: "F. Lark", status: "online" },
          { name: "Robin", status: "online" },

        ],
        messages: [
          { time: "5:15 PM", author: "T. Nuthatch", text: "BENCH ROW NOTICE. THE DRINKING FOUNTAIN NEAR THE SECOND BENCH WILL BE SHUT OFF TEMPORARILY FOR VALVE REPLACEMENT. ESTIMATED DURATION TWO DAYS. USE THE NORTH FOUNTAIN.", system: true, delay: 0 },
          { time: "5:22 PM", author: "F. Lark", text: "There is a man by the south lot with a paper bag and he is feeding the pigeons.", delay: 2500 },
          { time: "5:23 PM", author: "Robin", text: "Feeding pigeons or feeding near pigeons.", delay: 2500 },
          { time: "5:24 PM", author: "F. Lark", text: "Feeding pigeons. He is throwing seed toward them specifically. A sparrow went over and he waved it off.", delay: 2000 },
          { time: "5:25 PM", author: "Robin", text: "He waved off a sparrow.", delay: 2000 },
          { time: "5:25 PM", author: "F. Lark", text: "With his hand. Gently, but yes.", delay: 1500 },
          { time: "5:27 PM", author: "Conrad", text: "He is choosing.", delay: 3500 },
          { time: "5:29 PM", author: "Robin", text: "How many pigeons.", delay: 3000 },
          { time: "5:30 PM", author: "F. Lark", text: "Four that I can see. Two were already there. Two came after the bag opened. He seems to know which ones he is feeding.", delay: 2500 },
          { time: "5:31 PM", author: "Conrad", text: "He waved off a sparrow. That is not random.", delay: 2500 },
          { time: "5:36 PM", author: "Robin", text: "Where is Dennis.", delay: 5500 },
          { time: "5:38 PM", author: "F. Lark", text: "Third bench. He has not moved.", delay: 3500 },
          { time: "5:39 PM", author: "Robin", text: "Has the man noticed him.", delay: 2000 },
          { time: "5:40 PM", author: "F. Lark", text: "I cannot tell from here. Dennis is facing the water.", delay: 2000 },
          { time: "5:42 PM", author: "Conrad", text: "Dennis is the only pigeon in that section who is not eating free seed right now. That is a choice or it is a problem.", delay: 3500 },
          { time: "5:44 PM", author: "Robin", text: "It is Dennis.", delay: 3000 },
          { time: "5:48 PM", author: "T. Nuthatch", text: "ADDENDUM. THE NORTH FOUNTAIN IS THE ONE PAST THE HEDGE ROW. NOT THE ONE NEAR THE UTILITY CLOSET. THAT ONE DOES NOT WORK AND HAS NOT WORKED SINCE OCTOBER.", system: true, delay: 6000 },
          { time: "5:50 PM", author: "Robin", text: "Still not about the fountain.", delay: 3500 },
          { time: "5:53 PM", author: "F. Lark", text: "A fifth pigeon arrived. The man looked pleased. He poured more seed into a small pile and stepped back.", delay: 5000 },
          { time: "5:54 PM", author: "Conrad", text: "He stepped back.", delay: 2500 },
          { time: "5:55 PM", author: "F. Lark", text: "About two feet. Like he wanted to watch them eat without being too close.", delay: 2000 },
          { time: "5:56 PM", author: "Conrad", text: "This is the bread woman again but with targeting.", delay: 2000 },
          { time: "5:57 PM", author: "Robin", text: "The bread woman did not discriminate. She left bread for whoever showed up. This person has a species preference.", delay: 2500 },
          { time: "6:00 PM", author: "F. Lark", text: "A starling landed near the pile. The man did not wave it off. He just watched it.", delay: 5000 },
          { time: "6:01 PM", author: "Conrad", text: "Starlings get a pass apparently.", delay: 2500 },
          { time: "6:02 PM", author: "Robin", text: "Starlings are not sparrows.", delay: 2000 },
          { time: "6:02 PM", author: "Conrad", text: "Thank you Robin.", delay: 1500 },
          { time: "6:06 PM", author: "F. Lark", text: "He is walking toward the bench row now. Still has the bag.", delay: 6000 },
          { time: "6:07 PM", author: "Robin", text: "Toward which bench.", delay: 2000 },
          { time: "6:08 PM", author: "F. Lark", text: "Hard to say. He is moving slowly. The pigeons are following him.", delay: 2000 },
          { time: "6:14 PM", author: "F. Lark", text: "He sat down on the second bench. He put more seed on the ground. The pigeons are around his feet now.", delay: 6000 },
          { time: "6:15 PM", author: "Robin", text: "Dennis is one bench over.", delay: 2500 },
          { time: "6:16 PM", author: "F. Lark", text: "Yes. Facing the water still.", delay: 2000 },
          { time: "6:19 PM", author: "Dennis", text: "I can hear the bag.", delay: 5000 },
          { time: "6:21 PM", author: "Robin", text: "You can go over.", delay: 3000 },
          { time: "6:23 PM", author: "Dennis", text: "I am fine here.", delay: 3500 },
          { time: "6:26 PM", author: "Conrad", text: "The five pigeons he brought with him are eating off the ground six feet from Dennis and Dennis is facing the water. This is the most Dennis thing that has ever happened.", delay: 5000 },
          { time: "6:28 PM", author: "F. Lark", text: "One of the pigeons walked toward the third bench. The man threw seed in the opposite direction. The pigeon turned around.", delay: 3500 },
          { time: "6:29 PM", author: "Robin", text: "He redirected it.", delay: 2500 },
          { time: "6:30 PM", author: "F. Lark", text: "He redirected a pigeon, yes.", delay: 2000 },
          { time: "6:32 PM", author: "Conrad", text: "He does not want the pigeons near the third bench. He is protecting Dennis\u2019s bench or he is keeping his pigeons separate.", delay: 3500 },
          { time: "6:33 PM", author: "Robin", text: "Or he just does not want them on that bench.", delay: 2000 },
          { time: "6:33 PM", author: "Conrad", text: "That is what I said.", delay: 1500 },
          { time: "6:38 PM", author: "F. Lark", text: "The bag is getting low. He folded the top down and put it in his jacket.", delay: 7000 },
          { time: "6:39 PM", author: "Robin", text: "He is going to come back.", delay: 2500 },
          { time: "6:40 PM", author: "F. Lark", text: "What makes you say that.", delay: 2000 },
          { time: "6:40 PM", author: "Robin", text: "He kept the bag. If it was a one-time thing he would have used the bin.", delay: 1500 },
          { time: "6:44 PM", author: "T. Nuthatch", text: "REMINDER. FEEDING IN THE PARK IS NEITHER ENDORSED NOR PROHIBITED. THE CLERK\u2019S OFFICE REQUESTS THAT RESIDENTS NOT ENGAGE WITH FEEDERS REGARDLESS OF SPECIES PREFERENCE.", system: true, delay: 6000 },
          { time: "6:46 PM", author: "Conrad", text: "\"Regardless of species preference\" is the Clerk acknowledging the situation without naming it.", delay: 3500 },
          { time: "6:50 PM", author: "F. Lark", text: "The man is leaving. He went north past the hedge. The pigeons stayed for about a minute and then scattered.", delay: 6000 },
          { time: "6:51 PM", author: "Robin", text: "They were only there for the bag.", delay: 2500 },
          { time: "6:55 PM", author: "Dennis", text: "he has been coming on Wednesdays.", delay: 6000 },
          { time: "6:56 PM", author: "F. Lark", text: "How long has this been happening.", delay: 2500 },
          { time: "6:57 PM", author: "Dennis", text: "three weeks maybe. he sits on the second bench. same bag.", delay: 2000 },
          { time: "6:58 PM", author: "Robin", text: "You have been watching this for three weeks and said nothing.", delay: 2500 },
          { time: "6:59 PM", author: "Dennis", text: "it did not seem like something to say.", delay: 2000 },
          { time: "7:02 PM", author: "Conrad", text: "A man comes every Wednesday with a bag of seed to feed pigeons six feet from you and it did not seem like something to say.", delay: 5000 },
          { time: "7:03 PM", author: "Dennis", text: "he does not bother me.", delay: 2500 },
          { time: "7:04 PM", author: "Robin", text: "Does he know you are there.", delay: 2000 },
          { time: "7:06 PM", author: "Dennis", text: "I think so. he looked over once. early on. then he stopped looking.", delay: 3500 },
          { time: "7:08 PM", author: "Conrad", text: "He stopped looking.", delay: 3000 },
          { time: "7:12 PM", author: "E. Starling", text: "Maybe he is just someone who likes pigeons.", delay: 6000 },
          { time: "7:16 PM", author: "Robin", text: "Maybe.", delay: 6000 },
          { time: "7:22 PM", author: "Dennis", text: "the seed is good though. the other pigeons always look full after.", delay: 8000 },
          { time: "7:24 PM", author: "F. Lark", text: "I should head back before it gets dark.", delay: 4000 },
          { time: "7:25 PM", author: "Robin", text: "Same.", delay: 2000 },
          { time: "7:38 PM", author: "Dennis", text: "see you Wednesday I guess.", delay: 16000 }
        ]

        id: "upper-canopy",
        name: "upper-canopy",
        desc: "Canopy level, airspace, and overhead concerns",
        pinned: "This channel is for observations above tree line and airspace coordination. Report hazards, weather concerns, and overhead obstructions. Flight path disputes should be filed separately. \u2014 T. Nuthatch",
        users: [
          { name: "T. Nuthatch", role: "Clerk", status: "online" },
          { name: "Robin", status: "online" },
          { name: "F. Lark", status: "online" },

        messages: [
          { time: "11:05 AM", author: "T. Nuthatch", text: "CANOPY NOTICE. BRANCH CLEARANCE ABOVE THE SOUTH PATH HAS BEEN REQUESTED BY MAINTENANCE. ASSESSMENT WILL OCCUR THIS WEEK. DO NOT RELOCATE NESTING MATERIAL UNTIL CLEARANCE BOUNDARIES ARE MARKED.", system: true, delay: 0 },
          { time: "11:14 AM", author: "Robin", text: "Something is hovering above the meadow.", delay: 2500 },
          { time: "11:15 AM", author: "F. Lark", text: "I see it. It is not a bird.", delay: 2000 },
          { time: "11:15 AM", author: "Robin", text: "I know it is not a bird.", delay: 1500 },
          { time: "11:16 AM", author: "F. Lark", text: "Four rotors. Grey. About the size of a crow. It is holding position maybe sixty feet up.", delay: 2000 },
          { time: "11:17 AM", author: "Robin", text: "Louder than a crow.", delay: 2000 },
          { time: "11:18 AM", author: "Conrad", text: "It is a drone.", delay: 2500 },
          { time: "11:19 AM", author: "F. Lark", text: "Thank you Conrad.", delay: 2000 },
          { time: "11:19 AM", author: "Conrad", text: "You were describing it like nobody had seen one before.", delay: 1500 },
          { time: "11:20 AM", author: "Robin", text: "Is someone operating it from the path.", delay: 2500 },
          { time: "11:22 AM", author: "F. Lark", text: "I cannot see anyone with a controller. It might be from the car park.", delay: 3000 },
          { time: "11:24 AM", author: "R. Nuthatch", text: "Unmanned aerial devices over municipal parkland. Is there a provision for this.", delay: 3500 },
          { time: "11:25 AM", author: "Conrad", text: "There is no provision because it was not a problem until right now.", delay: 2500 },
          { time: "11:27 AM", author: "Robin", text: "It moved. It is over the oak line now.", delay: 3500 },
          { time: "11:28 AM", author: "R. Nuthatch", text: "The oak line is above the nesting zone.", delay: 2000 },
          { time: "11:29 AM", author: "Conrad", text: "Nothing about it is welcome but the nesting zone makes it worse.", delay: 2500 },
          { time: "11:31 AM", author: "F. Lark", text: "It has a camera. I can see it when it tilts.", delay: 3000 },
          { time: "11:32 AM", author: "Robin", text: "Of course it has a camera.", delay: 2500 },
          { time: "11:34 AM", author: "Conrad", text: "It is looking down at us.", delay: 3000 },
          { time: "11:35 AM", author: "F. Lark", text: "It might be looking at the landscape. Or doing a survey.", delay: 2000 },
          { time: "11:35 AM", author: "Conrad", text: "It is sixty feet up with a camera pointed at the oak line where birds live and you think it is doing a survey.", delay: 1500 },
          { time: "11:36 AM", author: "Robin", text: "Conrad.", delay: 2000 },
          { time: "11:36 AM", author: "Conrad", text: "I am being reasonable.", delay: 1200 },
          { time: "11:37 AM", author: "Robin", text: "You are just being loud.", delay: 2000 },
          { time: "11:40 AM", author: "T. Nuthatch", text: "THE CLERK\u2019S OFFICE HAS NOT AUTHORIZED ANY AERIAL SURVEY ABOVE DISTRICT PARKLAND. IF THIS IS A MUNICIPAL OPERATION IT WAS NOT COORDINATED THROUGH THIS OFFICE.", system: true, delay: 5000 },
          { time: "11:41 AM", author: "R. Nuthatch", text: "So it is unauthorized.", delay: 2500 },
          { time: "11:42 AM", author: "Conrad", text: "Unauthorized and hovering. My two least favorite things.", delay: 2500 },
          { time: "11:45 AM", author: "F. Lark", text: "It dropped lower. Maybe forty feet now. It is circling the south end of the park.", delay: 4500 },
          { time: "11:46 AM", author: "Robin", text: "That is near the bench.", delay: 2500 },
          { time: "11:47 AM", author: "F. Lark", text: "Dennis is still on the bench. He looked up once.", delay: 2000 },
          { time: "11:48 AM", author: "Robin", text: "Once is a lot for Dennis.", delay: 2000 },
          { time: "11:52 AM", author: "R. Nuthatch", text: "The sound alone is a disturbance. It is louder than Conrad at 6:29 AM and that was considered a violation.", delay: 6000 },
          { time: "11:53 AM", author: "Conrad", text: "Leave 6:29 out of this.", delay: 2500 },
          { time: "11:54 AM", author: "R. Nuthatch", text: "I am establishing a noise baseline.", delay: 2000 },
          { time: "11:55 AM", author: "Conrad", text: "You are establishing a grievance. There is a machine in the sky and you are still finding ways to bring up my case.", delay: 2000 },
          { time: "11:58 AM", author: "F. Lark", text: "It is climbing again. Higher than before. Maybe eighty feet.", delay: 5000 },
          { time: "12:00 PM", author: "Robin", text: "Good.", delay: 3000 },
          { time: "12:01 PM", author: "F. Lark", text: "It is still there. Just higher.", delay: 2500 },
          { time: "12:01 PM", author: "Robin", text: "Less good.", delay: 1500 },
          { time: "12:04 PM", author: "Conrad", text: "I do not like that it hovers. Birds do not hover. Hawks glide. Kestrels pause. Nothing just stays in one place in the air like that. It is wrong.", delay: 5000 },
          { time: "12:06 PM", author: "F. Lark", text: "Hummingbirds hover.", delay: 3500 },
          { time: "12:06 PM", author: "Conrad", text: "Hummingbirds earn it.", delay: 1500 },
          { time: "12:10 PM", author: "R. Nuthatch", text: "For the record, I am requesting the Clerk log this as an airspace incident. Whether or not there is a current ordinance, there should be one, and a logged incident strengthens the case.", delay: 6000 },
          { time: "12:12 PM", author: "T. Nuthatch", text: "THE CLERK\u2019S OFFICE WILL NOTE THE OBSERVATION. FILING A FORMAL AIRSPACE COMPLAINT REQUIRES FORM 22-A WHICH DOES NOT EXIST YET. IT WILL BE DRAFTED IF DEMAND WARRANTS.", system: true, delay: 3500 },
          { time: "12:13 PM", author: "Conrad", text: "\"If demand warrants.\" There is a camera in the sky.", delay: 2500 },
          { time: "12:17 PM", author: "F. Lark", text: "It is moving east. Past the hedge now. Getting smaller.", delay: 6000 },
          { time: "12:18 PM", author: "Robin", text: "Is it leaving or repositioning.", delay: 2500 },
          { time: "12:19 PM", author: "F. Lark", text: "Hard to say at this distance. It is over the road now.", delay: 2000 },
          { time: "12:21 PM", author: "Conrad", text: "If it comes back I want it noted that I said it would come back.", delay: 3500 },
          { time: "12:24 PM", author: "F. Lark", text: "I have lost sight of it.", delay: 5000 },
          { time: "12:26 PM", author: "Robin", text: "Gone?", delay: 3000 },
          { time: "12:27 PM", author: "F. Lark", text: "Gone or too far to see. Either way it is not above us anymore.", delay: 2500 },
          { time: "12:30 PM", author: "R. Nuthatch", text: "I would like the log entry to include the duration and the approximate altitude. Also that a camera was observed.", delay: 5000 },
          { time: "12:31 PM", author: "Conrad", text: "Also that nobody did anything about it while it was here.", delay: 2500 },
          { time: "12:32 PM", author: "Robin", text: "What would you have done.", delay: 2000 },
          { time: "12:33 PM", author: "Conrad", text: "Something.", delay: 2000 },
          { time: "12:33 PM", author: "Robin", text: "Something like what.", delay: 1500 },
          { time: "12:34 PM", author: "Conrad", text: "I had not gotten that far.", delay: 2000 },
          { time: "12:40 PM", author: "Dennis", text: "it was loud.", delay: 8000 },
          { time: "12:42 PM", author: "F. Lark", text: "It was. Sorry Dennis.", delay: 3500 },
          { time: "12:44 PM", author: "Dennis", text: "not your fault. just loud.", delay: 3500 },
          { time: "12:50 PM", author: "Robin", text: "If it comes back next week we will know it is a pattern.", delay: 8000 },
          { time: "12:52 PM", author: "Conrad", text: "And if it is a pattern.", delay: 3500 },
          { time: "12:55 PM", author: "Robin", text: "Then we will have a pattern and still no Form 22-A.", delay: 5000 }
        ]
      },
