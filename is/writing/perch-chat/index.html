<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Perch — Avian Municipal District</title>
  <meta name="description" content="Community Channels · Observer Access">
  <link rel="canonical" href="https://ajin.im/is/writing/perch-chat/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D0D0B;
      --bg-panel: #111110;
      --bg-panel-2: #131310;
      --bg-panel-3: #141412;
      --bg-panel-4: #161613;
      --bg-panel-5: #181814;
      --bg-system: #1A1915;
      --text: #C8C4B8;
      --text-muted: #9E9B90;
      --text-soft: #78756B;
      --text-dim: #5C5A52;
      --text-faint: #4A4840;
      --text-ghost: #3D3B34;
      --border: #1E1D19;
      --border-strong: #242320;
      --border-ui: #2E2D28;
      --online: #6B7B5F;
      --clerk: #8B7355;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.4;
      }
      50% {
        opacity: 1;
      }
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-ui);
    }

    .screening-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: "IBM Plex Mono", monospace;
    }

    .screening-panel {
      width: min(90%, 420px);
      max-width: 420px;
      padding: 2.5rem 2rem;
      background: var(--bg-panel-5);
      border: 1px solid var(--border-ui);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .screening-panel.is-entered {
      opacity: 1;
      transform: translateY(0);
    }

    .screening-panel.is-exiting {
      opacity: 0;
      transform: translateY(4px);
    }

    .screening-kicker {
      margin-bottom: 1.5rem;
      color: var(--text-dim);
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .screening-text {
      margin-bottom: 0.5rem;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-line;
    }

    .screening-text.hero {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .screening-text.standard {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0;
    }

    .screening-sub {
      margin-top: 0.75rem;
      color: var(--text-soft);
      font-size: 0.7rem;
      line-height: 1.6;
      white-space: pre-line;
    }

    .screening-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .screening-option,
    .screening-continue {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border-ui);
      background: transparent;
      cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      text-align: left;
      transition: all 0.15s ease;
      color: var(--text-muted);
    }

    .screening-option:hover,
    .screening-option:focus-visible {
      border-color: var(--text-dim);
      color: var(--text);
      outline: none;
    }

    .screening-continue {
      background: var(--border);
      color: var(--text);
      text-align: center;
    }

    .screening-continue:hover,
    .screening-continue:focus-visible {
      background: var(--border-ui);
      outline: none;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .mobile-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg-panel-2);
      border-bottom: 1px solid var(--border-ui);
      flex-shrink: 0;
    }

    .mobile-toggle {
      padding: 0.3rem 0.5rem;
      border: 1px solid var(--border-ui);
      background: none;
      color: var(--text-soft);
      cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
    }

    .mobile-title {
      color: var(--text-muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
    }

    .app-main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-overlay {
      display: none;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      width: 220px;
      min-width: 220px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border-ui);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 0.9rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      color: var(--text);
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .sidebar-subtitle {
      margin-top: 0.2rem;
      color: var(--text-dim);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.48rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .sidebar-section {
      padding: 0.6rem 0.4rem;
    }

    .sidebar-section.users {
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .sidebar-section.resources {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .sidebar-kicker {
      margin-bottom: 0.4rem;
      padding: 0 0.45rem;
      color: var(--text-ghost);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.45rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .channel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      width: 100%;
      margin-bottom: 0.1rem;
      padding: 0.4rem 0.55rem;
      border: 0;
      border-left: 2px solid transparent;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s ease;
    }

    .channel-item.active {
      background: var(--bg-system);
      border-left-color: var(--text-dim);
    }

    .channel-item.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .channel-main {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
    }

    .channel-prefix {
      color: var(--text-faint);
      font-size: 0.65rem;
      flex-shrink: 0;
    }

    .channel-name {
      color: var(--text-soft);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.68rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-item.active .channel-name {
      color: var(--text);
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.45rem;
    }

    .user-dot {
      width: 5px;
      height: 5px;
      flex-shrink: 0;
      background: var(--text-ghost);
      border-radius: 50%;
    }

    .user-dot.online {
      background: var(--online);
    }

    .user-name {
      font-size: 0.63rem;
    }

    .user-role {
      padding: 0.08rem 0.25rem;
      background: var(--bg-system);
      color: var(--text-dim);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .observer-row {
      margin-top: 0.25rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--bg-system);
    }

    .observer-name {
      color: var(--text-ghost);
      font-size: 0.63rem;
      font-style: italic;
    }

    .observer-dot {
      animation: pulse 3s infinite;
    }

    .resource-link {
      display: block;
      padding: 0.2rem 0.45rem;
      color: inherit;
      text-decoration: none;
    }

    .resource-name {
      color: var(--text-dim);
      font-size: 0.63rem;
    }

    .resource-desc {
      margin-left: 0.4rem;
      color: var(--text-ghost);
      font-size: 0.48rem;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      min-height: 0;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.6rem 1.1rem;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-header-main {
      min-width: 0;
    }

    .chat-title-row {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }

    .chat-title-prefix {
      color: var(--text-faint);
      font-size: 0.7rem;
    }

    .chat-title {
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .chat-desc {
      margin-top: 0.1rem;
      color: var(--text-ghost);
      font-size: 0.55rem;
    }

    .observer-badge {
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
      background: var(--bg-panel-4);
      color: var(--text-ghost);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.45rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.8rem 1.1rem;
    }

    .pinned {
      margin-bottom: 0.8rem;
      padding: 0.45rem 0.65rem;
      border: 1px solid var(--border);
      background: var(--bg-panel-3);
      color: var(--text-faint);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.62rem;
      line-height: 1.6;
    }

    .pinned-label {
      margin-right: 0.4rem;
      color: var(--text-ghost);
      font-size: 0.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .message {
      padding: 0.35rem 0;
    }

    .message.is-new {
      opacity: 0;
      animation: msgIn 0.3s ease forwards;
    }

    .system-message {
      margin: 0.25rem 0;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border-strong);
      background: var(--bg-system);
    }

    .system-meta {
      margin-bottom: 0.25rem;
      color: var(--text-dim);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.45rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .system-text {
      color: var(--clerk);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      line-height: 1.6;
    }

    .message-meta {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .message-author {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.74rem;
      font-weight: 600;
    }

    .message-time {
      color: var(--text-faint);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.52rem;
    }

    .message-text {
      margin-top: 0.1rem;
      color: #B8B4A8;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.8rem;
      line-height: 1.65;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 0;
      color: var(--text-ghost);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.6rem;
    }

    .typing-dots {
      display: flex;
      gap: 0.15rem;
    }

    .typing-dot {
      width: 3px;
      height: 3px;
      background: var(--text-faint);
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }

    .typing-label {
      color: var(--text-ghost);
      font-style: italic;
    }

    .chat-input-shell {
      padding: 0.55rem 1.1rem;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input {
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      background: var(--bg-panel-3);
      color: var(--border-ui);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      font-style: italic;
      cursor: not-allowed;
    }

    @media (max-width: 700px) {
      .mobile-header {
        display: flex;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: block;
        background: rgba(0, 0, 0, 0.5);
      }

      .sidebar-overlay.hidden {
        display: none;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const CHARACTER_COLORS = {
      "T. Nuthatch": "#8B7355",
      "Conrad": "#C27A3A",
      "R. Nuthatch": "#7A8B6F",
      "Cheryl Sparrow": "#9B7EA8",
      "Dennis": "#6B8B9B",
      "E. Starling": "#A89B7E",
      "Denise Dove": "#B08B7A",
      "Arthur P.": "#7B8B8B",
      "Gerald H.": "#8B8B6B",
      "F. Lark": "#7E9B8B",
      "Robin": "#9B7E7E"
    };

    const CHANNELS = [
      {
        id: "municipal",
        name: "municipal-notices",
        desc: "General district updates & coordination",
        pinned: "This channel is designated for municipal notices and community coordination. The Clerk's Office requests that personal disputes be directed to the appropriate filing window. — T. Nuthatch",
        users: [
          { name: "T. Nuthatch", role: "Clerk", status: "online" },
          { name: "Cheryl Sparrow", status: "online" },
          { name: "R. Nuthatch", status: "online" },
          { name: "Conrad", status: "online" },
          { name: "Dennis", status: "idle" },
          { name: "E. Starling", status: "idle" }
        ],
        messages: [
          { time: "4:58 PM", author: "T. Nuthatch", text: "MUNICIPAL NOTICE. TEMPORARY DRAINAGE INSPECTION TOMORROW, 6:00 AM-8:00 AM. SOUTH PATH BETWEEN MUNICIPAL OAK AND MUNICIPAL PARK CLOSED DURING WORK. USE NORTH APPROACH.", system: true, delay: 0 },
          { time: "4:59 PM", author: "Conrad", text: "\"USE NORTH APPROACH\" is a strange way to describe walking.", delay: 2000 },
          { time: "4:59 PM", author: "R. Nuthatch", text: "For the record, the south path is a public route. Ord. 4.1(b). Obstruction is not improved by capital letters.", delay: 3500 },
          { time: "5:00 PM", author: "Cheryl Sparrow", text: "Just for context, there are already six cones by the service gate. Two are on their sides. I could see them from my kitchen window at 16 Sycamore.", delay: 3000 },
          { time: "5:04 PM", author: "T. Nuthatch", text: "ADDENDUM. THIRD BENCH REMAINS ACCESSIBLE FROM THE NORTH SIDE ONLY. DO NOT GATHER NEAR THE CULVERT.", system: true, delay: 5000 },
          { time: "5:05 PM", author: "Cheryl Sparrow", text: "Just for context, the north approach narrows by about one wingspan when the recycling bin is out, which it usually is.", delay: 2500 },
          { time: "5:06 PM", author: "Conrad", text: "I am not moving anything.", delay: 2000 },
          { time: "5:06 PM", author: "Conrad", text: "For clarity... there is nothing of mine near any culvert.", delay: 1200 },
          { time: "5:07 PM", author: "R. Nuthatch", text: "For the record, 6:29 AM remains the more relevant obstruction.", delay: 3000 },
          { time: "5:09 PM", author: "Cheryl Sparrow", text: "Just for context, the spice rack was mentioned 23 minutes into the perch meeting, after Gerald H. said \"telephone wire\" three times and before his ex-wife arrived.", delay: 4500 },
          { time: "5:11 PM", author: "Conrad", text: "It was one note.", delay: 4000 },
          { time: "5:12 PM", author: "R. Nuthatch", text: "Ord. 9.3(a) is not a mood. It is a time.", delay: 2500 },
          { time: "5:13 PM", author: "Conrad", text: "One note at 6:29 is not a performance.", delay: 2000 },
          { time: "5:13 PM", author: "Conrad", text: "It was a residual feeling.", delay: 1000 },
          { time: "5:14 PM", author: "Cheryl Sparrow", text: "Just for context, I heard the 6:29 note from 16 Sycamore with the window latched. Two lots east of 14. No echo conditions.", delay: 3000 },
          { time: "5:16 PM", author: "T. Nuthatch", text: "THE CHANNEL IS FOR MUNICIPAL UPDATES.", system: true, delay: 4000 },
          { time: "5:17 PM", author: "R. Nuthatch", text: "Then update the municipality that the compliance issue remains open.", delay: 2500 },
          { time: "5:18 PM", author: "Conrad", text: "There it is.", delay: 1800 },
          { time: "5:18 PM", author: "Conrad", text: "We were discussing drainage and somehow I am the culvert again.", delay: 1200 },
          { time: "5:20 PM", author: "Cheryl Sparrow", text: "Just for context, the sound carried past the rosemary box on my south ledge. That is farther than you usually think.", delay: 4000 },
          { time: "5:21 PM", author: "R. Nuthatch", text: "I heard it from Municipal Oak. Window shut. Ord. 9.3(a) does not turn on your sense of occasion.", delay: 3000 },
          { time: "5:22 PM", author: "Conrad", text: "Cheryl, mapping the radius of my private distress is not neutral.", delay: 2500 },
          { time: "5:26 PM", author: "Cheryl Sparrow", text: "Just for context, if everyone is sent north tomorrow, that routes them past the pond side of the third bench instead of the culvert side.", delay: 7000 },
          { time: "5:27 PM", author: "Conrad", text: "Thank you. So even the detour has an audience.", delay: 2000 },
          { time: "5:29 PM", author: "R. Nuthatch", text: "For the record, \"one note\" is still a note. That is why the ordinance did not say \"song.\"", delay: 4000 },
          { time: "5:30 PM", author: "T. Nuthatch", text: "CORRECTION. SIX CONES ARE SUFFICIENT. THERE IS NO NEED TO MOVE THEM.", system: true, delay: 3000 },
          { time: "5:31 PM", author: "Cheryl Sparrow", text: "Just for context, someone moved one 14 inches at 5:28 PM. It is crooked now.", delay: 2000 },
          { time: "5:32 PM", author: "Conrad", text: "The spice rack was a domestic object dragged into public life by birds with nothing gentler to do.", delay: 3500 },
          { time: "5:48 PM", author: "R. Nuthatch", text: "For the record, the spice rack is irrelevant except as evidence of what happens when meetings are not chaired.", delay: 12000 },
          { time: "5:49 PM", author: "Conrad", text: "Meetings are not chaired because no one can bear what structure reveals.", delay: 2000 },
          { time: "5:50 PM", author: "Cheryl Sparrow", text: "Just for context, the seller said publicly that this was the second time the spice rack had been discussed and he preferred it be the last.", delay: 2500 },
          { time: "6:02 PM", author: "T. Nuthatch", text: "FINAL NOTICE FOR THIS EVENING. CULVERT ACCESS BEGINS AT 6:00 AM. RESIDENTS ARE ADVISED NOT TO LEAVE LOOSE MATERIAL, TWINE, VINE, OR HOUSEHOLD OBJECTS IN THE WORK AREA.", system: true, delay: 10000 },
          { time: "6:03 PM", author: "Conrad", text: "The inclusion of vine in that notice feels pointed.", delay: 2500 },
          { time: "6:04 PM", author: "R. Nuthatch", text: "Vine is included because residents leave evidence everywhere.", delay: 2000 },
          { time: "6:06 PM", author: "Cheryl Sparrow", text: "Just for context, the last unclaimed vine was found at Birch Court / Sycamore after approximately twelve minutes of argument and then left for the Clerk.", delay: 4000 },
          { time: "6:07 PM", author: "Conrad", text: "I do not narrate myself.", delay: 2000 },
          { time: "6:07 PM", author: "Conrad", text: "Other birds narrate me.", delay: 800 },
          { time: "6:22 PM", author: "Cheryl Sparrow", text: "Just for context, Dennis usually reaches the bench from the north anyway. I have seen him do it four evenings this week.", delay: 14000 },
          { time: "6:38 PM", author: "Dennis", text: "north side works.", delay: 16000 },
          { time: "6:39 PM", author: "Conrad", text: "Dennis, THANK you. Finally, a practical bird.", delay: 2000 },
          { time: "6:41 PM", author: "T. Nuthatch", text: "REMINDER. THE ABOVE INCLUDES BENCH-ADJACENT GROUND COVER. THIS IS NOT A STORAGE AREA.", system: true, delay: 4000 },
          { time: "6:42 PM", author: "Cheryl Sparrow", text: "Just for context, there is nothing stored beside the bench unless damp leaves and one bottle cap have recently become municipal property.", delay: 2500 },
          { time: "6:44 PM", author: "R. Nuthatch", text: "For the record, the bench has never been the problem.", delay: 4000 },
          { time: "6:46 PM", author: "Conrad", text: "That is not what the record suggests... but fine.", delay: 4000 },
          { time: "7:01 PM", author: "E. Starling", text: "A bench can survive a detour.", delay: 14000 },
          { time: "7:03 PM", author: "T. Nuthatch", text: "CHANNEL LOCKING NOT AVAILABLE. PLEASE RETURN TO MUNICIPAL PURPOSES.", system: true, delay: 4000 },
          { time: "7:04 PM", author: "Conrad", text: "That sentence explains more about this district than the rest of the notice did.", delay: 2500 },
          { time: "7:11 PM", author: "Cheryl Sparrow", text: "Just for context, the chat has been quiet for seven minutes, which is the most orderly this channel has been all evening.", delay: 12000 },
          { time: "7:14 PM", author: "Dennis", text: "Bench is still there.", delay: 6000 }
        ]

      },
      {

        messages: [

      },
      {
        id: "court",
        name: "nest-court-official",
        desc: "Restricted — Court personnel only",
        locked: true
      }
    ];

    const DISTRICT_LINKS = [
      { name: "Avian Municipal District", desc: "Official district portal", url: "https://ajin.im/is/writing/avian-district/index.html" },
      { name: "Nest Court", desc: "eCourt Portal", url: "https://ajin.im/is/writing/nest-court" },
      { name: "The Municipal Coo", desc: "Local newspaper", url: "https://ajin.im/is/writing/bird-coo" },
      { name: "SecondNest", desc: "Personals & connections", url: "https://ajin.im/is/writing/secondnest" }
    ];

    const SCREENING_STEPS = [
      {
        text: "THE PERCH",
        sub: "Avian Municipal District · Community Channels\n\nLive community chat. Currently active.\nThe Clerk's Office maintains this platform and regrets doing so most evenings.",
        button: "Request Access",
        next: 1
      },
      {
        text: "Are you a resident of the Avian Municipal District?",
        options: [
          { label: "Yes", next: 2 },
          { label: "No", next: 3 },
          { label: "I'm not sure", next: 4 }
        ]
      },
      {
        text: "Do you have feathers?",
        options: [
          { label: "Yes", next: 5 },
          { label: "That seems personal", next: 5 },
          { label: "Define feathers", next: 5 }
        ]
      },
      {
        text: "Non-residents may observe but not participate.\nThe Clerk's Office notes your honesty.",
        button: "Continue as Observer",
        next: 5
      },
      {
        text: "Uncertainty is not disqualifying.\nMost residents are not sure about most things.",
        button: "Continue",
        next: 2
      },
      {
        text: "Access granted.",
        sub: "You have been admitted as a Silent Observer.\nYou may read. You may not post.\n\nTo request posting privileges, contact the channel administrator:\naccess@ajin.im",
        button: "Enter",
        final: true
      }
    ];

    const state = {
      admitted: false,
      screeningStep: 0,
      screeningFadeIn: true,
      activeChannel: "municipal",
      visibleCounts: {
        municipal: 3,
        sycamore: 0,
        southpath: 0
      },
      newMessage: {
        channel: null,
        index: -1
      },
      sidebarOpen: false,
      hasVisited: {
        municipal: true,
        sycamore: false,
        southpath: false
      }
    };

    let playbackTimer = null;
    let newMessageTimer = null;

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getChannel(channelId) {
      return CHANNELS.find(function(channel) {
        return channel.id === channelId;
      });
    }

    function getActiveChannel() {
      return getChannel(state.activeChannel);
    }

    function clearPlaybackTimer() {
      if (playbackTimer) {
        clearTimeout(playbackTimer);
        playbackTimer = null;
      }
    }

    function clearNewMessageTimer() {
      if (newMessageTimer) {
        clearTimeout(newMessageTimer);
        newMessageTimer = null;
      }
    }

    function goToScreeningStep(nextStep) {
      state.screeningFadeIn = false;
      render();
      setTimeout(function() {
        state.screeningStep = nextStep;
        state.screeningFadeIn = true;
        render();
      }, 200);
    }

    function admitObserver() {
      state.admitted = true;
      state.sidebarOpen = false;
      render();
    }

    function switchChannel(channelId) {
      const channel = getChannel(channelId);
      if (!channel || channel.locked) {
        return;
      }

      clearPlaybackTimer();
      state.activeChannel = channelId;
      state.sidebarOpen = false;

      if (!state.hasVisited[channelId]) {
        state.hasVisited[channelId] = true;
        state.visibleCounts[channelId] = 3;
      }

      render();
    }

    function schedulePlayback() {
      clearPlaybackTimer();
      if (!state.admitted) {
        return;
      }

      const channel = getActiveChannel();
      const messages = channel && channel.messages ? channel.messages : [];
      const count = state.visibleCounts[state.activeChannel] || 0;

      if (count >= messages.length) {
        return;
      }

      const nextMessage = messages[count];
      const delay = nextMessage && typeof nextMessage.delay === "number" ? nextMessage.delay : 2000;

      playbackTimer = setTimeout(function() {
        state.newMessage = {
          channel: state.activeChannel,
          index: count
        };
        state.visibleCounts[state.activeChannel] = (state.visibleCounts[state.activeChannel] || 0) + 1;
        render();

        clearNewMessageTimer();
        newMessageTimer = setTimeout(function() {
          state.newMessage = { channel: null, index: -1 };
          render();
        }, 400);
      }, delay);
    }

    function buildScreeningModal() {
      const step = SCREENING_STEPS[state.screeningStep];
      const textClass = state.screeningStep === 0 ? "hero" : "standard";
      const actions = step.options
        ? step.options.map(function(option) {
            return '<button class="screening-option" data-screen-next="' + option.next + '">' + escapeHtml(option.label) + '</button>';
          }).join("")
        : '<button class="screening-continue" data-screen-final="' + (step.final ? "true" : "false") + '" data-screen-next="' + (typeof step.next === "number" ? step.next : "") + '">' + escapeHtml(step.button) + '</button>';

      return (
        '<div class="screening-overlay">' +
          '<div class="screening-panel ' + (state.screeningFadeIn ? "is-entered" : "is-exiting") + '">' +
            '<div class="screening-kicker">The Perch · Access Verification</div>' +
            '<div class="screening-text ' + textClass + '">' + escapeHtml(step.text) + '</div>' +
            (step.sub ? '<div class="screening-sub">' + escapeHtml(step.sub) + '</div>' : "") +
            '<div class="screening-actions">' + actions + '</div>' +
          '</div>' +
        '</div>'
      );
    }

    function buildChannels(activeChannelId) {
      return CHANNELS.map(function(channel) {
        const isActive = activeChannelId === channel.id;
        const classes = [
          "channel-item",
          isActive ? "active" : "",
          channel.locked ? "locked" : ""
        ].filter(Boolean).join(" ");

        return (
          '<button class="' + classes + '" data-channel-id="' + channel.id + '"' + (channel.locked ? ' aria-disabled="true"' : "") + '>' +
            '<div class="channel-main">' +
              '<span class="channel-prefix">' + (channel.locked ? "🔒" : "#") + '</span>' +
              '<span class="channel-name">' + escapeHtml(channel.name) + '</span>' +
            '</div>' +
          '</button>'
        );
      }).join("");
    }

    function buildUserList(channel) {
      if (!channel || !channel.users) {
        return "";
      }

      const rows = channel.users.map(function(user) {
        return (
          '<div class="user-row">' +
            '<div class="user-dot ' + (user.status === "online" ? "online" : "") + '"></div>' +
            '<span class="user-name" style="color:' + escapeHtml(CHARACTER_COLORS[user.name] || "#78756B") + ';">' + escapeHtml(user.name) + '</span>' +
            (user.role ? '<span class="user-role">' + escapeHtml(user.role) + '</span>' : "") +
          '</div>'
        );
      }).join("");

      return (
        '<div class="sidebar-section users">' +
          '<div class="sidebar-kicker">Present — ' + (channel.users.length + 1) + '</div>' +
          rows +
          '<div class="user-row observer-row">' +
            '<div class="user-dot observer-dot"></div>' +
            '<span class="observer-name">You (observer)</span>' +
          '</div>' +
        '</div>'
      );
    }

    function buildResourceLinks() {
      return DISTRICT_LINKS.map(function(link) {
        return (
          '<a class="resource-link" href="' + escapeHtml(link.url) + '" target="_blank" rel="noopener noreferrer">' +
            '<span class="resource-name">' + escapeHtml(link.name) + '</span>' +
            '<span class="resource-desc">' + escapeHtml(link.desc) + '</span>' +
          '</a>'
        );
      }).join("");
    }

    function buildMessages(channel, visibleCount) {
      const messages = channel && channel.messages ? channel.messages : [];
      const visibleMessages = messages.slice(0, visibleCount);

      const messageMarkup = visibleMessages.map(function(message, index) {
        const isNew = state.newMessage.channel === state.activeChannel && state.newMessage.index === index;

        if (message.system) {
          return (
            '<div class="message' + (isNew ? " is-new" : "") + '">' +
              '<div class="system-message">' +
                '<div class="system-meta">Clerk\'s Office · ' + escapeHtml(message.time) + '</div>' +
                '<div class="system-text">' + escapeHtml(message.text) + '</div>' +
              '</div>' +
            '</div>'
          );
        }

        return (
          '<div class="message' + (isNew ? " is-new" : "") + '">' +
            '<div class="message-meta">' +
              '<span class="message-author" style="color:' + escapeHtml(CHARACTER_COLORS[message.author] || "#9E9B90") + ';">' + escapeHtml(message.author) + '</span>' +
              '<span class="message-time">' + escapeHtml(message.time) + '</span>' +
            '</div>' +
            '<div class="message-text">' + escapeHtml(message.text) + '</div>' +
          '</div>'
        );
      }).join("");

      const typingMarkup = visibleCount < messages.length
        ? (
            '<div class="typing">' +
              '<div class="typing-dots">' +
                '<div class="typing-dot" style="animation-delay:0s;"></div>' +
                '<div class="typing-dot" style="animation-delay:0.3s;"></div>' +
                '<div class="typing-dot" style="animation-delay:0.6s;"></div>' +
              '</div>' +
              '<span class="typing-label">' + escapeHtml(messages[visibleCount].author) + ' is typing…</span>' +
            '</div>'
          )
        : "";

      return messageMarkup + typingMarkup;
    }

    function buildApp() {
      const channel = getActiveChannel();
      const visibleCount = state.visibleCounts[state.activeChannel] || 0;

      return (
        '<div class="app-shell">' +
          '<div class="sidebar-overlay ' + (state.sidebarOpen ? "" : "hidden") + '" data-close-sidebar="true"></div>' +
          '<div class="mobile-header">' +
            '<button class="mobile-toggle" data-toggle-sidebar="true">☰</button>' +
            '<span class="mobile-title">#' + escapeHtml(channel.name) + '</span>' +
          '</div>' +
          '<div class="app-main">' +
            '<aside class="sidebar ' + (state.sidebarOpen ? "open" : "") + '">' +
              '<div class="sidebar-header">' +
                '<div class="sidebar-title">The Perch</div>' +
                '<div class="sidebar-subtitle">Avian Municipal District</div>' +
              '</div>' +
              '<div class="sidebar-section">' +
                '<div class="sidebar-kicker">Channels</div>' +
                buildChannels(state.activeChannel) +
              '</div>' +
              buildUserList(channel) +
              '<div class="sidebar-section resources">' +
                '<div class="sidebar-kicker">District Resources</div>' +
                buildResourceLinks() +
              '</div>' +
            '</aside>' +
            '<main class="chat-shell">' +
              '<div class="chat-header">' +
                '<div class="chat-header-main">' +
                  '<div class="chat-title-row">' +
                    '<span class="chat-title-prefix">#</span>' +
                    '<span class="chat-title">' + escapeHtml(channel.name) + '</span>' +
                  '</div>' +
                  '<div class="chat-desc">' + escapeHtml(channel.desc) + '</div>' +
                '</div>' +
                '<div class="observer-badge">Observer</div>' +
              '</div>' +
              '<div class="messages" id="messages">' +
                (channel.pinned ? '<div class="pinned"><span class="pinned-label">PINNED</span>' + escapeHtml(channel.pinned) + '</div>' : "") +
                buildMessages(channel, visibleCount) +
                '<div id="chat-end"></div>' +
              '</div>' +
              '<div class="chat-input-shell">' +
                '<div class="chat-input">Observer mode — posting requires resident verification</div>' +
              '</div>' +
            '</main>' +
          '</div>' +
        '</div>'
      );
    }

    function bindEvents() {
      document.querySelectorAll("[data-screen-next]").forEach(function(button) {
        button.addEventListener("click", function() {
          const nextStep = Number(button.getAttribute("data-screen-next"));
          if (button.getAttribute("data-screen-final") === "true") {
            admitObserver();
            return;
          }
          goToScreeningStep(nextStep);
        });
      });

      document.querySelectorAll("[data-channel-id]").forEach(function(button) {
        button.addEventListener("click", function() {
          switchChannel(button.getAttribute("data-channel-id"));
        });
      });

      const sidebarToggle = document.querySelector("[data-toggle-sidebar='true']");
      if (sidebarToggle) {
        sidebarToggle.addEventListener("click", function() {
          state.sidebarOpen = !state.sidebarOpen;
          render();
        });
      }

      const sidebarClose = document.querySelector("[data-close-sidebar='true']");
      if (sidebarClose) {
        sidebarClose.addEventListener("click", function() {
          state.sidebarOpen = false;
          render();
        });
      }
    }

    function scrollMessages() {
      const chatEnd = document.getElementById("chat-end");
      if (chatEnd) {
        chatEnd.scrollIntoView({ behavior: "smooth", block: "end" });
      }
    }

    function render() {
      const app = document.getElementById("app");
      app.innerHTML = state.admitted ? buildApp() : buildScreeningModal();
      bindEvents();

      if (state.admitted) {
        requestAnimationFrame(function() {
          scrollMessages();
        });
      }

      schedulePlayback();
    }

    render();
  </script>
