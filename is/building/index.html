<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/img/a3.png" />
    <link rel="apple-touch-icon" href="/img/a3.png" />
    <title>ajin.im/is/building</title>
    <meta
      name="description"
      content="What Ajin builds: a feed that makes Korea legible, small introspective tools, a plugin that reads the sky."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../creative-house.css" />
    <script src="../../analytics.js" defer></script>
    <script src="../../creative-house.js" defer></script>
  </head>
  <body class="house-page writing-house building-house">
    <main class="house-stage">
      <header class="house-lede">
        <p class="house-title"><span class="prefix"><a href="/" target="_self">ajin.im</a> is</span> <span class="verb">building</span></p>
      </header>

      <section class="house-frame" aria-label="Things being built">
        <div class="house-grid" data-room-count="3" style="--desk-grid-rows: 7;">
          <a
            class="room room-featured"
            href="https://seoulcrushing.com"
            target="_blank"
            rel="noreferrer noopener"
            data-room="seoulcrushing"
            style="--room-index: 0; --desk-col-start: 1; --desk-col-span: 7; --desk-row-start: 1; --desk-row-span: 4; --desk-min-height: 23rem;"
          >
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Seoul Crushing</h2>
              <span class="room-meta">Korea made legible. With bite.</span>
            </div>
          </a>

          <a
            class="room room-wide"
            href="/is/building/small/"
            data-room="small-ware"
            style="--room-index: 1; --desk-col-start: 8; --desk-col-span: 5; --desk-row-start: 1; --desk-row-span: 4; --desk-min-height: 23rem;"
          >
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Live</p>
              <h2>Small Ware</h2>
              <span class="room-meta">small instruments for big questions.</span>
            </div>
          </a>

          <a
            class="room"
            href="https://github.com/mobetter20/windy-plugin-weather-why"
            target="_blank"
            rel="noreferrer noopener"
            data-room="weather-why"
            style="--room-index: 2; --desk-col-start: 1; --desk-col-span: 12; --desk-row-start: 5; --desk-row-span: 3; --desk-min-height: 15rem;"
          >
            <div class="room-copy">
              <p class="room-kicker">Room <span class="room-number"></span> / Plugin</p>
              <h2>Weather Why</h2>
              <span class="room-meta">click a weather map, learn why it looks like that.</span>
            </div>
          </a>

        </div>
      </section>

      <footer class="house-footer">
        <p class="house-footer-line">
          <span>more as they ship, <a href="mailto:contact@ajin.im">contact@ajin.im</a></span>
        </p>
      </footer>
    </main>
  </body>
</html>
