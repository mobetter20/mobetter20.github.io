<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/img/a3.png">
<link rel="apple-touch-icon" href="/img/a3.png">
<title>label</title>
<meta name="description" content="A short experience for taking apart the labels you give yourself.">
<meta property="og:title" content="label">
<meta property="og:description" content="A short experience for taking apart the labels you give yourself.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="../../../../analytics.js" defer></script>
<style>
  :root {
    --coral: #ff6b5b;
    --coral-light: #ffe8e3;
    --coral-soft: #fff4f1;
    --coral-deep: #e85a4a;
    --navy: #1a2a3a;
    --navy-soft: #2c4054;
    --cream: #fdfaf6;
    --paper: #ffffff;
    --text: #1a2a3a;
    --text-muted: #6b7785;
    --text-light: #a0aab5;
    --text-faint: #b8bfc8;
    --border: #ede4dc;
    --border-soft: #f5ede4;
  }

  * {
    box-sizing: border-box;
  }

  html {
    background: var(--cream);
    min-height: 100%;
  }

  body {
    min-height: 100vh;
    margin: 0;
    background: var(--cream);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  button {
    appearance: none;
  }

  #app {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 24px;
  }

  .card {
    position: relative;
    width: min(100%, 640px);
    margin: auto 0;
    padding: 56px 52px;
    overflow: hidden;
    border-radius: 16px;
    background: var(--paper);
    box-shadow: 0 6px 20px rgba(26,42,58,0.08);
  }

  .wordmark {
    position: absolute;
    top: 22px;
    right: 28px;
    z-index: 3;
    color: var(--text-light);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .screen {
    position: relative;
    z-index: 2;
  }

  .entry-decor-1,
  .entry-decor-2 {
    position: absolute;
    z-index: 1;
    border-radius: 50%;
    pointer-events: none;
  }

  .entry-decor-1 {
    top: -60px;
    right: -60px;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, var(--coral-light) 0%, transparent 70%);
  }

  .entry-decor-2 {
    bottom: -80px;
    left: -40px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, var(--coral-soft) 0%, transparent 70%);
  }

  .eyebrow {
    margin: 0 0 18px;
    color: var(--text-light);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .entry-title {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .entry-subtitle {
    margin: 0 0 36px;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1.5;
  }

  .label-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .label-button {
    width: 100%;
    padding: 18px 22px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--paper);
    color: var(--navy);
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    text-align: left;
    transition: all 0.18s ease;
  }

  .label-button:hover,
  .label-button:focus-visible {
    border-color: var(--coral);
    background: var(--coral-soft);
    box-shadow: 0 10px 22px rgba(232,90,74,0.12);
    transform: translateY(-2px);
  }

  .label-button:focus-visible,
  .option-button:focus-visible,
  .another-label:focus-visible,
  .reactive-answer:focus-visible,
  .reactive-skip:focus-visible,
  .reactive-next:focus-visible,
  .final-answer:focus-visible {
    outline: 3px solid rgba(255,107,91,0.24);
    outline-offset: 3px;
  }

  .micro-instruction {
    margin: 0 0 28px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    font-style: italic;
  }

  .question-statement {
    margin: 0 0 44px;
    color: var(--navy);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.2;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-button {
    width: 100%;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    padding: 18px 22px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--paper);
    color: var(--text);
    cursor: pointer;
    font-size: 15.5px;
    font-weight: 500;
    line-height: 1.5;
    text-align: left;
    transition: all 0.18s ease;
  }

  .option-button:hover {
    border-color: var(--coral);
    background: var(--coral-soft);
    transform: translateX(2px);
  }

  .option-radio {
    width: 20px;
    height: 20px;
    flex: 0 0 20px;
    margin-top: 1px;
    border: 2px solid #d4cdc5;
    border-radius: 50%;
    background: var(--paper);
    transition: border-color 0.18s ease;
  }

  .option-button:hover .option-radio,
  .option-button:focus-visible .option-radio {
    border-color: var(--coral);
  }

  .reactive-statement {
    margin: 0 0 10px;
    color: var(--text-muted);
    font-size: 17px;
    font-weight: 500;
    line-height: 1.45;
  }

  .reactive-question {
    margin: 0 0 32px;
    color: var(--navy);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }

  .reactive-answer {
    display: block;
    width: 100%;
    margin: 0 0 32px;
    padding: 6px 0;
    border: 0;
    border-bottom: 1.5px dashed #e0d4c8;
    outline: 0;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 17px;
    font-weight: 500;
  }

  .reactive-answer:focus {
    border-bottom-color: var(--coral);
    border-bottom-style: solid;
  }

  .reactive-answer::placeholder {
    color: var(--text-light);
    font-weight: 400;
    font-style: italic;
  }

  .reactive-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .reactive-skip,
  .reactive-next {
    display: inline-block;
    padding: 8px 16px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--coral-deep);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.18s ease;
  }

  .reactive-skip {
    color: var(--text-muted);
  }

  .reactive-skip:hover,
  .reactive-skip:focus-visible,
  .reactive-next:hover,
  .reactive-next:focus-visible {
    background: var(--coral-soft);
  }

  .final-header {
    margin-bottom: 32px;
  }

  .final-kicker {
    margin: 0 0 4px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
  }

  .final-label {
    margin: 0;
    color: var(--navy);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.015em;
    line-height: 1.25;
  }

  .triplets {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .triplet {
    padding: 24px 26px;
    border-left: 3px solid var(--coral);
    border-radius: 10px;
    background: var(--cream);
    transition: background 0.18s ease;
  }

  .triplet:hover {
    background: var(--coral-soft);
  }

  .triplet-statement {
    margin: 0 0 8px;
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    font-weight: 500;
    line-height: 1.4;
  }

  .triplet-question {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.4;
  }

  .final-answer {
    display: block;
    width: 100%;
    min-height: 38px;
    padding: 6px 0;
    border: 0;
    border-bottom: 1.5px dashed #e0d4c8;
    outline: 0;
    background: transparent;
    color: var(--coral-deep);
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.45;
    letter-spacing: -0.01em;
    overflow: hidden;
    overflow-wrap: break-word;
    resize: none;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .final-answer:focus {
    border-bottom-color: var(--coral);
    border-bottom-style: solid;
  }

  .final-answer::placeholder {
    color: var(--text-light);
    font-weight: 400;
    font-style: italic;
  }

  .final-footer {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--border-soft);
    text-align: center;
  }

  .thesis {
    margin: 0 0 18px;
    color: var(--navy);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .another-label {
    display: inline-block;
    padding: 8px 16px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--coral-deep);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.18s ease;
  }

  .another-label:hover,
  .another-label:focus-visible {
    background: var(--coral-soft);
  }

  @media (max-width: 640px) {
    #app {
      padding: 36px 24px;
    }

    .card {
      width: 100%;
      max-width: none;
      padding: 36px 24px;
    }

    .wordmark {
      top: 16px;
      right: 20px;
    }

    .entry-decor-1 {
      top: -38px;
      right: -42px;
      width: 140px;
      height: 140px;
    }

    .entry-decor-2 {
      bottom: -52px;
      left: -34px;
      width: 140px;
      height: 140px;
    }

    .entry-title {
      font-size: 32px;
    }

    .label-grid {
      grid-template-columns: 1fr;
    }

    .question-statement {
      font-size: 26px;
    }

    .reactive-question {
      font-size: 22px;
    }

    .triplet {
      padding: 20px;
    }

    .final-label {
      font-size: 20px;
    }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
  const STORAGE_KEY = 'label.data';

  const LABELS = {
    introvert: [
      {
        statement: "You recharge alone.",
        questions: [
          "After what kind of day, specifically?",
          "Recharging from what — people, noise, performance, decisions?",
          "Compared to recharging with whom?",
          "Always, or only since something changed?"
        ]
      },
      {
        statement: "You prefer deep conversations to small talk.",
        questions: [
          "With anyone, or with specific people?",
          "Prefer them how — initiate them, or just enjoy them when they happen?",
          "What counts as deep, and who decided?",
          "Is it small talk you dislike, or small talk with people you find boring?"
        ]
      },
      {
        statement: "You need time to process before responding.",
        questions: [
          "Process what — facts, feelings, the other person's reaction?",
          "In what kinds of conversations specifically?",
          "Need it, or take it because you've been punished for not taking it?",
          "With strangers, with family, with your partner, at work — same answer?"
        ]
      },
      {
        statement: "You find large groups draining.",
        questions: [
          "Draining how — bored, anxious, overstimulated, performing?",
          "Groups of strangers, or groups of people you know?",
          "Always draining, or draining unless you have a role?",
          "Draining at the time, or draining the next day?"
        ]
      },
      {
        statement: "You have a small circle of close friends.",
        questions: [
          "Small by choice, or small because that's what life produced?",
          "Close how — see them often, trust them, share things with them?",
          "Has the circle always been this size?",
          "Would you want it bigger if it could be?"
        ]
      },
      {
        statement: "You think before you speak.",
        questions: [
          "Think about what — what to say, how it'll land, who's listening?",
          "Always, or only when stakes feel high?",
          "Is the thinking helping, or is it a delay you can't shut off?",
          "Compared to whom — specifically, who in your life doesn't?"
        ]
      }
    ],

    perfectionist: [
      {
        statement: "You hold yourself to high standards.",
        questions: [
          "Whose standards, originally?",
          "High compared to what — your past self, your peers, an imagined version of you?",
          "In what areas, and where do you not bother?",
          "Hold yourself, or get held there by something else?"
        ]
      },
      {
        statement: "You notice mistakes others miss.",
        questions: [
          "Notice them how — with relief, with anxiety, with contempt?",
          "Mistakes in what — work, behavior, appearance, speech?",
          "Notice them in others, in yourself, or both?",
          "Notice them, or look for them?"
        ]
      },
      {
        statement: "You'd rather not start than do something poorly.",
        questions: [
          "Poorly by whose measure?",
          "Not start, or not finish?",
          "Always, or only when someone's watching?",
          "Is it about the work, or about being seen doing the work?"
        ]
      },
      {
        statement: "You find it hard to delegate.",
        questions: [
          "Hard because they'll do it wrong, or hard because you'll feel useless?",
          "Delegate to anyone, or to specific people?",
          "Hard now, or hard since something specific happened?",
          "Is it delegating, or is it trusting?"
        ]
      },
      {
        statement: "You can be your own harshest critic.",
        questions: [
          "Critic of what — output, choices, body, voice, character?",
          "Harsh in what voice — yours, or someone else's you absorbed?",
          "Always, or only after something goes wrong?",
          "Critic, or commentator you can't turn off?"
        ]
      },
      {
        statement: "You take pride in your work.",
        questions: [
          "Pride, or relief?",
          "Pride in the work, or pride in being someone who works that hard?",
          "In all your work, or only the visible kind?",
          "Take pride, or need the pride to justify the cost?"
        ]
      }
    ],

    anxious: [
      {
        statement: "You worry about things others don't.",
        questions: [
          "Worry about what specifically — health, money, people, the future, the past?",
          "Others, or specific others — your family, your partner, your friends?",
          "Worry, or notice things they're choosing not to?",
          "Always, or since something specific?"
        ]
      },
      {
        statement: "You think through worst-case scenarios.",
        questions: [
          "Think through them once, or loop on them?",
          "To prepare, or to feel prepared?",
          "About yourself, or about people you love?",
          "Does the thinking make the scenario less likely, or just more vivid?"
        ]
      },
      {
        statement: "You have trouble relaxing.",
        questions: [
          "Trouble starting, or trouble staying?",
          "Relaxing alone, or relaxing around others?",
          "Trouble now, or trouble since the conditions of your life changed?",
          "Is it relaxing you can't do, or stopping you can't do?"
        ]
      },
      {
        statement: "You're sensitive to other people's moods.",
        questions: [
          "Sensitive how — you absorb them, or you notice them and stay separate?",
          "All people's, or specific people's?",
          "Sensitive, or scanning?",
          "Helpful sensitivity, or sensitivity that costs you something?"
        ]
      },
      {
        statement: "You feel things deeply.",
        questions: [
          "Feel them deeply, or for a long time?",
          "All feelings, or mostly the difficult ones?",
          "Feel them, or get stuck in them?",
          "Compared to whom in your life?"
        ]
      },
      {
        statement: "You overthink things.",
        questions: [
          "Overthink, or think the right amount about the wrong thing?",
          "Decisions, conversations you've already had, or both?",
          "Always, or in specific contexts?",
          "Is it overthinking, or is the situation actually that complicated?"
        ]
      }
    ],

    "people-pleaser": [
      {
        statement: "You put others' needs before your own.",
        questions: [
          "Whose needs, specifically?",
          "Put theirs first, or put yours so far back you can't find them?",
          "All the time, or in specific relationships?",
          "Has it always been this way, or did it start with someone?"
        ]
      },
      {
        statement: "You find it hard to say no.",
        questions: [
          "Hard to say it, or hard to mean it once you've said it?",
          "Hard to say no to whom — strangers, friends, family, a specific person?",
          "Hard because of guilt, or hard because of what comes after?",
          "Is it the no that's hard, or what the no would reveal?"
        ]
      },
      {
        statement: "You're attuned to what others want from you.",
        questions: [
          "Attuned, or scanning?",
          "Want, or expect?",
          "Helpful, or exhausting?",
          "From everyone, or from specific people whose disappointment costs more?"
        ]
      },
      {
        statement: "You avoid conflict when possible.",
        questions: [
          "Avoid it, or smooth it before it forms?",
          "All conflict, or conflict with people who matter?",
          "Avoid because peace is the goal, or because you don't trust how it ends?",
          "Always, or since you learned what conflict can do?"
        ]
      },
      {
        statement: "You're known as easygoing.",
        questions: [
          "Known by whom?",
          "Easygoing, or quiet about what you want?",
          "Is the reputation accurate, or is it the version of you that costs the least?",
          "Easygoing in what areas, and where are you not?"
        ]
      },
      {
        statement: "You apologize even when it's not your fault.",
        questions: [
          "Apologize for what, exactly?",
          "To diffuse the moment, or because you genuinely feel responsible?",
          "To everyone, or to specific people you've learned to manage?",
          "Apologize, or pre-empt blame before it lands?"
        ]
      }
    ],

    lazy: [
      {
        statement: "You put things off.",
        questions: [
          "Put off what — boring tasks, hard tasks, tasks that matter?",
          "Put off, or avoid because finishing is the scary part?",
          "Always, or in specific areas of your life?",
          "Lazy, or under-resourced for the thing you're avoiding?"
        ]
      },
      {
        statement: "You'd rather rest than work.",
        questions: [
          "Rest, or hide?",
          "Rather than work, or rather than this specific work?",
          "Rest from what — physical labor, decisions, performing, being looked at?",
          "Has it always felt this way, or only since the work changed?"
        ]
      },
      {
        statement: "You start things and don't finish them.",
        questions: [
          "Don't finish, or move on once the interesting part is over?",
          "Don't finish what — projects, books, plans, relationships?",
          "Don't finish, or finish privately and never show anyone?",
          "Is it finishing that's hard, or being judged on the finished thing?"
        ]
      },
      {
        statement: "You take shortcuts.",
        questions: [
          "Shortcuts that work, or shortcuts that cost more later?",
          "On what — chores, work, conversations, your own goals?",
          "Lazy shortcuts, or efficient ones you've decided to call lazy?",
          "Always, or only when you don't believe in the long version?"
        ]
      },
      {
        statement: "You do the minimum required.",
        questions: [
          "Minimum required by whom?",
          "The minimum, or the maximum you can do without burning out?",
          "Minimum at work, in friendships, at home — same answer?",
          "Lazy, or correctly calibrated to a thing you don't care about?"
        ]
      },
      {
        statement: "You'd rather be told what to do than figure it out.",
        questions: [
          "Rather, or relieved when it happens?",
          "About what — career, daily tasks, big decisions?",
          "Lazy, or tired of being the one who decides?",
          "Always, or only when the stakes feel high?"
        ]
      }
    ],

    creative: [
      {
        statement: "You see things others don't.",
        questions: [
          "See them, or notice them and not say anything?",
          "See what — patterns, possibilities, problems, openings?",
          "In what areas — work, art, people, your own life?",
          "Always, or only in places you've been told you're allowed to be creative?"
        ]
      },
      {
        statement: "You think outside the box.",
        questions: [
          "Whose box?",
          "Think outside it, or never been comfortable inside it?",
          "About big things, or about small things others don't bother with?",
          "Creative, or just operating from somewhere different and calling it that?"
        ]
      },
      {
        statement: "You need creative outlets.",
        questions: [
          "Need them how — to feel like yourself, to process things, to escape?",
          "Outlets for what specifically?",
          "Need to make, or need to be seen making?",
          "Always, or since something in your life had to be expressed somewhere?"
        ]
      },
      {
        statement: "You get bored with routine.",
        questions: [
          "Bored, or restless?",
          "All routine, or routine that wasn't your idea?",
          "Bored quickly, or bored once the novelty actually runs out?",
          "Creative, or under-stimulated?"
        ]
      },
      {
        statement: "You have a lot of ideas.",
        questions: [
          "Ideas, or starting points you haven't done anything with?",
          "Ideas about what — work, art, projects, ways things could be different?",
          "Have them, or get them — and where do they come from?",
          "A lot, or a few that keep returning in different shapes?"
        ]
      },
      {
        statement: "You're often called creative.",
        questions: [
          "Called it by whom?",
          "Called creative, or called creative as a way of explaining you?",
          "Accurate, or a label that's done some work for you?",
          "Does the label describe what you do, or what people expect from you?"
        ]
      }
    ]
  };

  const LABEL_ORDER = ['introvert', 'perfectionist', 'anxious', 'people-pleaser', 'lazy', 'creative'];

  const app = document.getElementById('app');
  let currentScreen = 'entry';
  let currentLabel = null;
  let currentStatementIndex = 0;
  let mode = 'question';
  let data = loadData();
  let finalSaveTimer = null;

  function loadData() {
    try {
      const raw = window.localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
    } catch (error) {
      return {};
    }
  }

  function saveData() {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (error) {
      return;
    }
  }

  function getLabelState(name) {
    if (!data[name] || !Array.isArray(data[name].answers)) {
      data[name] = { answers: Array(LABELS[name].length).fill(null) };
      return data[name];
    }

    const normalized = data[name].answers.slice(0, LABELS[name].length);
    while (normalized.length < LABELS[name].length) normalized.push(null);
    data[name].answers = normalized.map((item) => {
      if (!item || typeof item !== 'object') return null;
      const questionIndex = Number(item.questionIndex);
      if (!Number.isInteger(questionIndex) || questionIndex < 0 || questionIndex > 3) return null;
      return {
        questionIndex,
        answer: typeof item.answer === 'string' ? item.answer : ''
      };
    });

    return data[name];
  }

  function routeToLabel(name) {
    data = loadData();
    currentLabel = name;
    const labelState = getLabelState(name);
    const nextIndex = labelState.answers.findIndex((answer) => answer === null);

    if (nextIndex === -1) {
      currentScreen = 'final';
      mode = 'final';
    } else {
      currentStatementIndex = nextIndex;
      currentScreen = 'question';
      mode = 'question';
    }

    saveData();
    render();
  }

  function chooseQuestion(questionIndex) {
    const labelState = getLabelState(currentLabel);
    labelState.answers[currentStatementIndex] = { questionIndex, answer: '' };
    saveData();
    currentScreen = 'reactive';
    mode = 'reactive';
    render();
  }

  function submitReactiveAnswer(answer) {
    const labelState = getLabelState(currentLabel);
    const currentAnswer = labelState.answers[currentStatementIndex];
    if (!currentAnswer) return;

    currentAnswer.answer = answer;
    saveData();

    if (currentStatementIndex < LABELS[currentLabel].length - 1) {
      currentStatementIndex += 1;
      currentScreen = 'question';
      mode = 'question';
    } else {
      currentScreen = 'final';
      mode = 'final';
    }

    render();
  }

  function debounceFinalSave() {
    window.clearTimeout(finalSaveTimer);
    finalSaveTimer = window.setTimeout(saveData, 500);
  }

  function returnToEntry() {
    currentLabel = null;
    currentStatementIndex = 0;
    currentScreen = 'entry';
    mode = 'question';
    render();
  }

  function render() {
    if (currentScreen === 'entry') {
      renderEntry();
    } else if (currentScreen === 'question') {
      renderQuestion();
    } else if (currentScreen === 'reactive') {
      renderReactive();
    } else {
      renderFinal();
    }
  }

  function renderCard(content, isEntry) {
    app.innerHTML = `
      <main class="card" aria-live="polite">
        <div class="wordmark">label</div>
        ${isEntry ? '<div class="entry-decor-1"></div><div class="entry-decor-2"></div>' : ''}
        <section class="screen">${content}</section>
      </main>
    `;
  }

  function renderEntry() {
    renderCard(`
      <p class="eyebrow">Personality assessment</p>
      <h1 class="entry-title">Which one are you?</h1>
      <p class="entry-subtitle">Select the label you give yourself.</p>
      <div class="label-grid">
        ${LABEL_ORDER.map((name) => `
          <button class="label-button" type="button" data-label="${escapeAttribute(name)}">${escapeHtml(name)}</button>
        `).join('')}
      </div>
    `, true);

    document.querySelectorAll('.label-button').forEach((button) => {
      button.addEventListener('click', () => routeToLabel(button.dataset.label));
    });
  }

  function renderQuestion() {
    const item = LABELS[currentLabel][currentStatementIndex];
    renderCard(`
      <p class="micro-instruction">Which question is this answering?</p>
      <h1 class="question-statement">${escapeHtml(item.statement)}</h1>
      <div class="options">
        ${item.questions.map((question, index) => `
          <button class="option-button" type="button" data-question-index="${index}">
            <span class="option-radio" aria-hidden="true"></span>
            <span>${escapeHtml(question)}</span>
          </button>
        `).join('')}
      </div>
    `, false);

    document.querySelectorAll('.option-button').forEach((button) => {
      button.addEventListener('click', () => chooseQuestion(Number(button.dataset.questionIndex)));
    });
  }

  function renderReactive() {
    const item = LABELS[currentLabel][currentStatementIndex];
    const selected = getLabelState(currentLabel).answers[currentStatementIndex];
    const question = item.questions[selected.questionIndex];

    renderCard(`
      <p class="micro-instruction">Answer if you want, or sit with it.</p>
      <p class="reactive-statement">${escapeHtml(item.statement)}</p>
      <h1 class="reactive-question">${escapeHtml(question)}</h1>
      <input class="reactive-answer" type="text" autocomplete="off" enterkeyhint="done" placeholder="…" aria-label="Your answer">
      <div class="reactive-actions">
        <button class="reactive-skip" type="button">sit with it</button>
        <button class="reactive-next" type="button">answer it &rarr;</button>
      </div>
    `, false);

    const input = document.querySelector('.reactive-answer');
    input.focus();
    input.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      submitReactiveAnswer(input.value);
    });
    document.querySelector('.reactive-skip').addEventListener('click', () => {
      submitReactiveAnswer('');
    });
    document.querySelector('.reactive-next').addEventListener('click', () => {
      submitReactiveAnswer(input.value);
    });
  }

  function renderFinal() {
    const labelState = getLabelState(currentLabel);

    renderCard(`
      <header class="final-header">
        <p class="final-kicker">you said:</p>
        <h1 class="final-label">${escapeHtml(currentLabel)}</h1>
      </header>
      <div class="triplets">
        ${LABELS[currentLabel].map((item, index) => {
          const answer = labelState.answers[index];
          const question = item.questions[answer.questionIndex];
          return `
            <article class="triplet">
              <p class="triplet-statement">${escapeHtml(item.statement)}</p>
              <p class="triplet-question">${escapeHtml(question)}</p>
              <textarea class="final-answer" rows="1" wrap="soft" placeholder="(empty)" data-answer-index="${index}" autocomplete="off">${escapeHtml(answer.answer)}</textarea>
            </article>
          `;
        }).join('')}
      </div>
      <footer class="final-footer">
        <p class="thesis">Questions stay open.</p>
        <button class="another-label" type="button">Question another label &rarr;</button>
      </footer>
    `, false);

    document.querySelectorAll('.final-answer').forEach((input) => {
      autosizeAnswer(input);
      input.addEventListener('input', () => {
        const index = Number(input.dataset.answerIndex);
        labelState.answers[index].answer = input.value;
        autosizeAnswer(input);
        debounceFinalSave();
      });
    });

    document.querySelector('.another-label').addEventListener('click', returnToEntry);
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttribute(value) {
    return escapeHtml(value).replace(/`/g, '&#096;');
  }

  function autosizeAnswer(input) {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  }

  function autosizeFinalAnswers() {
    document.querySelectorAll('.final-answer').forEach(autosizeAnswer);
  }

  window.addEventListener('resize', autosizeFinalAnswers);

  window.addEventListener('beforeunload', () => {
    if (mode === 'final') saveData();
  });

  render();
</script>
</body>
</html>
