<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Joseon Review — admissions, rankings, and class profiles of the Joseon civil examination</title>
<meta name="description" content="The Joseon civil service examination, ranked and profiled. 15,151 admitted officials across 800 sittings, 1393 to 1894, by the numbers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
<script src="/analytics.js" defer></script>
<style>
  /* ============ palette (navy only) ============ */
  :root{
    --bg:#f3f3f0; --panel:#fbfbf9; --panel2:#f4f4f1; --ink:#191c22; --ink2:#535965; --ink3:#7e838f;
    --accent:#22405f; --accent2:#345878; --accent-bg:rgba(34,64,95,.09); --gold:#917638;
    --rule:#e1e0da; --rule2:#d2d2cb;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif; font-size:15px; line-height:1.6;
    -webkit-font-smoothing:antialiased; letter-spacing:.1px;
  }
  a{color:inherit}
  .serif{font-family:"Fraunces",Georgia,serif}
  .kr{font-family:"Noto Serif KR","Fraunces",serif}
  .tnum{font-variant-numeric:tabular-nums}
  .wrap{max-width:1060px; margin:0 auto; padding:30px 30px 80px}
  .kick{font-size:11px; font-weight:600; letter-spacing:2.6px; text-transform:uppercase; color:var(--ink3)}

  /* ============ sticky header / global nav ============ */
  .topbar{position:sticky; top:0; z-index:40; background:rgba(243,243,240,.92); backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid var(--rule2)}
  .topbar-in{max-width:1060px; margin:0 auto; padding:11px 30px; display:flex; align-items:center; gap:20px}
  .brand{display:flex; align-items:center; gap:11px; text-decoration:none; flex-shrink:0}
  .brand .bseal{width:30px; height:30px; flex-shrink:0}
  .brand .bname{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:22px; letter-spacing:-.3px; color:var(--ink); line-height:1}
  .nav{display:flex; align-items:center; gap:5px; margin-left:auto}
  .nav a{font-size:13px; font-weight:500; color:var(--ink2); text-decoration:none; padding:7px 11px; border-radius:7px; letter-spacing:.2px; white-space:nowrap}
  .nav a:hover{background:var(--panel2); color:var(--ink)}
  .nav a[aria-current="page"]{color:var(--accent); background:var(--accent-bg); font-weight:600}
  .search{display:flex; align-items:center; gap:0; flex-shrink:0}
  .search input{font-family:inherit; font-size:13px; color:var(--ink); background:var(--panel); border:1px solid var(--rule2);
    border-radius:7px; padding:7px 11px; width:160px; transition:width .18s ease, border-color .15s}
  .search input:focus{outline:none; border-color:var(--accent2); width:200px}
  .search input::placeholder{color:var(--ink3)}
  .navtoggle{display:none}

  /* ============ masthead ============ */
  .mast{display:flex; align-items:flex-start; gap:22px; padding-top:16px}
  .seal{flex-shrink:0; width:66px; height:66px; margin-top:5px}
  .mast-tx{flex:1; min-width:0}
  .mast h1{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:54px; line-height:.98;
    letter-spacing:-.5px; margin:7px 0 0; color:var(--ink)}
  .mast .dek{margin:11px 0 0; font-size:16px; color:var(--ink2); max-width:46ch}
  .estbar{display:flex; align-items:baseline; gap:14px; margin-top:5px; flex-wrap:wrap}
  .estbar .est{font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--accent); font-weight:600}
  .dbl-rule{height:0; border-top:3px double var(--rule2); margin:30px 0 0}

  /* ============ marquee stats ============ */
  .marquee{display:grid; grid-template-columns:repeat(4,1fr); margin:0; border-bottom:1px solid var(--rule)}
  .mq{padding:26px 22px 24px; border-left:1px solid var(--rule)}
  .mq:first-child{border-left:0; padding-left:2px}
  .mq .ml{font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink3); font-weight:600; line-height:1.4}
  .mq .mv{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:42px; line-height:1; margin-top:13px; color:var(--ink); letter-spacing:-1px}
  .mq .mv sup{font-size:18px; color:var(--accent); font-weight:600; top:-1.1em}
  .mq .mv sup a{text-decoration:none; color:inherit}
  .mq .mv sup a:hover{text-decoration:underline}
  .mq .mv small{font-size:15px; color:var(--ink3); font-weight:500; letter-spacing:0}

  /* ============ section scaffold ============ */
  section{padding:38px 0 4px; border-bottom:1px solid var(--rule)}
  .sec-h{display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:22px}
  .sec-h h2{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:25px; margin:6px 0 0; letter-spacing:-.2px}
  .sec-h .sub{font-size:13px; color:var(--ink2); margin-top:3px}
  .sec-note{font-size:12.5px; color:var(--ink3); text-align:right; max-width:30ch; line-height:1.5; flex-shrink:0}
  .seemore{font-size:12px; font-weight:600; letter-spacing:.3px; color:var(--accent); text-decoration:none; white-space:nowrap}
  .seemore:hover{text-decoration:underline}
  .seemore::after{content:" \2192"}

  /* ============ selectivity chart ============ */
  .chartwrap{margin:6px 0 30px}
  .chart{display:block; width:100%; height:auto}
  .xlabels{display:flex; justify-content:space-between; font-size:11px; color:var(--ink3); letter-spacing:.5px; margin-top:7px}
  .chart-cap{font-size:13px; color:var(--ink2); margin:14px 0 4px; max-width:64ch}

  /* ============ league table ============ */
  table.league{width:100%; border-collapse:collapse; margin-bottom:8px}
  .league th{font-size:10.5px; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink3); font-weight:600;
    text-align:left; padding:0 12px 12px; border-bottom:1px solid var(--rule2)}
  .league th.num,.league td.num{text-align:right; font-variant-numeric:tabular-nums}
  .league td{padding:14px 12px; border-bottom:1px solid var(--rule); vertical-align:middle}
  .league tr:hover td{background:var(--panel2)}
  .league a.row-lnk{text-decoration:none; color:inherit; display:block}
  .rk{font-family:"Fraunces",Georgia,serif; font-size:20px; color:var(--ink3); width:38px; font-weight:500; font-variant-numeric:tabular-nums}
  .inst .seat{font-family:"Noto Serif KR",serif; font-size:18px; font-weight:500; color:var(--ink)}
  .inst .rom{font-size:13px; color:var(--ink2); margin-left:7px}
  .inst .note{font-size:12px; color:var(--accent); margin-top:2px; font-style:italic}
  .adm{font-family:"Fraunces",Georgia,serif; font-size:19px; font-weight:600; color:var(--ink)}
  .barcell{width:230px}
  .bar{height:9px; background:var(--accent-bg); border-radius:2px; overflow:hidden}
  .bar span{display:block; height:100%; background:var(--accent); border-radius:2px}
  .pct{font-size:13px; color:var(--ink2); font-variant-numeric:tabular-nums; width:54px}
  .league-foot{font-size:12.5px; color:var(--ink3); padding:13px 12px 2px; line-height:1.55}
  .league-foot b{color:var(--ink2); font-weight:600; font-style:normal}

  /* ============ concentration callout ============ */
  .conc{display:flex; gap:46px; padding:34px 0 36px; border-bottom:1px solid var(--rule); flex-wrap:wrap}
  .conc .cstat{flex:0 0 auto}
  .conc .cnum{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:50px; line-height:1; color:var(--accent); letter-spacing:-1.5px}
  .conc .ctx{font-size:13.5px; color:var(--ink2); margin-top:9px; max-width:24ch; line-height:1.5}
  .conc .ctx b{color:var(--ink); font-weight:600}

  /* ============ admissions tracks ============ */
  .tracks{padding:34px 0 38px; border-bottom:1px solid var(--rule)}
  .trk{margin-bottom:17px}
  .trk:last-child{margin-bottom:0}
  .trk-top{display:flex; justify-content:space-between; align-items:baseline; gap:14px; font-size:14px; margin-bottom:7px}
  .trk-top .tn{color:var(--ink); font-weight:500}
  .trk-top .tp{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:17px; color:var(--ink); flex-shrink:0; font-variant-numeric:tabular-nums}
  .trk-bar{height:13px; background:var(--accent-bg); border-radius:2px; overflow:hidden}
  .trk-bar span{display:block; height:100%; border-radius:2px}
  .trk.std .trk-bar span{background:var(--accent2)}
  .trk.spc .trk-bar span{background:var(--accent)}
  .trk-cap{font-size:12.5px; color:var(--ink3); margin-top:16px; line-height:1.55; max-width:66ch}

  /* ============ footer / colophon ============ */
  footer{padding:30px 0 0}
  .src{font-size:12.5px; color:var(--ink2); line-height:1.6; max-width:74ch}
  .src b{color:var(--ink); font-weight:600}
  .src a{color:var(--accent); text-decoration:none}
  .src a:hover{text-decoration:underline}
  .src .srclist{display:block; margin-top:9px; color:var(--ink3)}
  .src .srclist a{color:var(--ink2)}
  .colophon{margin-top:18px; font-size:12.5px; color:var(--ink3); letter-spacing:.3px}
  .colophon a{color:var(--accent); text-decoration:none; font-weight:600}
  .colophon a:hover{text-decoration:underline}

  /* ============ generic view chrome (shared across deeper views) ============ */
  .pagehead{padding-top:20px}
  .crumb{font-size:12px; letter-spacing:.3px; color:var(--ink3); margin-bottom:14px}
  .crumb a{color:var(--accent); text-decoration:none; font-weight:500}
  .crumb a:hover{text-decoration:underline}
  .crumb .sep{margin:0 8px; color:var(--rule2)}
  .ph-title{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:40px; line-height:1.02; letter-spacing:-.5px; margin:6px 0 0; color:var(--ink)}
  .ph-sub{font-size:15px; color:var(--ink2); margin:11px 0 0; max-width:60ch}
  .ph-sub .kr{font-size:16px}

  /* stat strip (cohort / clan headers) */
  .statstrip{display:flex; flex-wrap:wrap; gap:0; border:1px solid var(--rule); border-radius:10px; overflow:hidden; margin:26px 0 0; background:var(--panel)}
  .statstrip .ss{flex:1 1 0; min-width:130px; padding:18px 20px; border-left:1px solid var(--rule)}
  .statstrip .ss:first-child{border-left:0}
  .statstrip .ssl{font-size:10px; letter-spacing:1.3px; text-transform:uppercase; color:var(--ink3); font-weight:600}
  .statstrip .ssv{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:28px; line-height:1.05; margin-top:9px; color:var(--ink); letter-spacing:-.5px; font-variant-numeric:tabular-nums}
  .statstrip .ssv small{font-size:14px; color:var(--ink3); font-weight:500; letter-spacing:0}
  .statstrip .ssv a{text-decoration:none; color:var(--accent)}
  .statstrip .ssv a:hover{text-decoration:underline}
  .statstrip .ssv .kr{font-size:24px}

  /* valedictorian / highlight card */
  .laurel{display:flex; align-items:center; gap:22px; margin:26px 0 0; padding:22px 26px; border:1px solid var(--rule2);
    border-left:4px solid var(--gold); border-radius:10px; background:var(--panel); text-decoration:none; color:inherit}
  .laurel:hover{background:var(--panel2)}
  .laurel .lcrest{flex-shrink:0; width:46px; height:46px}
  .laurel .lk{font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--gold); font-weight:700}
  .laurel .lname{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:27px; line-height:1.05; margin-top:5px; color:var(--ink); letter-spacing:-.3px}
  .laurel .lname .lh{font-family:"Noto Serif KR",serif; font-size:19px; color:var(--ink2); font-weight:500; margin-left:9px}
  .laurel .lmeta{font-size:13px; color:var(--ink2); margin-top:5px}
  .laurel .lgo{margin-left:auto; color:var(--accent); font-size:13px; font-weight:600; white-space:nowrap}

  /* grade breakdown chips */
  .gradechips{display:flex; flex-wrap:wrap; gap:9px; margin-top:6px}
  .gchip{display:inline-flex; align-items:baseline; gap:7px; font-size:13px; color:var(--ink2); background:var(--panel2);
    border:1px solid var(--rule); border-radius:20px; padding:5px 13px}
  .gchip b{font-family:"Fraunces",Georgia,serif; font-size:15px; color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums}
  .gchip .gkr{font-family:"Noto Serif KR",serif; color:var(--ink3); font-size:12px}

  /* roster / list tables */
  .tscroll{overflow-x:auto; -webkit-overflow-scrolling:touch} /* table keeps its scroll inside its own box at every width */
  table.dt{width:100%; border-collapse:collapse; margin:8px 0}
  .dt th{font-size:10.5px; letter-spacing:1.3px; text-transform:uppercase; color:var(--ink3); font-weight:600;
    text-align:left; padding:0 12px 11px; border-bottom:1px solid var(--rule2); white-space:nowrap}
  .dt th.num,.dt td.num{text-align:right; font-variant-numeric:tabular-nums}
  .dt td{padding:12px; border-bottom:1px solid var(--rule); vertical-align:middle}
  .dt tbody tr:hover td{background:var(--panel2)}
  .dt a{text-decoration:none; color:inherit}
  .dt .nm{font-weight:500; color:var(--ink)}
  .dt .nm .nh{font-family:"Noto Serif KR",serif; color:var(--ink3); font-size:13px; margin-left:7px; font-weight:500}
  .dt .clan{color:var(--accent); font-weight:500}
  .dt .clan .ck{font-family:"Noto Serif KR",serif; color:var(--ink3); font-weight:500; font-size:13px; margin-left:5px}
  .dt .muted{color:var(--ink3)}
  .dt .rnk{font-variant-numeric:tabular-nums; color:var(--ink2)}
  .dt .laur-dot{display:inline-block; font-size:11px; color:var(--gold); font-weight:700; margin-left:6px; letter-spacing:.4px}
  .dt .grd .gkr{font-family:"Noto Serif KR",serif; font-size:12px; color:var(--ink3); margin-left:5px}

  /* person profile card */
  .profile{max-width:640px; margin:30px auto 0; border:1px solid var(--rule2); border-radius:12px; background:var(--panel); overflow:hidden}
  .profile-top{padding:34px 36px 28px; border-bottom:1px solid var(--rule); text-align:center}
  .profile-crest{width:54px; height:54px; margin:0 auto 16px}
  .profile .pkick{font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--ink3); font-weight:600}
  .profile .pname{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:46px; line-height:1; margin:12px 0 0; letter-spacing:-.5px; color:var(--ink)}
  .profile .phanja{font-family:"Noto Serif KR",serif; font-size:26px; color:var(--ink2); margin-top:10px; font-weight:500}
  .profile .pbadge{display:inline-block; margin-top:16px; font-size:11px; letter-spacing:1.3px; text-transform:uppercase;
    font-weight:700; color:var(--gold); border:1px solid var(--gold); border-radius:20px; padding:5px 15px}
  .profile-body{padding:8px 36px 30px}
  .frow{display:flex; gap:18px; padding:15px 0; border-bottom:1px solid var(--rule); align-items:baseline}
  .frow:last-child{border-bottom:0}
  .frow .fl{flex:0 0 132px; font-size:11px; letter-spacing:1.1px; text-transform:uppercase; color:var(--ink3); font-weight:600; padding-top:2px}
  .frow .fv{flex:1; font-size:15.5px; color:var(--ink)}
  .frow .fv .kr{font-family:"Noto Serif KR",serif}
  .frow .fv a{color:var(--accent); text-decoration:none; font-weight:500}
  .frow .fv a:hover{text-decoration:underline}
  .frow .fv .fsub{display:block; font-size:13px; color:var(--ink3); margin-top:3px}
  .altnames{display:flex; gap:0; flex-wrap:wrap; border-top:1px solid var(--rule); margin-top:0}
  .altnames .an{flex:1 1 0; min-width:33%; padding:13px 0; text-align:center; border-left:1px solid var(--rule)}
  .altnames .an:first-child{border-left:0}
  .altnames .anl{font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:var(--ink3); font-weight:600}
  .altnames .anv{font-family:"Noto Serif KR",serif; font-size:18px; color:var(--ink); margin-top:5px; font-weight:500}
  .altnames .anv .anr{display:block; font-family:"Inter",sans-serif; font-size:11px; color:var(--ink3); margin-top:2px; letter-spacing:.3px}

  /* trends: stepped concentration + histogram + exam-type bars */
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:42px}
  .stepwrap{margin-top:4px}
  .step{display:flex; align-items:center; gap:14px; margin-bottom:13px}
  .step .sl{flex:0 0 92px; font-size:12px; color:var(--ink2); font-weight:500}
  .step .sbar{flex:1; height:11px; background:var(--accent-bg); border-radius:2px; overflow:hidden}
  .step .sbar span{display:block; height:100%; background:var(--accent2); border-radius:2px}
  .step .sv{flex:0 0 56px; text-align:right; font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:16px; color:var(--ink); font-variant-numeric:tabular-nums}
  .histwrap{margin-top:6px}
  .hist{display:flex; align-items:flex-end; gap:1px; height:150px; border-bottom:1px solid var(--rule2)}
  .hist .hb{flex:1 1 0; background:var(--accent-bg); border-radius:1px 1px 0 0; min-width:0; position:relative}
  .hist .hb.hi{background:var(--accent)}
  .histx{display:flex; justify-content:space-between; font-size:11px; color:var(--ink3); margin-top:7px; letter-spacing:.4px}
  .histcap{font-size:12.5px; color:var(--ink3); margin-top:12px; line-height:1.55}
  .barlist{margin-top:4px}
  .blrow{margin-bottom:14px}
  .blrow .bltop{display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:6px; font-size:13.5px}
  .blrow .bln{color:var(--ink); font-weight:500}
  .blrow .bln .blk{font-family:"Noto Serif KR",serif; color:var(--ink3); font-size:12px; margin-left:6px; font-weight:500}
  .blrow .blg{font-size:12px; color:var(--ink3); margin-top:2px; max-width:62ch}
  .blrow .blp{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:16px; color:var(--ink); flex-shrink:0; font-variant-numeric:tabular-nums}
  .blrow .blbar{height:11px; background:var(--accent-bg); border-radius:2px; overflow:hidden}
  .blrow .blbar span{display:block; height:100%; background:var(--accent); border-radius:2px}

  /* mini period bars (clan profile) */
  .periodbars{display:flex; align-items:flex-end; gap:3px; height:96px; margin-top:6px; border-bottom:1px solid var(--rule2)}
  .periodbars .pbcol{flex:1 1 0; background:var(--accent-bg); border-radius:1px 1px 0 0; min-width:0}
  .periodbars .pbcol.on{background:var(--accent)}
  .periodx{display:flex; justify-content:space-between; font-size:11px; color:var(--ink3); margin-top:7px}

  /* filter / control bar */
  .controls{display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin:24px 0 4px}
  .controls .ctlsearch{position:relative; flex:1 1 240px; min-width:200px}
  .controls input[type=text]{font-family:inherit; font-size:14px; color:var(--ink); background:var(--panel); border:1px solid var(--rule2);
    border-radius:8px; padding:9px 13px; width:100%}
  .controls input[type=text]:focus{outline:none; border-color:var(--accent2)}
  .controls input::placeholder{color:var(--ink3)}
  .controls select{font-family:inherit; font-size:13px; color:var(--ink); background:var(--panel); border:1px solid var(--rule2);
    border-radius:8px; padding:9px 30px 9px 13px; -webkit-appearance:none; appearance:none; cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%237e838f'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center}
  .controls select:focus{outline:none; border-color:var(--accent2)}
  .chipfilter{display:flex; flex-wrap:wrap; gap:6px}
  .chipfilter button{font-family:inherit; font-size:12px; font-weight:500; color:var(--ink2); background:var(--panel);
    border:1px solid var(--rule2); border-radius:20px; padding:6px 13px; cursor:pointer; white-space:nowrap}
  .chipfilter button:hover{border-color:var(--accent2); color:var(--ink)}
  .chipfilter button[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600}
  .resultcount{font-size:12.5px; color:var(--ink3); margin:18px 0 2px; letter-spacing:.2px}
  .resultcount b{color:var(--ink2); font-weight:600; font-variant-numeric:tabular-nums}

  /* cohort index: king groups */
  .kgroup{padding:30px 0 6px; border-bottom:1px solid var(--rule)}
  .kgroup:last-of-type{border-bottom:0}
  .khead{display:flex; align-items:baseline; gap:14px; margin-bottom:6px}
  .khead .kname{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:23px; letter-spacing:-.2px; color:var(--ink)}
  .khead .kname .kkr{font-family:"Noto Serif KR",serif; font-size:16px; color:var(--ink3); margin-left:9px; font-weight:500}
  .khead .kreign{font-size:12px; color:var(--ink3); letter-spacing:.4px; font-variant-numeric:tabular-nums}
  .khead .kn{margin-left:auto; font-size:12px; color:var(--ink3); letter-spacing:.3px}
  .khead .kn b{font-family:"Fraunces",Georgia,serif; color:var(--ink2); font-size:15px; font-weight:600; font-variant-numeric:tabular-nums}

  /* show-more */
  .showmore{display:block; width:100%; font-family:inherit; font-size:13px; font-weight:600; letter-spacing:.3px; color:var(--accent);
    background:var(--panel); border:1px solid var(--rule2); border-radius:9px; padding:13px; cursor:pointer; margin-top:14px}
  .showmore:hover{background:var(--panel2); border-color:var(--accent2)}

  /* methodology / about disclosure */
  .about{margin:26px 0 0; border:1px solid var(--rule); border-radius:10px; background:var(--panel); overflow:hidden}
  .about > summary{list-style:none; cursor:pointer; padding:16px 22px; font-size:13px; font-weight:600; letter-spacing:.4px;
    color:var(--ink); display:flex; align-items:center; gap:10px}
  .about > summary::-webkit-details-marker{display:none}
  .about > summary .akick{font-size:10.5px; letter-spacing:1.4px; text-transform:uppercase; color:var(--ink3); font-weight:600}
  .about > summary .achev{margin-left:auto; color:var(--ink3); transition:transform .18s}
  .about[open] > summary .achev{transform:rotate(180deg)}
  .about-body{padding:4px 22px 22px; font-size:13.5px; color:var(--ink2); line-height:1.65; max-width:74ch}
  .about-body p{margin:0 0 12px}
  .about-body .srclist{margin-top:6px; font-size:12.5px; color:var(--ink3)}
  .about-body .srclist a{color:var(--ink2); text-decoration:none; display:block; padding:3px 0}
  .about-body .srclist a:hover{text-decoration:underline}

  /* empty state */
  .empty{padding:60px 20px; text-align:center; color:var(--ink3); font-size:15px}
  .empty .ekr{font-family:"Noto Serif KR",serif; font-size:34px; color:var(--rule2); display:block; margin-bottom:14px}
  .empty a{color:var(--accent); text-decoration:none; font-weight:600}

  /* notable alumni list */
  .notable{display:flex; flex-wrap:wrap; gap:8px; margin-top:4px}
  .notable a{display:inline-flex; align-items:baseline; gap:7px; font-size:13.5px; color:var(--ink); text-decoration:none;
    background:var(--panel2); border:1px solid var(--rule); border-radius:7px; padding:7px 13px}
  .notable a:hover{border-color:var(--accent2); background:var(--panel)}
  .notable a .nak{font-family:"Noto Serif KR",serif; font-size:12px; color:var(--ink3)}
  .notable a .natag{font-size:10px; letter-spacing:.6px; text-transform:uppercase; color:var(--gold); font-weight:700}
  .subhead{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:17px; color:var(--ink); margin:26px 0 12px; letter-spacing:-.1px}

  /* note line (clan dry note, etc.) */
  .drynote{font-size:14px; color:var(--ink2); line-height:1.6; margin:14px 0 0; max-width:66ch; font-style:italic}

  /* ============ responsive ============ */
  @media (max-width:860px){
    .grid2{grid-template-columns:1fr; gap:30px}
    /* header: nav drops to its own row before the single row would crowd the search box */
    .topbar-in{flex-wrap:wrap; row-gap:8px}
    .brand{order:1}
    .search{order:2; margin-left:auto}
    .nav{order:3; width:100%; margin-left:0; overflow-x:auto; gap:2px; -webkit-overflow-scrolling:touch; padding-bottom:2px}
    .nav a{padding:6px 10px}
  }
  @media (max-width:720px){
    .wrap{padding:24px 18px 70px}
    .topbar-in{padding:10px 18px; gap:12px}
    .nav a{padding:6px 9px}
    .search input{width:130px}
    .search input:focus{width:150px}
    .marquee{grid-template-columns:repeat(2,1fr)}
    .mq{border-top:1px solid var(--rule); padding:20px 16px} .mq:nth-child(-n+2){border-top:0} .mq:nth-child(odd){border-left:0; padding-left:2px}
    .mast{gap:16px} .mast h1{font-size:38px} .seal{width:54px;height:54px}
    .mast .dek{font-size:15px}
    .ph-title{font-size:32px}
    .conc{gap:24px} .conc .cnum{font-size:40px}
    .sec-h{flex-direction:column; align-items:flex-start; gap:8px} .sec-note{text-align:left}
    .statstrip .ss{flex-basis:50%; min-width:50%; border-left:0; border-top:1px solid var(--rule)}
    .statstrip .ss:nth-child(odd){border-right:1px solid var(--rule)}
    .statstrip .ss:nth-child(-n+2){border-top:0}
    .profile-top{padding:28px 22px 24px} .profile-body{padding:6px 22px 24px} .profile .pname{font-size:38px}
    .frow{flex-direction:column; gap:4px} .frow .fl{flex-basis:auto}
    .laurel{gap:14px; padding:18px} .laurel .lcrest{display:none} .laurel .lgo{display:none}
    .barcell{width:auto; min-width:120px}
    /* tables -> horizontal scroll on small screens */
    .tscroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -18px; padding:0 18px}
    .tscroll table{min-width:560px}
    .khead{flex-wrap:wrap; gap:6px 12px} .khead .kn{margin-left:0; width:100%}
  }
  @media (max-width:430px){
    .mast h1{font-size:32px}
    .mq .mv{font-size:34px}
  }
</style>
</head>
<body>

<!-- ============ sticky global header ============ -->
<div class="topbar">
  <div class="topbar-in">
    <a class="brand" href="#/" aria-label="The Joseon Review — home">
      <svg class="bseal" viewBox="0 0 100 100" aria-hidden="true">
        <rect x="4" y="4" width="92" height="92" rx="16" fill="var(--accent)"/>
        <text x="50" y="45" text-anchor="middle" font-family="Noto Serif KR, serif" font-weight="700" font-size="36" fill="var(--bg)">文</text>
        <text x="50" y="84" text-anchor="middle" font-family="Noto Serif KR, serif" font-weight="700" font-size="36" fill="var(--bg)">科</text>
      </svg>
      <span class="bname">The Joseon Review</span>
    </a>
    <nav class="nav" id="nav" aria-label="Sections">
      <a href="#/" data-route="">Overview</a>
      <a href="#/cohorts" data-route="cohorts">Cohorts</a>
      <a href="#/feeders" data-route="feeders">Feeders</a>
      <a href="#/trends" data-route="trends">Trends</a>
    </nav>
    <form class="search" id="searchform" role="search" autocomplete="off">
      <input type="text" id="searchbox" name="q" placeholder="Search a name or clan" aria-label="Search admitted officials by name or clan">
    </form>
  </div>
</div>

<!-- ============ app mount ============ -->
<main class="wrap" id="app" aria-live="polite"></main>

<!-- ============ data (inlined by build.py) ============ -->
<script type="application/json" id="data"><!--DATA--></script>
<script type="application/json" id="lookups"><!--LOOKUPS--></script>

<script>
"use strict";
(function(){
/* =========================================================================
   The Joseon Review — hash-routed single-page app.
   Data is inlined above and parsed once. View-indexes (roster by cohort,
   roster by clan) are built once on first need. Large lists render
   incrementally via a shared "show more" pager so no view blocks.
   ========================================================================= */

var DATA = JSON.parse(document.getElementById('data').textContent);
var LK   = JSON.parse(document.getElementById('lookups').textContent);
var app  = document.getElementById('app');

/* ---------- small helpers ---------- */
function el(tag, attrs, html){
  var n = document.createElement(tag);
  if(attrs) for(var k in attrs){ if(attrs[k]!=null) n.setAttribute(k, attrs[k]); }
  if(html!=null) n.innerHTML = html;
  return n;
}
function esc(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function fmt(n){ return (n==null?'':Number(n).toLocaleString('en-US')); }
function pct1(n){ return (n==null?'':Number(n).toFixed(1)); }
function pageTop(){ window.scrollTo(0,0); }

/* ---------- lookup resolvers ---------- */
var EXAM_BASES = Object.keys(LK.exams).sort(function(a,b){ return b.length-a.length; });
function clanRom(seat){
  var c = LK.clans[seat];
  return c ? c.rom : null;
}
// Common Korean surnames in the conventional romanization used for personal
// names (the established forms, which differ from a literal RR of the syllable
// — e.g. 이 = Yi, 박 = Park, 최 = Choi). Covers ~96% of admits; the long tail
// falls back to the Hangul, never to a fabricated spelling. Lets the clan
// header read "Yi of Jeonju" rather than "이 of Jeonju".
var SURNAME_ROM = {
  '이':'Yi','김':'Kim','박':'Park','정':'Jeong','조':'Jo','윤':'Yun','유':'Yu',
  '홍':'Hong','최':'Choi','권':'Kwon','신':'Sin','한':'Han','임':'Im','송':'Song',
  '강':'Kang','민':'Min','안':'An','심':'Sim','오':'O','남':'Nam','서':'Seo',
  '황':'Hwang','장':'Jang','성':'Seong','허':'Heo','노':'No','양':'Yang','백':'Baek',
  '손':'Son','고':'Go','전':'Jeon','채':'Chae','구':'Gu','원':'Won','문':'Mun',
  '곽':'Gwak','변':'Byeon','여':'Yeo','나':'Na','배':'Bae','우':'U','주':'Ju',
  '엄':'Eom','어':'Eo','류':'Ryu','연':'Yeon','표':'Pyo','마':'Ma','진':'Jin',
  '하':'Ha','방':'Bang','지':'Ji','반':'Ban','선':'Seon','설':'Seol','소':'So'
};
function surnameRom(sn){ return SURNAME_ROM[sn] || null; }
// Canonical clan label, shared by both league tables so distinct clans at the
// same seat stay distinct (안동 권씨 vs 안동 김씨). Korean form "전주 이씨"
// (seat + surname + 씨); romanized "Yi of Jeonju" when the surname is known,
// else the seat romanization alone.
function clanLabel(sn, seat){
  var sr = surnameRom(sn), cr = clanRom(seat);
  return { ko: seat+' '+sn+'씨', rom: (sr&&cr) ? sr+' of '+cr : (cr||'') };
}
function examEn(name){
  if(LK.exams[name]) return LK.exams[name];
  // fallbacks: strip trailing digits, then try a known base as suffix
  var stripped = name.replace(/[0-9]+$/, '');
  if(LK.exams[stripped]) return LK.exams[stripped];
  for(var i=0;i<EXAM_BASES.length;i++){
    var b = EXAM_BASES[i];
    if(stripped.length>b.length && stripped.slice(-b.length)===b){
      var base = LK.exams[b];
      return { en: base.en, gloss: base.gloss };
    }
  }
  return null;
}
function examEnName(name){
  var e = examEn(name);
  return e ? e.en : name; // graceful: show Hangul name if no English exists
}
function kingRom(k){ var r = LK.kings[k]; return r ? r.rom : k; }
function kingReign(k){ var r = LK.kings[k]; return r ? r.reign : ''; }
function gradeEn(g){ var x = LK.grades[g]; return x ? x.en : g; }
// Standing of a grade tier, for ordering a class top-down. The source rk is
// numbered WITHIN each grade (갑과 #1, 을과 #1, 병과 #1 all exist), so a class
// is ordered by tier first, then rk within tier.
var GRADE_TIER = {'갑과':0,'을과':1,'병과':2,'정과':3,'동진사':4};
function gradeTier(g){
  if(g in GRADE_TIER) return GRADE_TIER[g];
  if(g.indexOf('갑과')===0) return 0;
  if(g.indexOf('을과')===0) return 1;
  if(g.indexOf('병과')===0) return 2;
  if(g.indexOf('정과')===0) return 3;
  if(g.indexOf('동진사')!==-1) return 4;
  return 5; // numeric-only grades (1등/2등/3등 …) sit after the named tiers
}
function honBadge(hon){
  if(hon==='jangwon')   return {t:'Valedictorian', rom:'장원'};
  if(hon==='aweon')     return {t:'Second place',  rom:'아원'};
  if(hon==='tamhwarang')return {t:'Third place',   rom:'탐화랑'};
  return null;
}

/* ---------- one-time view indexes ---------- */
var _rosterByCohort=null, _rosterByClan=null, _personById=null, _feederByKey=null, _cohortById=null;
function rosterByCohort(){
  if(_rosterByCohort) return _rosterByCohort;
  var m = {};
  var R = DATA.roster;
  for(var i=0;i<R.length;i++){
    var r = R[i];
    var id = r.y + '-' + r.e;
    (m[id] || (m[id]=[])).push(r);
  }
  _rosterByCohort = m; return m;
}
function rosterByClan(){
  if(_rosterByClan) return _rosterByClan;
  var m = {};
  var R = DATA.roster;
  for(var i=0;i<R.length;i++){
    var r = R[i];
    (m[r.bk] || (m[r.bk]=[])).push(r);
  }
  _rosterByClan = m; return m;
}
function personById(){
  if(_personById) return _personById;
  var m = {};
  var R = DATA.roster;
  for(var i=0;i<R.length;i++){ m[R[i].i]=R[i]; }
  _personById = m; return m;
}
function feederByKey(){
  if(_feederByKey) return _feederByKey;
  var m = {};
  for(var i=0;i<DATA.feeders.length;i++){ m[DATA.feeders[i].key]=DATA.feeders[i]; }
  _feederByKey = m; return m;
}
function cohortById(){
  if(_cohortById) return _cohortById;
  var m = {};
  for(var i=0;i<DATA.cohorts.length;i++){ m[DATA.cohorts[i].id]=DATA.cohorts[i]; }
  _cohortById = m; return m;
}
function median(nums){
  if(!nums.length) return null;
  var a = nums.slice().sort(function(x,y){return x-y;});
  var mid = Math.floor(a.length/2);
  return a.length%2 ? a[mid] : Math.round((a[mid-1]+a[mid])/2);
}

/* ---------- shared fragments ---------- */
// "미상" (未詳) is the record value for an unknown clan seat. 277 admits carry
// it; they have no 성관 key (bk), are not in the feeder league, and have no
// clan page — so they render as plain text, never as a link.
function isUnknownSeat(seat){ return !seat || seat==='미상'; }
function clanLink(key, opts){
  opts = opts || {};
  if(key==null){ return '<span class="muted">Clan unrecorded</span>'; }
  var parts = key.split(' ');
  var sn = parts[0], seat = parts.slice(1).join(' ');
  if(isUnknownSeat(seat)){
    return '<span class="clan" style="color:var(--ink3)">'+esc(sn)+' 미상</span>';
  }
  var rom = clanRom(seat);
  var label;
  if(rom){
    // "Yi of Jeonju" style with surname in Hangul kept compact
    label = '<span class="clan">'+esc(sn)+' '+esc(seat)
          + (opts.rom!==false ? ' <span style="color:var(--ink3);font-style:italic">'+esc(rom)+'</span>' : '')
          + '</span>';
  } else {
    label = '<span class="clan">'+esc(sn)+' '+esc(seat)+'</span>';
  }
  return '<a href="#/clan/'+encodeURIComponent(key)+'">'+label+'</a>';
}
// Clan reference built from a roster record. Falls back to surname + 미상 when
// the record has no 성관 key (unknown seat), so views never throw on bk.
function clanCell(rec){
  if(rec.bk!=null) return clanLink(rec.bk);
  var sn = rec.s || '';
  return '<span class="clan" style="color:var(--ink3)">'+esc(sn)
    + (rec.b?' '+esc(rec.b):'')+'</span>';
}
function crestSvg(cls){
  return '<svg class="'+cls+'" viewBox="0 0 100 100" aria-hidden="true">'
    + '<rect x="4" y="4" width="92" height="92" rx="16" fill="var(--accent)"/>'
    + '<text x="50" y="45" text-anchor="middle" font-family="Noto Serif KR, serif" font-weight="700" font-size="36" fill="var(--bg)">文</text>'
    + '<text x="50" y="84" text-anchor="middle" font-family="Noto Serif KR, serif" font-weight="700" font-size="36" fill="var(--bg)">科</text>'
    + '</svg>';
}
function footerHtml(){
  var srcs = LK.cited.sources.map(function(s){
    return '<a href="'+esc(s.url)+'" rel="noopener">'+esc(s.label)+'</a>';
  }).join(' &nbsp;·&nbsp; ');
  return '<footer>'
    + '<p class="src"><b>Source.</b> '+esc(DATA.meta.source)+'. '
    + 'Every name, rank, and result is a matter of record. Applicant totals were not centrally kept; the acceptance rate is read from surviving seat-and-field figures. '
    + '<a href="#/about">Methodology</a>.'
    + '<span class="srclist">Sources: '+srcs+'</span></p>'
    + '<p class="colophon">made by <a href="https://ajin.im" rel="noopener">ajin.im</a></p>'
    + '</footer>';
}
function aboutDisclosure(open){
  var srcs = LK.cited.sources.map(function(s){
    return '<a href="'+esc(s.url)+'" rel="noopener">'+esc(s.label)+'</a>';
  }).join('');
  return '<details class="about" id="about"'+(open?' open':'')+'>'
    + '<summary><span class="akick">Methodology</span> '
    + '<span style="color:var(--ink2);font-weight:500">How the acceptance rate is estimated</span>'
    + '<span class="achev" aria-hidden="true">▾</span></summary>'
    + '<div class="about-body"><p>'+esc(LK.cited.detail)+'</p>'
    + '<div class="srclist">'+srcs+'</div></div>'
    + '</details>';
}
// incremental pager: renders rows into a tbody/container in chunks
function pager(container, items, renderRow, chunk){
  chunk = chunk || 120;
  var shown = 0;
  var btnWrap = el('div');
  function frag(to){
    var f = document.createDocumentFragment();
    for(var i=shown;i<to;i++){ f.appendChild(renderRow(items[i], i)); }
    return f;
  }
  function more(){
    var to = Math.min(shown+chunk, items.length);
    container.appendChild(frag(to));
    shown = to;
    if(shown>=items.length){ btnWrap.innerHTML=''; }
    else {
      btnWrap.innerHTML='';
      var b = el('button',{class:'showmore',type:'button'},
        'Show more &nbsp;·&nbsp; '+fmt(items.length-shown)+' remaining');
      b.addEventListener('click', more);
      btnWrap.appendChild(b);
    }
  }
  more();
  return btnWrap;
}

/* =========================================================================
   VIEW 1 — Overview (#/)
   ========================================================================= */
function viewOverview(){
  var m = DATA.meta, conc = DATA.concentration.bySeonggwan;
  var top10 = DATA.feeders.slice(0,10);
  var maxN = top10[0].n;
  var siknyeon = DATA.examTypes[0]; // 식년시
  var special = 100 - siknyeon.pct;
  var royalNote = LK.seonggwan['이 전주'] || '';

  var leagueRows = top10.map(function(c){
    var lbl = clanLabel(c.sn, c.seat);
    var note = (c.key==='이 전주') ? 'seat of the royal house' : '';
    return '<tr><td class="rk">'+c.rank+'</td>'
      + '<td class="inst"><a class="row-lnk" href="#/clan/'+encodeURIComponent(c.key)+'">'
        + '<span class="seat kr">'+esc(lbl.ko)+'</span>'+(lbl.rom?'<span class="rom">'+esc(lbl.rom)+'</span>':'')
        + (note?'<div class="note">'+note+'</div>':'')
      + '</a></td>'
      + '<td class="num"><span class="adm">'+fmt(c.n)+'</span></td>'
      + '<td class="barcell"><div style="display:flex;align-items:center;gap:12px">'
        + '<div class="bar" style="flex:1"><span style="width:'+(c.n/maxN*100).toFixed(1)+'%"></span></div>'
        + '<div class="pct">'+pct1(c.pct)+'%</div></div></td></tr>';
  }).join('');

  var html =
    '<header class="mast">'
    + crestSvg('seal')
    + '<div class="mast-tx">'
      + '<div class="kick">Admissions &middot; Rankings &middot; Class profiles</div>'
      + '<h1 class="serif">The Joseon Review</h1>'
      + '<p class="dek">The Joseon Civil Service Examination, ranked and profiled. The realm’s most selective path to office, by the numbers.</p>'
      + '<div class="estbar"><span class="est">Established '+m.yearMin+'</span>'
        + '<span class="kick" style="letter-spacing:1.4px">Final class '+m.yearMax+'</span></div>'
    + '</div></header>'
    + '<div class="dbl-rule"></div>'

    // marquee
    + '<div class="marquee">'
      + '<div class="mq"><div class="ml">Acceptance rate</div><div class="mv serif">&lt;1<small>%</small>'
        + '<sup><a href="#/about" aria-label="Acceptance-rate methodology">*</a></sup></div></div>'
      + '<div class="mq"><div class="ml">Admitted, '+m.yearMin+'–'+m.yearMax+'</div><div class="mv serif">'+fmt(m.total)+'</div></div>'
      + '<div class="mq"><div class="ml">Examinations held</div><div class="mv serif">'+fmt(m.sittings)+'</div></div>'
      + '<div class="mq"><div class="ml">Median age at admission</div><div class="mv serif">'+m.medianAge+'</div></div>'
    + '</div>'

    // selectivity chart
    + '<section><div class="sec-h">'
      + '<div><div class="kick">Selectivity</div><h2 class="serif">Class size by generation</h2>'
        + '<div class="sub">Students admitted to the civil examination, per 25-year period.</div></div>'
      + '<a class="seemore" href="#/trends">Full trends</a></div>'
      + '<div class="chartwrap"><svg class="chart" id="ov-chart" viewBox="0 0 1000 210" preserveAspectRatio="none" aria-hidden="true"></svg>'
        + '<div class="xlabels"><span>1393</span><span>1500</span><span>1600</span><span>1700</span><span>1800</span><span>1894</span></div></div>'
      + '<div class="chart-cap">Admissions widened in the dynasty’s final century as special sittings multiplied. The last 25-year period seated <b>'
        + fmt(DATA.classByPeriod[DATA.classByPeriod.length-1].n)+'</b>, the largest of any generation.</div>'
    + '</section>'

    // feeders league
    + '<section><div class="sec-h">'
      + '<div><div class="kick">Feeders</div><h2 class="serif">Most-represented clans</h2>'
        + '<div class="sub">Clan seats (성관) ranked by total students admitted, '+m.yearMin+' to '+m.yearMax+'.</div></div>'
      + '<a class="seemore" href="#/feeders">All '+fmt(DATA.feeders.length)+' clans</a></div>'
      + '<table class="league"><thead><tr><th>Rank</th><th>Clan</th><th class="num">Admits</th><th>Share of all admits</th></tr></thead>'
        + '<tbody>'+leagueRows+'</tbody></table>'
      + '<div class="league-foot">The most-represented clan, <b>이 전주 (Yi of Jeonju)</b>, is the royal house itself. '
        + esc(royalNote)+'</div>'

/* selectivity area+line chart (matches mock) */
function drawArea(id, vals, emphasizeLast){
  var svg = document.getElementById(id); if(!svg) return;
  var W=1000, H=210, pad=6, n=vals.length, max=Math.max.apply(null, vals);
  var x=function(i){ return pad + i*(W-2*pad)/(n-1); };
  var y=function(v){ return H-8 - v/max*(H-26); };
  var line='', area='M'+x(0)+','+(H-8);
  for(var i=0;i<n;i++){ var px=x(i), py=y(vals[i]); line+=(i?'L':'M')+px+','+py+' '; area+='L'+px+','+py+' '; }
  area += 'L'+x(n-1)+','+(H-8)+'Z';
  var s = '<path d="'+area+'" fill="var(--accent-bg)"/>'
    + '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>'
    + '<line x1="'+pad+'" y1="'+(H-8)+'" x2="'+(W-pad)+'" y2="'+(H-8)+'" stroke="var(--rule2)" stroke-width="1" vector-effect="non-scaling-stroke"/>';
  if(emphasizeLast){
    var lx=x(n-1), ly=y(vals[n-1]);
    s += '<circle cx="'+lx+'" cy="'+ly+'" r="4" fill="var(--accent)"/>';
  }
  svg.innerHTML = s;
}

  // sort by class standing: grade tier first, then numeric rank within tier
  // (rk is per-grade in the source). Records without rk go last in their tier.
  roster.sort(function(a,b){
    var ta = gradeTier(a.g), tb = gradeTier(b.g);
    if(ta!==tb) return ta-tb;
    var ra = (a.rk==null?1e9:a.rk), rb = (b.rk==null?1e9:b.rk);
    return ra-rb;
  });
  var ages = roster.filter(function(r){return r.age!=null;}).map(function(r){return r.age;});

    + '</div>'

    // grade breakdown
    + '<div class="subhead">Grade breakdown</div>'
    + '<div class="gradechips">'+gradeChips+'</div>';

  if(val){

function feederMatches(f, q){
  if(!q) return true;
  q = q.toLowerCase();
  if(f.key.indexOf(q)!==-1) return true;          // hangul key
  if(f.seat.indexOf(q)!==-1) return true;         // hangul seat
  if(f.sn.indexOf(q)!==-1) return true;           // hangul surname
  var rom = (clanRom(f.seat)||'').toLowerCase();
  if(rom.indexOf(q)!==-1) return true;            // romanized seat
  return false;
}

/* =========================================================================
   VIEW 6 — Clan profile (#/clan/{key})
   ========================================================================= */
function viewClan(key){
  var f = feederByKey()[key];
  var members = (rosterByClan()[key] || []).slice();
  if(!f && !members.length){ return notFound('No clan with that identifier.'); }
  // fall back to deriving stats if not in feeders (shouldn't happen, but safe)
  var rank = f ? f.rank : null;
  var n = f ? f.n : members.length;
  var pctVal = f ? f.pct : (members.length/DATA.meta.total*100);
  var firstY = f ? f.firstYear : Math.min.apply(null, members.map(function(r){return r.y;}));
  var lastY  = f ? f.lastYear  : Math.max.apply(null, members.map(function(r){return r.y;}));
  var jangwonN = f ? f.jangwon : members.filter(function(r){return r.z===1;}).length;

  var parts = key.split(' ');
  var sn = parts[0], seat = parts.slice(1).join(' ');
  var rom = clanRom(seat) || '';
  var snRom = surnameRom(sn); // romanized surname, or null for the long tail
  var seatH = f ? f.seatH : (members[0]?members[0].bh:'');
  var note = LK.seonggwan[key] || '';

  // period bars (25-yr) from members
  var periodStart = 1375, periodEnd = 1900, span = 25;
  var nBuckets = (periodEnd-periodStart)/span; // 21
  var pb = new Array(nBuckets).fill(0);
  for(var i=0;i<members.length;i++){
    var idx = Math.floor((members[i].y - periodStart)/span);
    if(idx>=0 && idx<nBuckets) pb[idx]++;
  }
  var pbMax = Math.max.apply(null, pb) || 1;
  var pbHtml = pb.map(function(v){
    var h = v ? Math.max(3, v/pbMax*100) : 0;
    return '<div class="pbcol'+(v?' on':'')+'" style="height:'+h+'%" title="'+(periodStart+0)+'"></div>';
  });
  // recompute heights with proper labels via closure (need start years)
  pbHtml = pb.map(function(v,k){
    var h = v ? Math.max(3, Math.round(v/pbMax*100)) : 0;
    var yr = periodStart + k*span;
    return '<div class="pbcol'+(v?' on':'')+'" style="height:'+h+'%" title="'+yr+'–'+(yr+span-1)+': '+v+'"></div>';
  }).join('');

  // notable alumni: valedictorians (z===1) and 시호-holders, dedup, sorted by year
  var notableSeen = {};
  var notable = [];
  members.forEach(function(r){
    var tag = r.z===1 ? 'jangwon' : (r.sh ? 'sihogc' : null);
    if(!tag) return;
    if(notableSeen[r.i]) return;
    notableSeen[r.i]=1;
    notable.push(r);
  });
  notable.sort(function(a,b){ return a.y-b.y; });
  var notableHtml = notable.length ? '<div class="notable">'+notable.slice(0,60).map(function(r){
    var tag = r.z===1 ? '장원' : '시호';
    return '<a href="#/person/'+encodeURIComponent(r.i)+'">'+esc(r.n)
      + '<span class="nak kr">'+esc(r.h)+'</span><span class="natag">'+tag+'</span></a>';
  }).join('')+'</div>' : '';

  // full admit list sorted by year then rank
  var membersSorted = members.slice().sort(function(a,b){
    if(a.y!==b.y) return a.y-b.y;
    var ra=(a.rk==null?1e9:a.rk), rb=(b.rk==null?1e9:b.rk);
    return ra-rb;
  });

  var html =
    '<div class="pagehead"><div class="crumb"><a href="#/">Overview</a><span class="sep">/</span>'
      + '<a href="#/feeders">Feeders</a><span class="sep">/</span>'+esc(sn)+' '+esc(seat)+'</div>'
    + '<div class="kick">Clan profile &middot; 성관</div>'
    + '<h1 class="ph-title serif">'+esc(snRom||sn)+' of '+esc(rom||seat)+'</h1>'
    + '<p class="ph-sub"><span class="kr" style="font-size:19px">'+esc(sn)+' '+esc(seat)+'</span>'
      + ' <span class="kr" style="color:var(--ink3)">'+esc(seatH)+'</span>'
      + ((rom&&snRom)?' &middot; the '+esc(rom)+' '+esc(snRom):'')+'</p>'
    + (note?'<p class="drynote">'+esc(note)+'</p>':'')

    + '<div class="statstrip">'
      + '<div class="ss"><div class="ssl">Total admits</div><div class="ssv">'+fmt(n)+'</div></div>'
      + (rank?'<div class="ss"><div class="ssl">Rank of '+fmt(DATA.feeders.length)+'</div><div class="ssv">'+rank+'</div></div>':'')
      + '<div class="ss"><div class="ssl">Share of all</div><div class="ssv">'+pct1(pctVal)+'<small>%</small></div></div>'
      + '<div class="ss"><div class="ssl">Span</div><div class="ssv">'+firstY+'<small>–'+lastY+'</small></div></div>'
      + '<div class="ss"><div class="ssl">Valedictorians 장원</div><div class="ssv">'+fmt(jangwonN)+'</div></div>'
    + '</div>'

    + '<div class="subhead">Admits by generation</div>'
    + '<div class="periodbars">'+pbHtml+'</div>'
    + '<div class="periodx"><span>1375</span><span>1500</span><span>1600</span><span>1700</span><span>1800</span><span>1899</span></div>';

  if(notableHtml){
    html += '<div class="subhead">Notable alumni</div>'
      + '<p style="font-size:12.5px;color:var(--ink3);margin:-6px 0 12px">Valedictorians (장원) and holders of a posthumous title (시호).</p>'
      + notableHtml;
  }

  html += '<div class="subhead">All admits</div>'
    + '<div class="tscroll"><table class="dt"><thead><tr>'
      + '<th class="num">Year</th><th>Name</th><th>Grade</th><th>Examination</th><th>Residence</th></tr></thead>'
      + '<tbody id="clan-body"></tbody></table></div>'
    + '<div id="clan-more"></div>'
    + footerHtml();
  app.innerHTML = html;

  var body = document.getElementById('clan-body');
  var moreHost = document.getElementById('clan-more');
  var btn = pager(body, membersSorted, function(r){
    var badge = honBadge(r.hon);
    var tr = el('tr');
    tr.innerHTML =
      '<td class="num rnk">'+r.y+'</td>'
      + '<td><a href="#/person/'+encodeURIComponent(r.i)+'"><span class="nm">'+esc(r.n)
        + '<span class="nh kr">'+esc(r.h)+'</span></span></a></td>'
      + '<td class="grd">'+esc(gradeEn(r.g))+'<span class="gkr kr">'+esc(r.g)+'</span>'
        + (badge?'<span class="laur-dot">'+esc(badge.rom)+'</span>':'')+'</td>'
      + '<td>'+esc(examEnName(r.e))+' <span class="nh kr" style="color:var(--ink3)">'+esc(r.e)+'</span></td>'
      + '<td>'+(r.r?'<span class="kr">'+esc(r.r)+'</span>':'<span class="muted">—</span>')+'</td>';
    return tr;
  }, 120);
  moreHost.appendChild(btn);
  pageTop();
}

/* =========================================================================
   VIEW 7 — Trends (#/trends)
   ========================================================================= */
function viewTrends(){
  var conc = DATA.concentration.bySeonggwan;
  var ad = DATA.ageDist;
  // Merge digit-suffixed variants (정시2 → 정시, 별시2 → 별시) so each type of
  // sitting appears once in the breakdown.
  var examMerged = (function(){
    var m = {}, order = [];
    DATA.examTypes.forEach(function(e){
      var base = e.name.replace(/[0-9]+$/, '');
      if(!m[base]){ m[base] = {name:base, n:0, pct:0}; order.push(base); }
      m[base].n += e.n; m[base].pct += e.pct;
    });
    return order.map(function(b){ return m[b]; }).sort(function(a,b){ return b.n-a.n; });
  })();
  // top exam types (cap to those >=0.5%, min 6), with English + gloss
  var topExams = examMerged.filter(function(e){ return e.pct>=0.5; });
  if(topExams.length<6) topExams = examMerged.slice(0,8);
  var exMax = topExams[0].pct;
  var examBars = topExams.map(function(e){
    var en = examEn(e.name);
    return '<div class="blrow"><div class="bltop">'
      + '<div><span class="bln">'+esc(en?en.en:e.name)+'<span class="blk kr">'+esc(e.name)+'</span></span>'
        + (en&&en.gloss?'<div class="blg">'+esc(en.gloss)+'</div>':'')+'</div>'
      + '<span class="blp">'+pct1(e.pct)+'%</span></div>'
      + '<div class="blbar"><span style="width:'+(e.pct/exMax*100).toFixed(1)+'%"></span></div></div>';
  }).join('');

  // concentration stepped display
  var concRows = [
    ['Top 5 clans', conc.top5],
    ['Top 10', conc.top10],
    ['Top 20', conc.top20],
    ['Top 50', conc.top50],
    ['Top 100', conc.top100]
  ];
  var stepHtml = concRows.map(function(r){
    return '<div class="step"><div class="sl">'+esc(r[0])+'</div>'
      + '<div class="sbar"><span style="width:'+pct1(r[1])+'%"></span></div>'
      + '<div class="sv">'+pct1(r[1])+'%</div></div>';
  }).join('');

  // age histogram
  var hist = ad.hist;
  var hmax = Math.max.apply(null, hist.map(function(h){return h.n;}));
  var histHtml = hist.map(function(h){
    var hi = (h.age===ad.median);
    return '<div class="hb'+(hi?' hi':'')+'" style="height:'+Math.max(1, h.n/hmax*100).toFixed(1)+'%" '
      + 'title="age '+h.age+': '+fmt(h.n)+'"></div>';
  }).join('');

  var lastPeriod = DATA.classByPeriod[DATA.classByPeriod.length-1];
  var firstPeriod = DATA.classByPeriod[0];

  var html =
    '<div class="pagehead"><div class="crumb"><a href="#/">Overview</a><span class="sep">/</span>Trends</div>'
    + '<h1 class="ph-title serif">By the numbers</h1>'
    + '<p class="ph-sub">Five centuries of admissions, read from '+fmt(DATA.meta.total)+' records across '
      + fmt(DATA.meta.sittings)+' sittings.</p></div>'

    // selectivity
    + '<section style="border-top:1px solid var(--rule); margin-top:22px"><div class="sec-h">'
      + '<div><div class="kick">Admissions trends</div><h2 class="serif">Class size over time</h2>'
        + '<div class="sub">Students admitted per 25-year period, '+DATA.meta.yearMin+' to '+DATA.meta.yearMax+'.</div></div></div>'
      + '<div class="chartwrap"><svg class="chart" id="tr-chart" viewBox="0 0 1000 230" preserveAspectRatio="none" aria-hidden="true"></svg>'
        + '<div class="xlabels"><span>1393</span><span>1450</span><span>1500</span><span>1600</span><span>1700</span><span>1800</span><span>1894</span></div></div>'
      + '<div class="chart-cap">The triennial sitting held its thirty-three for five centuries. The growth is in the special sittings: the final 25-year period seated <b>'
        + fmt(lastPeriod.n)+'</b>, against <b>'+fmt(firstPeriod.n)+'</b> in the first.</div>'
    + '</section>'

    // exam types
    + '<section><div class="sec-h">'
      + '<div><div class="kick">Admissions tracks</div><h2 class="serif">How students were admitted</h2>'
        + '<div class="sub">Share of all admits by type of sitting.</div></div></div>'
      + '<div class="barlist">'+examBars+'</div>'
      + '<div class="trk-cap">The triennial examination (식년시) was the meritocratic core, seating thirty-three nationally. '
        + 'The special sittings, called for royal occasions, together admitted the majority.</div>'
    + '</section>'

    // concentration + age, side by side
    + '<section style="border-bottom:0"><div class="grid2">'
      + '<div><div class="sec-h" style="border:0;margin-bottom:18px"><div><div class="kick">Concentration</div>'
        + '<h2 class="serif">Share held by the top clans</h2></div></div>'
        + '<div class="stepwrap">'+stepHtml+'</div>'
        + '<div class="histcap">Out of '+fmt(DATA.meta.distinctSeonggwan)+' clans that produced an official, the top hundred account for '
          + pct1(conc.top100)+' percent of all admits.</div></div>'
      + '<div><div class="sec-h" style="border:0;margin-bottom:18px"><div><div class="kick">Age at admission</div>'
        + '<h2 class="serif">When officials passed</h2></div></div>'
        + '<div class="histwrap"><div class="hist">'+histHtml+'</div>'
        + '<div class="histx"><span>12</span><span>median '+ad.median+'</span><span>85</span></div></div>'
        + '<div class="histcap">Median age '+ad.median+', mean '+ad.mean+'. The youngest recorded admit was '+ad.min
          + ', the oldest '+ad.max+'. Read from '+fmt(DATA.meta.ageN)+' admits whose birth year survives.</div></div>'
    + '</div></section>'

    + footerHtml();
  app.innerHTML = html;
  drawArea('tr-chart', DATA.classByPeriod.map(function(b){return b.n;}), true);
  pageTop();
}

/* =========================================================================
   VIEW 8 — Search (#/search/{q})
   ========================================================================= */
function viewSearch(rawq){
  var q = (rawq||'').trim();
  var qLower = q.toLowerCase();
  var results = [];
  if(q){
    var R = DATA.roster;
    for(var i=0;i<R.length && results.length<400;i++){
      var r = R[i];
      var hit = false;
      if(r.n && r.n.indexOf(q)!==-1) hit=true;            // hangul name
      else if(r.h && r.h.indexOf(q)!==-1) hit=true;       // hanja
      else if(r.b && r.b.indexOf(q)!==-1) hit=true;       // seat hangul
      else if(r.s && r.s.indexOf(q)!==-1) hit=true;       // surname hangul
      else {
        var rom = (clanRom(r.b)||'').toLowerCase();
        if(rom && rom.indexOf(qLower)!==-1) hit=true;     // seat romanization
      }
      if(hit) results.push(r);
    }
  }
  var capped = results.length>100;
  var shown = results.slice(0,100);

  var html =
    '<div class="pagehead"><div class="crumb"><a href="#/">Overview</a><span class="sep">/</span>Search</div>'
    + '<h1 class="ph-title serif">Search</h1>'
    + (q
      ? '<p class="ph-sub">Admitted officials matching <b style="color:var(--ink)">“'+esc(q)+'”</b>, by name or clan.</p>'
      : '<p class="ph-sub">Type a name or a clan in the search box above. Korean (이순신, 전주) or romanized clan (Jeonju) both work.</p>')
    + '</div>';

  if(q){
    html += '<div class="resultcount"><b>'+fmt(results.length)+(capped?'+':'')+'</b> '
      + (results.length===1?'admit':'admits')+' found'
      + (capped?' &middot; showing the first 100':'')+'</div>';
    if(shown.length){
      html += '<div class="tscroll"><table class="dt"><thead><tr>'
        + '<th>Name</th><th>Clan</th><th class="num">Class</th><th>Grade</th></tr></thead>'
        + '<tbody id="search-body"></tbody></table></div>';
    } else {
      html += '<div class="empty"><span class="ekr">無</span>No admits match “'+esc(q)+'”. '
        + '<a href="#/feeders">Browse clans</a> instead.</div>';
    }
  }
  html += footerHtml();
  app.innerHTML = html;

  if(shown.length){
    var tb = document.getElementById('search-body');
    var f = document.createDocumentFragment();
    shown.forEach(function(r){
      var badge = honBadge(r.hon);
      var tr = el('tr');
      tr.innerHTML =
        '<td><a href="#/person/'+encodeURIComponent(r.i)+'"><span class="nm">'+esc(r.n)
          + '<span class="nh kr">'+esc(r.h)+'</span></span></a></td>'
        + '<td>'+clanCell(r)+'</td>'
        + '<td class="num"><a href="#/cohort/'+encodeURIComponent(r.y+'-'+r.e)+'">'+r.y+'</a></td>'
        + '<td class="grd">'+esc(gradeEn(r.g))+'<span class="gkr kr">'+esc(r.g)+'</span>'
          + (badge?'<span class="laur-dot">'+esc(badge.rom)+'</span>':'')+'</td>';
      f.appendChild(tr);
    });
    tb.appendChild(f);
  }
  pageTop();
}

/* =========================================================================
   ROUTER
   ========================================================================= */
function setActiveNav(route){
  var links = document.querySelectorAll('#nav a');
  links.forEach(function(a){
    if(a.getAttribute('data-route')===route) a.setAttribute('aria-current','page');
    else a.removeAttribute('aria-current');
  });
}
function dispatch(){
  var h = location.hash.replace(/^#/, '');
  if(!h || h==='/'){ setActiveNav(''); return viewOverview(); }
  var parts = h.split('/').filter(Boolean); // e.g. ['cohort','1393-...']
  var head = parts[0];
  var tail = decodeURIComponent(parts.slice(1).join('/'));
  switch(head){
    case 'cohorts': setActiveNav('cohorts'); return viewCohorts();
    case 'cohort':  setActiveNav('cohorts'); return viewCohort(tail);
    case 'feeders': setActiveNav('feeders'); return viewFeeders();
    case 'clan':    setActiveNav('feeders'); return viewClan(tail);
    case 'trends':  setActiveNav('trends');  return viewTrends();
    case 'person':  setActiveNav('');        return viewPerson(tail);
    case 'search':  setActiveNav('');        return viewSearch(tail);
    case 'about':   setActiveNav('');        return viewAbout();
    default:        setActiveNav('');        return notFound();
  }
}
function route(){
  // A render error must never leave a stale page; degrade to a visible notice.
  try { dispatch(); }
  catch(err){
    if(window.console&&console.error) console.error('Joseon Review route error:', err);
    notFound('Something went wrong rendering that page.');
  }
}
window.addEventListener('hashchange', route);

/* search submit -> route */
document.getElementById('searchform').addEventListener('submit', function(e){
  e.preventDefault();
  var q = document.getElementById('searchbox').value.trim();
  if(q) location.hash = '#/search/'+encodeURIComponent(q);
});

/* boot */
route();

})();
</script>
