/* =========================================================================
   VIEW 8 — Search (#/search/{q})
   ========================================================================= */
function viewSearch(rawq){
  var q = (rawq||'').trim();
  var qLower = q.toLowerCase();
  var results = [];
  if(q){
    var R = DATA.roster;
    // the curated graduates carry English names + pen names; let those match too,
    // so "Yulgok" or "Jeong Yak-yong" finds the record though the roster is Korean.
    var notableById = {};
    (LK.notable||[]).forEach(function(x){ notableById[x.id] = x; });
    for(var i=0;i<R.length && results.length<400;i++){
      var r = R[i];
      var hit = false;
      if(r.n && r.n.indexOf(q)!==-1) hit=true;            // hangul name
      else if(r.h && r.h.indexOf(q)!==-1) hit=true;       // hanja
      else if(r.b && r.b.indexOf(q)!==-1) hit=true;       // seat hangul
      else if(r.s && r.s.indexOf(q)!==-1) hit=true;       // surname hangul
      else {
        var rom = (clanRom(r.b)||'').toLowerCase();
        if(rom && rom.indexOf(qLower)!==-1) hit=true;     // seat romanization
        else if(qLower){
          var nb = notableById[r.i];                      // curated English name / pen name
          if(nb && ((nb.en||'').toLowerCase().indexOf(qLower)!==-1 || (nb.ep||'').toLowerCase().indexOf(qLower)!==-1)) hit=true;
        }
      }
      if(hit) results.push(r);
    }
  }
  var capped = results.length>100;
  var shown = results.slice(0,100);

  var html =
    '<div class="pagehead"><div class="crumb"><a href="#/">Clans</a><span class="sep">/</span>Search</div>'
    + '<h1 class="ph-title serif">Search</h1>'
    + (q
      ? '<p class="ph-sub">Admitted officials matching <b style="color:var(--ink)">“'+esc(q)+'”</b>, by name or clan.</p>'
      : '<p class="ph-sub">Type a name or a clan in the search box above. Korean searches the whole record (이황, 전주); English works for clans (Jeonju) and the distinguished graduates (Yulgok).</p>')
    + '</div>';

  if(q){
    html += '<div class="resultcount"><b>'+fmt(results.length)+(capped?'+':'')+'</b> '
      + (results.length===1?'admit':'admits')+' found'
      + (capped?' &middot; showing the first 100':'')+'</div>';
    if(shown.length){
      html += '<div class="tscroll"><table class="dt"><thead><tr>'
        + '<th>Name</th><th>Clan</th><th class="num">Class</th><th>Grade</th></tr></thead>'
        + '<tbody id="search-body"></tbody></table></div>';
    } else {
      html += '<div class="empty"><span class="ekr">無</span>No admits match “'+esc(q)+'”. '
        + '<a href="#/feeders">Browse clans</a> instead.</div>';
    }
  }
  html += footerHtml();
  app.innerHTML = html;

  if(shown.length){
    var tb = document.getElementById('search-body');
    var f = document.createDocumentFragment();
    shown.forEach(function(r){
      var badge = honBadge(r.hon);
      var tr = el('tr');
      tr.innerHTML =
        '<td><a href="#/person/'+encodeURIComponent(r.i)+'"><span class="nm">'+(notableEn(r.i)?esc(notableEn(r.i).en)+' ':'')+esc(r.n)
          + '<span class="nh kr">'+esc(r.h)+'</span></span></a></td>'
        + '<td>'+clanCell(r)+'</td>'
        + '<td class="num"><a href="#/cohort/'+encodeURIComponent(r.y+'-'+r.e)+'">'+r.y+'</a></td>'
        + '<td class="grd">'+esc(gradeEn(r.g))+'<span class="gkr kr">'+esc(r.g)+'</span>'
          + (badge?'<span class="laur-dot">'+esc(badge.rom)+'</span>':'')+'</td>';
      f.appendChild(tr);
    });
    tb.appendChild(f);
  }
  pageTop();
}

/* =========================================================================
   ABOUT (#/about) — full methodology page
   ========================================================================= */
function viewAbout(){
  var srcs = LK.cited.sources.map(function(s){
    return '<a href="'+esc(s.url)+'" rel="noopener">'+esc(s.label)+'</a>';
  }).join('');
  var html =
    '<div class="pagehead"><div class="crumb"><a href="#/">Clans</a><span class="sep">/</span>Methodology</div>'
    + '<h1 class="ph-title serif">Methodology</h1>'
    + '<p class="ph-sub">'+esc(LK.cited.headline)+'</p></div>'
    + '<div class="about-body" style="margin-top:26px;max-width:74ch;font-size:14.5px">'
      + '<p>'+esc(LK.cited.detail)+'</p>'
      + '<p style="color:var(--ink2)"><b style="color:var(--ink)">On the figures.</b> '
        + 'Every name, rank, clan, grade, and result shown across this site is drawn from the surviving roster of '
        + 'civil-examination passers. '+esc(DATA.meta.total.toLocaleString())+' admits across '+esc(DATA.meta.sittings.toLocaleString())
        + ' sittings, '+DATA.meta.yearMin+' to '+DATA.meta.yearMax+'. Ages are recorded for '+esc(DATA.meta.ageN.toLocaleString())
        + ' of them, where a birth year survives. Residences and alternate names appear where the record carries them, and are marked unknown where it does not.</p>'
      + '<div class="subhead" style="margin-top:24px">Sources</div>'
      + '<div class="srclist">'+srcs+'</div>'
    + '</div>'
    + '<p style="margin-top:30px"><a href="#/" class="seemore">Back to the overview</a></p>'
    + footerHtml();
  app.innerHTML = html;
  pageTop();
}

/* ---------- not-found ---------- */
function notFound(msg){
  app.innerHTML =
    '<div class="pagehead"><div class="crumb"><a href="#/">Clans</a></div>'
    + '<h1 class="ph-title serif">Not found</h1></div>'
    + '<div class="empty"><span class="ekr">無</span>'+esc(msg||'That page does not exist.')+' '
      + '<a href="#/">Return to the overview</a>.</div>'
    + footerHtml();
  pageTop();
}

/* =========================================================================
   ROUTER
   ========================================================================= */
function setActiveNav(route){
  var links = document.querySelectorAll('#nav a');
  links.forEach(function(a){
    if(a.getAttribute('data-route')===route) a.setAttribute('aria-current','page');
    else a.removeAttribute('aria-current');
  });
}
function dispatch(){
  var h = location.hash.replace(/^#/, '');
  if(!h || h==='/'){ setActiveNav(''); return viewOverview(); }
  var parts = h.split('/').filter(Boolean); // e.g. ['cohort','1393-...']
  var head = parts[0];
  var tail = decodeURIComponent(parts.slice(1).join('/'));
  switch(head){
    case 'alumni':  setActiveNav('alumni');  return viewAlumni();
    case 'cohorts': setActiveNav('cohorts'); return viewCohorts();
    case 'cohort':  setActiveNav('cohorts'); return viewCohort(tail);
    case 'feeders': setActiveNav(''); return viewFeeders();
    case 'clan':    setActiveNav(''); return viewClan(tail);
    case 'trends':  setActiveNav('trends');  return viewTrends();
    case 'person':  setActiveNav('');        return viewPerson(tail);
    case 'search':  setActiveNav('');        return viewSearch(tail);
    case 'about':   setActiveNav('');        return viewAbout();
    default:        setActiveNav('');        return notFound();
  }
}
function route(){
  // A render error must never leave a stale page; degrade to a visible notice.
  try { dispatch(); }
  catch(err){
    if(window.console&&console.error) console.error('Joseon Review route error:', err);
    notFound('Something went wrong rendering that page.');
  }
}
window.addEventListener('hashchange', route);

/* search submit -> route */
document.getElementById('searchform').addEventListener('submit', function(e){
  e.preventDefault();
  var q = document.getElementById('searchbox').value.trim();
  if(q) location.hash = '#/search/'+encodeURIComponent(q);
});

/* boot */
route();

})();
</script>
