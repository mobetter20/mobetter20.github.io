<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ajin.im is not here &middot; 404</title>
<link rel="icon" type="image/png" href="/img/a2.png">
<link rel="apple-touch-icon" href="/img/a2.png">
<script src="/analytics.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1612;
    --text: #e8e0d0;
    --text-soft: #8a7f70;
    --text-faint: #6a6055;
    --accent: #c9a876;
    --accent-soft: rgba(201, 168, 118, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 400; font-size: 18px; line-height: 1.6;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.66 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.4; mix-blend-mode: overlay; z-index: 1;
  }
  main {
    position: relative; z-index: 2;
    max-width: 560px; margin: 0 auto; padding: 14vh 8vw 8vh;
  }
  .title {
    font-size: clamp(1.55rem, 4.2vw, 2.15rem); font-weight: 400;
    letter-spacing: -0.01em; line-height: 1.25;
    animation: fade 0.9s ease-out 0.1s both;
  }
  .title .prefix { color: var(--text-faint); }
  .title .verb { font-style: italic; }
  .title a {
    color: inherit; text-decoration: none;
    border-bottom: 1px solid rgba(106, 96, 85, 0.4);
    transition: color .25s, border-color .25s;
  }
  .title a:hover, .title a:focus-visible {
    color: var(--text-soft); border-bottom-color: rgba(106, 96, 85, 0.8);
  }
  .code {
    font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .18em;
    text-transform: uppercase; color: var(--text-faint); margin-top: 1.4rem;
    animation: fade 0.9s ease-out 0.2s both;
  }
  .elsewhere { margin-top: 3.2rem; animation: fade 0.9s ease-out 0.3s both; }
  .elsewhere-lead { color: var(--text-soft); font-size: 1rem; margin-bottom: 1rem; }
  .elsewhere-lead em { font-style: italic; color: var(--text); }
  .elsewhere ul { list-style: none; display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; }
  .elsewhere a {
    color: var(--accent); text-decoration: none; font-size: 1.1rem; font-style: italic;
    border-bottom: 1px solid var(--accent-soft); transition: color .25s, border-color .25s;
  }
  .elsewhere a:hover, .elsewhere a:focus-visible {
    color: #d8b884; border-bottom-color: rgba(201, 168, 118, .7);
  }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 600px) {
    main { padding: 10vh 7vw 6vh; }
    .elsewhere { margin-top: 2.4rem; }
  }
</style>
</head>
<body>
<main>
  <h1 class="title"><span class="prefix"><a href="/" target="_self">ajin.im</a> is</span> not <span class="verb" id="verb">here</span>.</h1>
  <p class="code">404 &middot; no such page</p>
  <nav class="elsewhere" aria-label="what ajin.im actually is">
    <p class="elsewhere-lead">ajin.im <em>is</em>, though &mdash;</p>
    <ul>
      <li><a href="/is/running">running</a></li>
      <li><a href="/is/reading">reading</a></li>
      <li><a href="/is/learning">learning</a></li>
      <li><a href="/is/building">building</a></li>
      <li><a href="/is/writing">writing</a></li>
    </ul>
  </nav>
</main>
<script>
  // Path-aware device negation: lift the last path segment as the verb
  // ("/is/dancing" -> "ajin.im is not dancing"), but never negate a real
  // section (a deeper bad path under it) — fall back to "here".
  (function () {
    var real = ['running', 'reading', 'learning', 'building', 'writing', 'wrote', 'is'];
    var segs = location.pathname.split('/').filter(Boolean);
    var last = segs.length ? segs[segs.length - 1].toLowerCase() : '';
    if (last && /^[a-z][a-z-]{1,30}$/.test(last) && real.indexOf(last) === -1) {
      var v = document.getElementById('verb');
      if (v) v.textContent = last.replace(/-/g, ' ');
    }
  })();
</script>
</body>
</html>
