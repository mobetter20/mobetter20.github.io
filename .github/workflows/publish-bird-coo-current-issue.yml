name: Publish Bird Coo Current Issue

on:
  schedule:
    - cron: "15 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-current-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild The Municipal Coo
        run: python3 _scripts/build_bird_coo.py

      - name: Check for bird-coo changes
        id: changes
        run: |
          git add is/writing/bird-coo/index.html is/writing/bird-coo/issues is/writing/avian-district/index.html
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated current issue
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Municipal Coo current issue"

      - name: Push updated current issue
        if: steps.changes.outputs.changed == 'true'
        run: git push
